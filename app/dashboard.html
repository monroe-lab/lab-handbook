<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.dash-page { max-width: 960px; margin: 0 auto; padding: 24px 20px calc(var(--bottom-nav-height) + 24px); }
.dash-stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
.dash-stat {
  display: flex; align-items: center; gap: 10px; padding: 12px 18px;
  border-radius: var(--radius); background: #fff; box-shadow: var(--shadow);
  text-decoration: none; color: inherit; flex: 1; min-width: 120px; transition: box-shadow .15s;
}
.dash-stat:hover { box-shadow: var(--shadow-md); }
.dash-stat .stat-num { font-size: 20px; font-weight: 700; }
.dash-stat .stat-label { font-size: 11px; color: var(--grey-500); }

.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dash-card {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 18px; overflow: hidden;
}
.dash-card h3 {
  font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  margin: 0 0 14px; display: flex; align-items: center; gap: 6px; color: var(--grey-600);
}
.dash-card h3 .material-icons-outlined { font-size: 18px; }
.dash-full { grid-column: 1 / -1; }

.dash-list-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 0;
  border-bottom: 1px solid var(--grey-100); font-size: 13px;
}
.dash-list-item:last-child { border-bottom: none; }

.bulletin-content h4 { font-size: 13px; font-weight: 700; margin: 14px 0 6px; color: var(--grey-800); }
.bulletin-content h4:first-child { margin-top: 0; }
.bulletin-content div { padding: 2px 0; font-size: 13px; }

@media (max-width: 768px) {
  .dash-grid { grid-template-columns: 1fr; }
  .dash-stats { gap: 6px; }
  .dash-stat { padding: 10px 12px; min-width: 90px; }
  .dash-stat .stat-num { font-size: 16px; }
  .dash-page { padding: 14px 12px calc(var(--bottom-nav-height) + 14px); }
}
</style>
</head>
<body>
<script src="js/lab.js"></script>

<div class="dash-page">
  <h1 style="font-size:22px;font-weight:700;margin-bottom:4px;">Monroe Lab</h1>
  <p style="font-size:13px;color:var(--grey-500);margin-bottom:18px;">Department of Plant Sciences · UC Davis</p>

  <div id="dashStats" class="dash-stats"></div>

  <div class="dash-grid">

    <div class="dash-card">
      <h3><span class="material-icons-outlined" style="color:#e65100;">shopping_cart</span> Inventory Status</h3>
      <div id="inventoryStatus" style="font-size:13px;color:var(--grey-500);">Loading...</div>
    </div>

    <div class="dash-card">
      <h3><span class="material-icons-outlined" style="color:var(--teal);">update</span> Recent Updates</h3>
      <div id="recentUpdates" style="font-size:13px;color:var(--grey-500);">Loading...</div>
    </div>

    <div class="dash-card dash-full">
      <h3>
        <span class="material-icons-outlined" style="color:#795548;">assignment</span> Bulletin Board
        <a href="wiki.html?doc=bulletin&from=dashboard" style="margin-left:auto;display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;background:var(--teal);color:#fff;text-decoration:none;font-size:11px;font-weight:600;text-transform:none;letter-spacing:0;">
          <span class="material-icons-outlined" style="font-size:14px;">edit</span> Edit
        </a>
      </h3>
      <div id="bulletinBoard" class="bulletin-content" style="font-size:13px;color:var(--grey-600);">Loading...</div>
    </div>

  </div>

  <!-- Profile embed: your stats + badges rendered inline on the dashboard -->
  <div id="dashProfile" style="margin-top:20px"></div>

</div>

<script>
(function() {
  'use strict';

  var BASE = (window.Lab && window.Lab.BASE) || '/lab-handbook/';
  var REPO = 'monroe-lab/lab-handbook';
  var COMMITS_URL = 'https://api.github.com/repos/' + REPO + '/commits?per_page=15&path=docs';
  var BULLETIN_URL = 'https://api.github.com/repos/' + REPO + '/contents/docs/bulletin.md';

  var TYPE_CONFIG = {
    reagent: { color: '#009688', group: 'resource' }, buffer: { color: '#e65100', group: 'resource' },
    consumable: { color: '#1565c0', group: 'resource' }, equipment: { color: '#455a64', group: 'resource' },
    kit: { color: '#00838f', group: 'resource' }, chemical: { color: '#009688', group: 'resource' },
    enzyme: { color: '#2e7d32', group: 'resource' }, solution: { color: '#e65100', group: 'resource' },
    seed: { color: '#558b2f', group: 'stock' }, glycerol_stock: { color: '#4527a0', group: 'stock' },
    plasmid: { color: '#ad1457', group: 'stock' }, person: { color: '#1565c0', group: 'people' },
    project: { color: '#e65100', group: 'project' }, protocol: { color: '#6a1b9a', group: 'protocol' },
    notebook: { color: '#795548', group: 'notebook' }, guide: { color: '#6a1b9a', group: 'protocol' },
    waste_container: { color: '#455a64', group: 'resource' },
  };

  var GROUP_CONFIG = {
    resource: { color: '#009688', label: 'Resources', icon: 'science', href: BASE + 'app/inventory.html' },
    stock: { color: '#4caf50', label: 'Stocks', icon: 'eco', href: BASE + 'app/inventory.html' },
    protocol: { color: '#6a1b9a', label: 'Protocols', icon: 'menu_book', href: BASE + 'app/protocols.html' },
    people: { color: '#1565c0', label: 'People', icon: 'person', href: BASE + 'app/people.html' },
    project: { color: '#e65100', label: 'Projects', icon: 'folder_special', href: BASE + 'app/projects.html' },
    notebook: { color: '#795548', label: 'Notebooks', icon: 'edit_note', href: BASE + 'app/notebooks.html' },
  };

  function getToken() { return localStorage.getItem('gh_lab_token') || localStorage.getItem('github-token') || ''; }
  function authHeaders() {
    var h = { 'Accept': 'application/vnd.github.v3+json' };
    var t = getToken();
    if (t) h['Authorization'] = 'token ' + t;
    return h;
  }
  function esc(s) { var el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
  function timeAgo(date) {
    var s = Math.floor((new Date() - date) / 1000);
    if (s < 60) return 'just now';
    var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24); if (d < 30) return d + 'd ago';
    return date.toLocaleDateString();
  }

  // ── Stats row ──
  function loadStats(objects) {
    var el = document.getElementById('dashStats');
    if (!el) return;
    var counts = {};
    objects.forEach(function(obj) {
      var conf = TYPE_CONFIG[obj.type];
      var group = conf ? conf.group : 'resource';
      counts[group] = (counts[group] || 0) + 1;
    });

    // Notebook entries lack frontmatter so they're not in object-index.
    // Fetch actual count from GitHub Trees API.
    fetch('https://api.github.com/repos/' + REPO + '/git/trees/main:docs/notebooks?recursive=1', { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(tree) {
        if (tree && tree.tree) {
          counts['notebook'] = tree.tree.filter(function(f) {
            return f.type === 'blob' && f.path.endsWith('.md') && f.path !== 'template.md';
          }).length;
        }
        renderStatCards(el, counts);
      })
      .catch(function() { renderStatCards(el, counts); });
  }

  function renderStatCards(el, counts) {
    // Single inventory count (resources + stocks combined)
    var inventoryCount = (counts['resource'] || 0) + (counts['stock'] || 0);
    var cards = [
      { color: '#009688', label: 'Inventory', icon: 'inventory_2', href: BASE + 'app/inventory.html', count: inventoryCount },
    ];
    var order = ['protocol', 'people', 'project', 'notebook'];
    order.forEach(function(gk) {
      var gc = GROUP_CONFIG[gk];
      cards.push({ color: gc.color, label: gc.label, icon: gc.icon, href: gc.href, count: counts[gk] || 0 });
    });
    el.innerHTML = cards.map(function(c) {
      return '<a href="' + c.href + '" class="dash-stat">' +
        '<span class="material-icons-outlined" style="color:' + c.color + ';font-size:22px;">' + c.icon + '</span>' +
        '<div><div class="stat-num" style="color:' + c.color + ';">' + c.count + '</div>' +
        '<div class="stat-label">' + c.label + '</div></div></a>';
    }).join('');
  }

  // ── Inventory Status ──
  var STATUS_LABELS = { in_stock: 'In Stock', needs_more: 'Needs More', out_of_stock: 'Out of Stock', external: 'External' };
  var STATUS_COLORS = { in_stock: '#22c55e', needs_more: '#f59e0b', out_of_stock: '#ef4444', external: '#3b82f6' };
  var STATUS_ICONS = { in_stock: 'check_circle', needs_more: 'warning_amber', out_of_stock: 'cancel', external: 'open_in_new' };

  function resolveStatus(obj) {
    if (obj.status) return obj.status;
    if (obj.need_more) return 'needs_more';
    return 'in_stock';
  }

  function loadInventoryStatus(objects) {
    var el = document.getElementById('inventoryStatus');
    if (!el) return;
    var isInv = function(t) { var c = TYPE_CONFIG[t]; return c && (c.group === 'resource' || c.group === 'stock'); };
    // Top-card "Inventory" counts untyped items as resources (see loadStats).
    // Mirror that here so the numbers add up: tracked statuses + untracked
    // (untyped) = top-card total. Otherwise users see 480 vs 227 and wonder
    // where 253 went.
    var isInvOrUntyped = function(t) {
      if (isInv(t)) return true;
      return !t || !TYPE_CONFIG[t];
    };
    var invItems = objects.filter(function(obj) { return isInv(obj.type); });
    var untrackedCount = objects.filter(function(obj) {
      return isInvOrUntyped(obj.type) && !isInv(obj.type);
    }).length;
    var counts = { in_stock: 0, needs_more: 0, out_of_stock: 0, external: 0 };
    var alertItems = [];
    invItems.forEach(function(obj) {
      var s = resolveStatus(obj);
      counts[s] = (counts[s] || 0) + 1;
      if (s === 'needs_more' || s === 'out_of_stock') alertItems.push({ obj: obj, status: s });
    });

    var summaryHtml = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">';
    ['in_stock','needs_more','out_of_stock','external'].forEach(function(s) {
      if (!counts[s]) return;
      summaryHtml += '<div style="display:flex;align-items:center;gap:4px;">' +
        '<span class="material-icons-outlined" style="font-size:16px;color:' + STATUS_COLORS[s] + ';">' + STATUS_ICONS[s] + '</span>' +
        '<span style="font-weight:600;color:' + STATUS_COLORS[s] + ';">' + counts[s] + '</span>' +
        '<span style="color:var(--grey-500);font-size:12px;">' + STATUS_LABELS[s] + '</span></div>';
    });
    if (untrackedCount) {
      summaryHtml += '<div style="display:flex;align-items:center;gap:4px;" title="Resource/stock objects without a status field">' +
        '<span class="material-icons-outlined" style="font-size:16px;color:var(--grey-400);">help_outline</span>' +
        '<span style="font-weight:600;color:var(--grey-500);">' + untrackedCount + '</span>' +
        '<span style="color:var(--grey-500);font-size:12px;">Untracked</span></div>';
    }
    summaryHtml += '</div>';

    if (!alertItems.length) {
      el.innerHTML = summaryHtml +
        '<div style="color:#22c55e;display:flex;align-items:center;gap:6px;">' +
        '<span class="material-icons-outlined" style="font-size:16px;">check_circle</span> All stocked up</div>';
      return;
    }
    el.innerHTML = summaryHtml + alertItems.map(function(a) {
      var obj = a.obj;
      var color = STATUS_COLORS[a.status];
      var label = STATUS_LABELS[a.status];
      var slug = obj.path.replace(/\.md$/, '');
      return '<div class="dash-list-item">' +
        '<span class="material-icons-outlined" style="font-size:16px;color:' + color + ';">' + STATUS_ICONS[a.status] + '</span>' +
        '<a href="' + BASE + 'app/wiki.html?doc=' + slug.replace(/^docs\//, '') + '" style="color:inherit;text-decoration:none;font-weight:500;">' + esc(obj.title) + '</a>' +
        '<span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;background:' + color + '18;color:' + color + ';border:1px solid ' + color + '40;margin-left:auto;">' + label + '</span>' +
        '</div>';
    }).join('');
  }

  // ── Recent Updates ──
  function loadRecentUpdates() {
    var el = document.getElementById('recentUpdates');
    if (!el) return;
    fetch(COMMITS_URL, { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(commits) {
        if (!Array.isArray(commits) || !commits.length) {
          el.innerHTML = '<div style="color:var(--grey-400);">No recent updates.</div>';
          return;
        }
        var seen = {}, unique = [];
        commits.forEach(function(c) {
          var msg = c.commit.message.split('\n')[0];
          if (!seen[msg] && !msg.startsWith('Merge') && unique.length < 8) {
            seen[msg] = true; unique.push(c);
          }
        });
        el.innerHTML = unique.map(function(c) {
          var msg = c.commit.message.split('\n')[0];
          if (msg.length > 65) msg = msg.substring(0, 62) + '...';
          var date = new Date(c.commit.author.date);
          var author = c.commit.author.name || 'Unknown';
          return '<div class="dash-list-item">' +
            (c.author ? '<img src="' + c.author.avatar_url + '" style="width:22px;height:22px;border-radius:50%;flex-shrink:0;">' :
              '<span class="material-icons-outlined" style="font-size:22px;color:var(--grey-400);flex-shrink:0;">account_circle</span>') +
            '<div style="flex:1;min-width:0;">' +
            '<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;">' + esc(msg) + '</div>' +
            '<div style="font-size:11px;color:var(--grey-500);">' + esc(author) + ' · ' + timeAgo(date) + '</div></div></div>';
        }).join('');
      })
      .catch(function() { el.innerHTML = '<div style="color:var(--grey-400);">Could not load updates. Set a GitHub token to see activity.</div>'; });
  }

  // ── Bulletin Board ──
  function loadBulletin() {
    var el = document.getElementById('bulletinBoard');
    if (!el) return;
    fetch(BULLETIN_URL, { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.content) { el.innerHTML = 'No bulletin posted.'; return; }
        var md = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
        md = md.replace(/^---[\s\S]*?---\s*/, '');
        if (Lab.wikilinks) md = Lab.wikilinks.preprocess(md);
        var html = md
          .replace(/^## (.+)$/gm, '<h4>$1</h4>')
          .replace(/^[-*] \[x\] (.+)$/gm, '<div><span style="color:var(--green);">&#10003;</span> <s style="color:var(--grey-400);">$1</s></div>')
          .replace(/^[-*] \[ \] (.+)$/gm, '<div><span style="color:#e65100;">&#9679;</span> $1</div>')
          .replace(/^[-*] (.+)$/gm, '<div>$1</div>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/_(.+?)_/g, '<em>$1</em>')
          // Images MUST come before links — ![alt](src) shares the
          // [text](url) shape but with a ! prefix. Without this the
          // link regex eats the image and renders "!<a>" instead of <img>.
          // Resolve relative paths: bulletin lives at docs/bulletin.md,
          // so "images/foo.png" → BASE + "images/foo.png".
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(m, alt, src) {
            if (!src.startsWith('http') && !src.startsWith('/')) src = BASE + src;
            return '<img src="' + src + '" alt="' + esc(alt) + '" style="max-width:100%;border-radius:8px;margin:8px 0">';
          })
          // Also handle inline <img> tags with relative src
          .replace(/<img\s+([^>]*?)src="((?!http|\/)[^"]+)"([^>]*)>/g, function(m, pre, src, post) {
            return '<img ' + pre + 'src="' + BASE + src + '"' + post + '>';
          })
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
        // Strip stray <br> tags (Toast UI inserts these and they add unwanted vertical space)
        html = html.replace(/^\s*<br>\s*$/gm, '');
        el.innerHTML = html;
        if (Lab.wikilinks) Lab.wikilinks.processRendered(el);
        if (Lab.postProcessImages) Lab.postProcessImages(el);
      })
      .catch(function() { el.innerHTML = 'Could not load bulletin. Set a GitHub token to see content.'; });
  }

  // ── Init ──
  function init() {
    // Use Lab.gh.fetchObjectIndex so the localStorage patch overlay is
    // applied — this is what keeps stats + alerts in sync after a user
    // edits/creates/deletes an item on another page before the site
    // redeploys its static object-index.json.
    if (window.Lab && Lab.gh && Lab.gh.fetchObjectIndex) {
      Lab.gh.fetchObjectIndex()
        .then(function(objects) { loadStats(objects); loadInventoryStatus(objects); })
        .catch(function() {
          fetch(BASE + 'object-index.json')
            .then(function(r) { return r.json(); })
            .then(function(objects) { loadStats(objects); loadInventoryStatus(objects); });
        });
    } else {
      fetch(BASE + 'object-index.json')
        .then(function(r) { return r.json(); })
        .then(function(objects) { loadStats(objects); loadInventoryStatus(objects); });
    }
    loadRecentUpdates();
    loadBulletin();
  }

  init();

  // ── Profile embed: your stats + badges on the dashboard ──
  // Loads user-stats.json and renders a compact profile card for the
  // logged-in user. Everyone sees their own stats when they land on
  // the dashboard — Grey's goal is to make contributions visible and
  // motivate lab members via gamification.
  (function loadDashProfile() {
    var mount = document.getElementById('dashProfile');
    if (!mount) return;

    var login = '';
    var displayName = '';
    var avatar = '';
    try {
      var u = JSON.parse(localStorage.getItem('gh_lab_user') || '{}');
      login = u.login || '';
      displayName = u.name || u.login || '';
      avatar = u.avatar || '';
    } catch(e) {}
    if (!login) {
      mount.innerHTML = '';
      return;
    }

    fetch(BASE + 'user-stats.json?' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function(data) {
        var users = data.users || {};
        var me = users[login] || users[login.toLowerCase()];
        if (!me) { mount.innerHTML = ''; return; }

        var profileHref = BASE + 'app/profile.html?user=' + encodeURIComponent(login);

        // Tiered badge system (same as profile.html)
        var TIERS = [
          { name: 'Bronze',   color: '#cd7f32' },
          { name: 'Silver',   color: '#94a3b8' },
          { name: 'Gold',     color: '#d4a017' },
          { name: 'Platinum', color: '#6366f1' },
          { name: 'Diamond',  color: '#06b6d4' },
        ];
        var CATS = [
          { icon: '🔨', title: 'Contributor',      field: 'total_commits',       thresholds: [10, 50, 100, 500, 1000] },
          { icon: '🧪', title: 'Protocol Author',  field: 'protocols_authored',  thresholds: [1, 5, 10, 25, 50] },
          { icon: '📓', title: 'Chronicler',       field: 'notebooks_authored',  thresholds: [1, 10, 20, 50, 100] },
          { icon: '📦', title: 'Inventory',        field: 'inventory_edits',     thresholds: [10, 50, 100, 500, 1000] },
          { icon: '📚', title: 'Wiki Builder',     field: 'wiki_edits',          thresholds: [10, 50, 100, 250, 500] },
          { icon: '📸', title: 'Photographer',     field: 'images_uploaded',     thresholds: [5, 25, 50, 100, 200] },
          { icon: '📍', title: 'Location Builder', field: 'locations_created',   thresholds: [1, 5, 10, 25, 50] },
          { icon: '🧴', title: 'Stockist',         field: 'items_added',         thresholds: [1, 10, 25, 50, 100] },
          { icon: '🏷️', title: 'Annotator',        field: 'annotations',         thresholds: [1, 5, 10, 25, 50] },
          { icon: '🐛', title: 'Bug Hunter',       field: 'issues_filed',        thresholds: [1, 5, 10, 25, 50] },
          { icon: '📢', title: 'Announcer',        field: 'bulletin_edits',      thresholds: [1, 5, 10, 25, 50] },
          { icon: '📅', title: 'Scheduler',        field: 'calendar_edits',      thresholds: [1, 5, 10, 25, 50] },
          { icon: '🗓️', title: 'Veteran',          field: 'days_active',         thresholds: [30, 90, 180, 365, 730] },
        ];

        // Build compact profile card
        var avatarHtml = avatar
          ? '<img src="' + esc(avatar) + '" style="width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:cover">'
          : '<div style="width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;border:2px solid rgba(255,255,255,.3)">' + esc((displayName[0] || '?').toUpperCase()) + '</div>';

        var statsHtml = [
          { n: me.total_commits || 0, l: 'Commits', icon: 'commit' },
          { n: me.protocols_authored || 0, l: 'Protocols', icon: 'science' },
          { n: me.notebooks_authored || 0, l: 'Notebooks', icon: 'edit_note' },
          { n: me.inventory_edits || 0, l: 'Inventory', icon: 'inventory_2' },
        ].map(function(s) {
          return '<div style="text-align:center;min-width:70px">' +
            '<span class="material-icons-outlined" style="font-size:16px;color:rgba(255,255,255,.7);display:block;margin-bottom:2px">' + s.icon + '</span>' +
            '<div style="font-size:18px;font-weight:700">' + s.n + '</div>' +
            '<div style="font-size:10px;color:rgba(255,255,255,.7)">' + s.l + '</div></div>';
        }).join('');

        // Compact badge row: icon + tier dot strip for each category
        var badgesHtml = CATS.map(function(cat) {
          var val = me[cat.field] || 0;
          var tierIdx = -1;
          for (var i = cat.thresholds.length - 1; i >= 0; i--) {
            if (val >= cat.thresholds[i]) { tierIdx = i; break; }
          }
          var tierName = tierIdx >= 0 ? TIERS[tierIdx].name : '';
          var tierColor = tierIdx >= 0 ? TIERS[tierIdx].color : 'rgba(255,255,255,.3)';
          var dots = '';
          for (var j = 0; j < 5; j++) {
            var dc = j <= tierIdx ? TIERS[j].color : 'rgba(255,255,255,.2)';
            dots += '<div style="width:6px;height:6px;border-radius:50%;background:' + dc + '"></div>';
          }
          var opacity = tierIdx >= 0 ? '1' : '.4';
          var filter = tierIdx >= 0 ? '' : 'filter:grayscale(.8);';
          return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;opacity:' + opacity + ';' + filter + '" title="' + esc(cat.title) + (tierName ? ' — ' + tierName : ' — not started') + '">' +
            '<span style="font-size:18px">' + cat.icon + '</span>' +
            '<div style="display:flex;gap:2px">' + dots + '</div>' +
          '</div>';
        }).join('');

        mount.innerHTML =
          '<div style="background:linear-gradient(135deg,#00695c,#00897b);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:20px 24px;color:#fff">' +
            '<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">' +
              avatarHtml +
              '<div>' +
                '<div style="font-size:18px;font-weight:700">' + esc(me.display_name || login) + '</div>' +
                '<div style="font-size:12px;color:rgba(255,255,255,.75)">@' + esc(login) + '</div>' +
              '</div>' +
              '<a href="' + profileHref + '" style="margin-left:auto;padding:6px 14px;border-radius:6px;background:rgba(255,255,255,.15);color:#fff;text-decoration:none;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.25)">Full profile →</a>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-around;gap:8px;margin-bottom:16px">' + statsHtml + '</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center">' + badgesHtml + '</div>' +
          '</div>';
      })
      .catch(function() { /* silently skip if stats file not deployed yet */ });
  })();
})();
</script>
</body>
</html>
