<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocols - Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.protocols-layout {
  display: flex;
  height: calc(100vh - var(--nav-height));
}

/* Sidebar */
.proto-sidebar {
  width: 280px;
  min-width: 280px;
  background: #fff;
  border-right: 1px solid var(--grey-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.proto-sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--grey-200);
}
.proto-sidebar-header input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  outline: none;
}
.proto-sidebar-header input:focus { border-color: var(--teal); }
.proto-sidebar-header .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--grey-500);
  pointer-events: none;
}
.proto-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.proto-tree::-webkit-scrollbar { width: 5px; }
.proto-tree::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 3px; }
.proto-category {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--grey-600);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  user-select: none;
  background: var(--grey-50);
  border-bottom: 1px solid var(--grey-200);
}
.proto-category:hover { color: var(--teal); background: var(--teal-50); }
.proto-category .material-icons-outlined { font-size: 18px; transition: transform .15s; color: var(--grey-400); }
.proto-category.collapsed .material-icons-outlined { transform: rotate(-90deg); }
.proto-cat-count {
  margin-left: auto;
  font-size: 10px;
  font-weight: 500;
  color: var(--grey-400);
  background: var(--grey-200);
  padding: 1px 6px;
  border-radius: 8px;
}
.proto-items { padding-left: 8px; }
.proto-items.hidden { display: none; }
.proto-item {
  display: block;
  padding: 6px 16px 6px 24px;
  font-size: 13px;
  color: var(--grey-700);
  text-decoration: none;
  cursor: pointer;
  border-radius: 0 4px 4px 0;
  transition: background .1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.proto-item:hover { background: var(--grey-100); color: var(--grey-900); }
.proto-item.active { background: var(--teal-light); color: var(--teal-dark); font-weight: 500; }

/* Main content */
.proto-main {
  flex: 1;
  overflow-y: auto;
  background: var(--grey-100);
}
.proto-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 40px;
}

/* Rendered markdown: uses .lab-rendered.theme-teal from base.css */

/* Welcome / card grid */
.proto-welcome { padding: 32px 40px; max-width: 1100px; margin: 0 auto; }
.proto-welcome h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
.proto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.proto-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: box-shadow .15s, transform .15s;
  text-decoration: none;
  color: inherit;
}
.proto-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.proto-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.proto-card p { font-size: 13px; color: var(--grey-500); }

/* Edit toolbar — sticky so it stays visible while scrolling long protocols */
.proto-edit-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--grey-200);
  position: sticky;
  top: 0;
  background: var(--grey-100);
  z-index: 10;
}
.proto-edit-bar .breadcrumb { font-size: 13px; color: var(--grey-500); }

/* Editing surface */
.proto-editor-surface { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; min-height: 500px; }

/* Mobile hamburger */
.proto-hamburger {
  display: none;
  position: fixed;
  bottom: calc(var(--bottom-nav-height) + 16px);
  left: 16px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--teal);
  color: #fff;
  border: none;
  box-shadow: var(--shadow-lg);
  cursor: pointer;
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.proto-hamburger .material-icons-outlined { font-size: 24px; }
.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 200;
}

/* Drag and drop */
.proto-item[draggable="true"] { cursor: grab; }
.proto-item.dragging { opacity: .4; }
.proto-items.drag-over { background: var(--teal-50); outline: 2px dashed var(--teal); outline-offset: -2px; border-radius: 4px; }
.proto-category.drag-over-cat { background: var(--teal-50); color: var(--teal); }
.proto-cat-rename {
  margin-left: auto;
  opacity: 0;
  color: var(--grey-400);
  cursor: pointer;
  padding: 2px 4px;
  transition: opacity .15s, color .15s;
}
.proto-category:hover .proto-cat-rename { opacity: 1; }
.proto-cat-rename:hover { color: var(--teal); }

.new-folder-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  font-size: 12px;
  color: var(--grey-500);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  font-family: inherit;
  transition: color .15s;
}
.new-folder-btn:hover { color: var(--teal); }

/* Print styles */
@media print {
  #lab-nav, #lab-bottom-nav, .proto-sidebar, .sidebar-backdrop, .proto-hamburger,
  .proto-edit-bar, #password-gate, #print-preview-fab, #issue-reporter-btn { display: none !important; }
  .protocols-layout { display: block !important; }
  .proto-main { overflow: visible !important; }
  .proto-content { max-width: 100% !important; padding: 0 !important; }
  body { background: #fff; }
  /* Iframe embeds its own copy of the frontmatter bar, so hide the parent's */
  .proto-content > .frontmatter-bar { display: none !important; }
}

/* Print preview overlay: parent's frontmatter bar is duplicated inside the iframe,
   hide the parent's so we only see one (#bug DOUBLE-FRONTMATTER-BAR cycle 11). */
body.print-preview-active .proto-content > .frontmatter-bar { display: none !important; }
/* Hide the lightbulb issue-reporter FAB in print preview — only the teal Print
   FAB should be present so the visual matches the printed output (cycle 58). */
body.print-preview-active #issue-reporter-btn { display: none !important; }

@media (max-width: 768px) {
  .proto-sidebar {
    position: fixed;
    left: -300px;
    top: var(--nav-height);
    bottom: var(--bottom-nav-height);
    z-index: 300;
    transition: left .25s ease;
    box-shadow: 4px 0 16px rgba(0,0,0,.1);
  }
  .proto-sidebar.open { left: 0; }
  .sidebar-backdrop.open { display: block; }
  .proto-hamburger { display: flex; }
  .proto-content { padding: 12px 8px; }
  .proto-welcome { padding: 20px 16px; }
  .protocols-layout { height: calc(100vh - var(--nav-height) - var(--bottom-nav-height)); }
  /* View mode: icon-only buttons, hide breadcrumb */
  .proto-edit-bar .breadcrumb { display: none; }
  .proto-edit-bar .btn span.material-icons-outlined { margin: 0; }
  .proto-edit-bar .btn { padding: 6px 8px; font-size: 0; }
  .proto-edit-bar .btn span.material-icons-outlined { font-size: 18px; }
  .btn-label { display: none; }
  /* Edit mode: hide nav + edit bar, floating save/cancel */
  body.editing-mode #lab-nav { display: none; }
  body.editing-mode #lab-bottom-nav { display: none; }
  body.editing-mode .proto-sidebar { display: none; }
  body.editing-mode .proto-hamburger { display: none; }
  body.editing-mode .protocols-layout { height: 100vh; }
  body.editing-mode .proto-edit-bar { display: none; }
}
</style>
</head>
<body>

<div class="protocols-layout">
  <!-- Sidebar -->
  <div class="proto-sidebar" id="sidebar">
    <div class="proto-sidebar-header" style="position:relative;display:flex;gap:6px;align-items:center">
      <div style="position:relative;flex:1">
        <span class="material-icons-outlined search-icon">search</span>
        <input type="text" id="protoSearch" placeholder="Search...">
      </div>
      <button id="newFolderBtn" class="btn btn-sm" style="display:none;padding:6px 10px;white-space:nowrap;background:none;border:1px solid var(--grey-300);color:var(--grey-600)" onclick="createNewFolder()" title="New folder">
        <span class="material-icons-outlined" style="font-size:18px">create_new_folder</span>
      </button>
      <button id="newProtoBtn" class="btn btn-primary btn-sm" style="display:none;padding:6px 10px;white-space:nowrap" onclick="createNewProtocol()">
        <span class="material-icons-outlined" style="font-size:18px">add</span>
      </button>
    </div>
    <div class="proto-template-link" onclick="loadDoc('workflow-templates/protocol-template')" style="padding:8px 16px;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--teal-dark);border-bottom:1px solid var(--grey-200);font-weight:500;">
      <span class="material-icons-outlined" style="font-size:16px">description</span> Protocol Template
    </div>
    <div class="proto-tree" id="protoTree">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Main -->
  <div class="proto-main" id="protoMain">
    <div id="protoContent">
      <div class="loading-state" style="padding-top:80px"><div class="spinner"></div><p>Loading protocols...</p></div>
    </div>
  </div>
</div>

<button class="proto-hamburger" id="hamburger">
  <span class="material-icons-outlined">menu</span>
</button>

<script src="js/lab.js"></script>
<script>
// Category labels and ordering for protocol directories.
// New directories not listed here auto-generate a label from the folder name.
var CATEGORY_CONFIG = {
  order: [
    'wet-lab', 'wet-lab/extraction', 'wet-lab/library-prep', 'wet-lab/epigenomics', 'wet-lab/mutagenesis',
    'lab-safety',
    'lab-management',
    'workflow-templates',
    'bioinformatics',
  ],
  labels: {
    'wet-lab':                'Wet Lab Basics',
    'wet-lab/extraction':     'DNA Extraction',
    'wet-lab/library-prep':   'Library Prep & Sequencing',
    'wet-lab/epigenomics':    'Epigenomics',
    'wet-lab/mutagenesis':    'Mutagenesis & Genetics',
    'lab-management':         'Lab Management',
    'lab-safety':             'Lab Safety',
    'workflow-templates':     'Workflow Templates',
    'bioinformatics':         'Bioinformatics',
  }
};

var NAV = [];
var currentDoc = null;
var currentSha = null;
var currentMeta = null;  // parsed frontmatter for current doc (used by print preview, edit mode)
var isEditing = false;
var editorInstance = null;
var allProtocols = [];

function unsavedGuard(e) { e.preventDefault(); e.returnValue = ''; }

// Build NAV dynamically from object-index.json
async function buildNav() {
  var index = await Lab.gh.fetchObjectIndex();
  var protocols = index.filter(function(o) { return o.type === 'protocol'; });

  // Group by directory path (strip .md, get dir portion)
  var groups = {};
  protocols.forEach(function(p) {
    // p.path is like "wet-lab/autoclave.md" or "wet-lab/extraction/hifi-dna-extraction.md"
    var parts = p.path.replace(/\.md$/, '').split('/');
    var slug = parts.pop(); // filename without .md
    var dir = parts.join('/'); // directory key

    // Skip index files
    if (slug === 'index') return;

    if (!groups[dir]) groups[dir] = [];
    groups[dir].push({ title: p.title, path: p.path.replace(/\.md$/, '') });
  });

  // Sort items alphabetically within each group
  Object.keys(groups).forEach(function(dir) {
    groups[dir].sort(function(a, b) { return a.title.localeCompare(b.title); });
  });

  // Build NAV in configured order, then append any new directories not in config
  var usedDirs = {};
  NAV = [];

  CATEGORY_CONFIG.order.forEach(function(dir) {
    if (groups[dir]) {
      NAV.push({ dir: dir, label: CATEGORY_CONFIG.labels[dir] || prettifyDir(dir), items: groups[dir] });
      usedDirs[dir] = true;
    }
  });

  // Append any directories not in the config (auto-discovered)
  Object.keys(groups).sort().forEach(function(dir) {
    if (!usedDirs[dir]) {
      NAV.push({ dir: dir, label: CATEGORY_CONFIG.labels[dir] || prettifyDir(dir), items: groups[dir] });
    }
  });

  // Build flat search list
  allProtocols = [];
  NAV.forEach(function(cat) {
    cat.items.forEach(function(item) {
      allProtocols.push({ title: item.title, path: item.path, category: cat.label });
    });
  });
}

function prettifyDir(dir) {
  // "wet-lab/extraction" → "Extraction", "lab-management" → "Lab Management"
  var last = dir.split('/').pop();
  return last.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
}

// ── Sidebar ──
var loggedIn = false;

function renderSidebar(filter) {
  var tree = document.getElementById('protoTree');
  var q = (filter || '').toLowerCase();
  var html = '';

  NAV.forEach(function(cat, ci) {
    var items = cat.items;
    if (q) {
      items = items.filter(function(i) {
        return i.title.toLowerCase().includes(q) || cat.label.toLowerCase().includes(q);
      });
      if (!items.length) return;
    }

    // Collapse by default unless searching or a doc in this category is active
    var hasActive = items.some(function(i) { return i.path === currentDoc; });
    var collapsed = !q && !hasActive ? ' collapsed' : '';
    var hidden = collapsed ? ' hidden' : '';

    html += '<div class="proto-category' + collapsed + '" data-cat-idx="' + ci + '" onclick="toggleCategory(this)">' +
      '<span class="material-icons-outlined">expand_more</span>' +
      '<span class="material-cat-label">' + Lab.escHtml(cat.label) + '</span>' +
      '<span class="proto-cat-count">' + items.length + '</span>' +
      (loggedIn ? '<span class="proto-cat-rename" onclick="event.stopPropagation();renameFolder(' + ci + ')" title="Rename folder"><span class="material-icons-outlined" style="font-size:14px">edit</span></span>' : '') +
      '</div><div class="proto-items' + hidden + '" data-cat-idx="' + ci + '">';

    items.forEach(function(item) {
      var active = currentDoc === item.path ? ' active' : '';
      var draggable = loggedIn ? ' draggable="true"' : '';
      // R9 #43: dropped the "(Copy)" sidebar badge that used to annotate any
      // slug ending in -copy. Grey's reasoning: duplication is a starting
      // point for a new protocol, and the user will rename it anyway — the
      // annotation just creates visual noise that has to be mentally ignored.
      html += '<div class="proto-item' + active + '"' + draggable + ' data-path="' + item.path + '" title="' + Lab.escHtml(item.title) + '" onclick="loadDoc(\'' + item.path + '\')" style="display:flex;align-items:center">' + '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + Lab.escHtml(item.title) + '</span></div>';
    });
    html += '</div>';
  });

  tree.innerHTML = html || '<div class="empty-state"><span class="material-icons-outlined">search_off</span><p>No protocols match</p></div>';

  // Wire up drag events
  if (loggedIn) initDragDrop();
}

function toggleCategory(el) {
  el.classList.toggle('collapsed');
  var items = el.nextElementSibling;
  if (items) items.classList.toggle('hidden');
}

// ── New Folder ──
async function createNewFolder() {
  // Build options for parent directory dropdown
  var dirOptions = [{ value: '', label: '(top-level)' }];
  NAV.forEach(function(cat) { if (cat.dir) dirOptions.push({ value: cat.dir, label: cat.label }); });

  var result = await Lab.modal.form({
    title: 'New Folder',
    fields: [
      { key: 'name', label: 'Folder name', placeholder: 'e.g. tissue-culture' },
      { key: 'label', label: 'Display label', placeholder: 'e.g. Tissue Culture' },
      { key: 'parent', label: 'Parent directory', type: 'select', options: dirOptions },
    ],
    submitText: 'Create Folder',
  });
  if (!result || !result.name || !result.name.trim()) return;
  var slug = result.name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  var label = result.label && result.label.trim() ? result.label.trim() : slug.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
  var parentDir = result.parent || '';
  var dir = parentDir ? parentDir.trim() + '/' + slug : slug;

  // GitHub requires a file to create a directory — create a placeholder index
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  var indexContent = Lab.buildFrontmatter({ title: 'Index', type: 'index' }, '\n# ' + label.trim() + '\n');
  try {
    await gh.saveFile('docs/' + dir + '/index.md', indexContent, null, 'New folder: ' + label.trim());
    gh.clearObjectIndexCache();

    // Add to CATEGORY_CONFIG and NAV
    CATEGORY_CONFIG.labels[dir] = label.trim();
    CATEGORY_CONFIG.order.push(dir);
    NAV.push({ dir: dir, label: label.trim(), items: [] });

    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Created folder: ' + label.trim(), 'success');
  } catch(e) {
    Lab.showToast('Failed: ' + e.message, 'error');
  }
}

// ── Rename Folder ──
async function renameFolder(catIdx) {
  var cat = NAV[catIdx];
  if (!cat) return;
  var newLabel = await Lab.modal.prompt({ title: 'Rename Folder', message: 'New display label:', defaultValue: cat.label });
  if (!newLabel || !newLabel.trim() || newLabel.trim() === cat.label) return;

  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  // Update the index.md in the directory if it exists
  var indexPath = 'docs/' + cat.dir + '/index.md';
  try {
    var result = await gh.fetchFile(indexPath);
    var newContent = result.content.replace(/^# .+$/m, '# ' + newLabel.trim());
    await gh.saveFile(indexPath, newContent, result.sha, 'Rename folder: ' + cat.label + ' → ' + newLabel.trim());
  } catch(e) {
    // No index.md — that's fine, just update the label locally
  }

  // Update in-memory config and NAV
  CATEGORY_CONFIG.labels[cat.dir] = newLabel.trim();
  cat.label = newLabel.trim();

  renderSidebar(document.getElementById('protoSearch').value);
  Lab.showToast('Renamed to: ' + newLabel.trim(), 'success');
}

// ── Drag and Drop ──
var dragData = null;

function initDragDrop() {
  var items = document.querySelectorAll('.proto-item[draggable="true"]');
  var containers = document.querySelectorAll('.proto-items');
  var categories = document.querySelectorAll('.proto-category');

  items.forEach(function(el) {
    el.addEventListener('dragstart', function(e) {
      dragData = { path: el.dataset.path, title: el.textContent };
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Expand all collapsed categories so user can see drop targets
      categories.forEach(function(cat) {
        cat.classList.remove('collapsed');
        var next = cat.nextElementSibling;
        if (next) next.classList.remove('hidden');
      });
    });
    el.addEventListener('dragend', function() {
      el.classList.remove('dragging');
      dragData = null;
      containers.forEach(function(c) { c.classList.remove('drag-over'); });
      categories.forEach(function(c) { c.classList.remove('drag-over-cat'); });
    });
  });

  containers.forEach(function(container) {
    container.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      container.classList.add('drag-over');
      // Also highlight the category header
      var catHeader = container.previousElementSibling;
      if (catHeader) catHeader.classList.add('drag-over-cat');
    });
    container.addEventListener('dragleave', function(e) {
      // Only remove if leaving the container entirely
      if (!container.contains(e.relatedTarget)) {
        container.classList.remove('drag-over');
        var catHeader = container.previousElementSibling;
        if (catHeader) catHeader.classList.remove('drag-over-cat');
      }
    });
    container.addEventListener('drop', function(e) {
      e.preventDefault();
      container.classList.remove('drag-over');
      var catHeader = container.previousElementSibling;
      if (catHeader) catHeader.classList.remove('drag-over-cat');
      if (!dragData) return;

      var targetCatIdx = parseInt(container.dataset.catIdx);
      var targetCat = NAV[targetCatIdx];
      if (!targetCat) return;

      // Get target directory from the first item in this category, or from config
      var targetDir = getNavCategoryDir(targetCat);
      if (!targetDir && targetDir !== '') {
        Lab.showToast('Cannot determine target directory', 'error');
        return;
      }

      moveProtocol(dragData.path, dragData.title, targetDir, targetCat.label);
    });
  });
}

function getNavCategoryDir(cat) {
  // Find the directory key for this category by checking items or reversing the label map
  if (cat.items.length > 0) {
    var path = cat.items[0].path;
    var parts = path.split('/');
    parts.pop();
    return parts.join('/');
  }
  // Empty category — find from config labels
  for (var dir in CATEGORY_CONFIG.labels) {
    if (CATEGORY_CONFIG.labels[dir] === cat.label) return dir;
  }
  return null;
}

async function moveProtocol(srcDocPath, title, targetDir, targetLabel) {
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) return;

  // Parse source
  var srcParts = srcDocPath.split('/');
  var slug = srcParts.pop();
  var srcDir = srcParts.join('/');

  // Don't move to same directory
  if (srcDir === targetDir) return;

  var srcFilePath = 'docs/' + srcDocPath + '.md';
  var dstFilePath = 'docs/' + targetDir + '/' + slug + '.md';
  var newDocPath = targetDir + '/' + slug;

  // Show an in-flight toast so it's obvious something is happening even on
  // slow networks. Issue #114: users reported "dragging protocols between
  // folders either doesnt work or doesnt render instantly so yyou cant tell
  // if it worked" — the sidebar was waiting on updateWikilinksAfterMove
  // (which fetches the whole tree and rewrites every referencing file) before
  // re-rendering. Any unhandled error in that pass would also silently block
  // the sidebar update, hence the "doesnt work" part.
  Lab.showToast('Moving to ' + targetLabel + '…', 'info', 2000);

  try {
    // Fetch source file content and SHA
    var result = await gh.fetchFile(srcFilePath);

    // Create file in new location
    await gh.saveFile(dstFilePath, result.content, null, 'Move ' + slug + ' to ' + targetDir);

    // Delete from old location
    await gh.deleteFile(srcFilePath, result.sha, 'Moved ' + slug + ' from ' + srcDir);

    // ── Live-patch indices so the sidebar (and every other surface that
    // reads object-index / link-index) reflects the move instantly, without
    // waiting ~40s for Pages to redeploy. Same pattern as #94/#95/#96 and
    // #16/#17 backlinks. Do NOT call clearObjectIndexCache here — it would
    // drop the in-memory patch overlay we just set.
    try {
      var parsed = Lab.parseFrontmatter(result.content);
      var meta = parsed.meta || {};
      // Ensure type survives the round-trip even if frontmatter is sparse.
      if (!meta.type) meta.type = 'protocol';
      if (!meta.title) meta.title = title;
      gh.removeFromObjectIndex(srcFilePath);
      gh.patchObjectIndex(dstFilePath, meta);
      gh.removeFromLinkIndex(srcFilePath);
      gh.patchLinkIndex(dstFilePath, parsed.body || '');
    } catch(patchErr) {
      // Patch failures must never block the sidebar re-render.
      console.warn('Index patch after move failed', patchErr);
    }

    // Update local NAV synchronously so the sidebar re-render below reflects
    // the new folder immediately.
    NAV.forEach(function(cat) {
      cat.items = cat.items.filter(function(i) { return i.path !== srcDocPath; });
    });
    injectIntoNav(newDocPath, title);
    // Remove empty categories (except configured ones)
    NAV = NAV.filter(function(cat) { return cat.items.length > 0 || CATEGORY_CONFIG.order.indexOf(getNavCategoryDir(cat)) >= 0; });

    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Moved to ' + targetLabel, 'success');

    // If we were viewing the moved doc, update URL
    if (currentDoc === srcDocPath) {
      loadDoc(newDocPath);
    }

    // Wikilink rewrite runs in the background — it fetches the whole tree
    // and potentially rewrites many files, which can take tens of seconds.
    // Detaching it keeps the sidebar snappy. Errors surface via toast but
    // do not revert the move.
    updateWikilinksAfterMove(srcDocPath, newDocPath).catch(function(e) {
      console.warn('Wikilink rewrite after move failed', e);
      Lab.showToast('Links to old path not updated: ' + e.message, 'warning', 6000);
    });
  } catch(e) {
    Lab.showToast('Move failed: ' + e.message, 'error');
  }
}

// After moving a file, find and update any path-qualified wikilinks pointing to the old path
async function updateWikilinksAfterMove(oldDocPath, newDocPath) {
  var gh = Lab.gh;
  // Build regex to match [[old/path]] or [[old/path|label]]
  var escaped = oldDocPath.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var pattern = new RegExp('\\[\\[' + escaped + '(\\|[^\\]]*)?\\]\\]', 'g');

  // Fetch all .md files from the tree
  var allFiles = await gh.fetchTree('docs');
  var mdFiles = allFiles.filter(function(f) { return f.endsWith('.md'); });

  var updated = 0;
  for (var i = 0; i < mdFiles.length; i++) {
    var filePath = mdFiles[i];
    // Skip the file we just moved (it's already at the new location)
    if (filePath === 'docs/' + oldDocPath + '.md' || filePath === 'docs/' + newDocPath + '.md') continue;

    try {
      var file = await gh.fetchFile(filePath);
      if (!pattern.test(file.content)) continue;

      // Replace path-qualified links with filename-only links
      var slug = oldDocPath.split('/').pop();
      var newContent = file.content.replace(pattern, function(match, label) {
        return '[[' + slug + (label || '') + ']]';
      });

      await gh.saveFile(filePath, newContent, file.sha, 'Update wikilinks: ' + oldDocPath + ' → ' + slug);
      updated++;
    } catch(e) {
      // Skip files we can't read/write
    }
  }
  if (updated > 0) {
    Lab.showToast('Updated links in ' + updated + ' file' + (updated > 1 ? 's' : ''), 'success');
  }
}

// After a slug rename, rewrite inbound wikilinks so [[old-slug]] and
// [[dir/old-slug]] point to [[new-slug]]. Without this, the rename leaves
// dangling references that render as grey "unknown" pills on every consuming
// surface (notebooks, wiki, other protocols). Scoped via the link-index so we
// only fetch the handful of source files that actually reference the renamed
// target — fetching the whole tree (~300 files) would take ~60 seconds.
// QA13 scenario — see qa-state.json.
async function updateWikilinksAfterRename(newDocPath, oldSlug, newSlug, dir) {
  var gh = Lab.gh;
  var oldDocPath = dir + '/' + oldSlug;
  var escapeRe = function(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); };
  // Match bare `[[old-slug]]` + optional `|label` OR path-qualified
  // `[[dir/old-slug]]` + optional `|label`. Both rewrite to `[[new-slug]]`
  // (prefer short form — same convention as updateWikilinksAfterMove).
  var pattern = new RegExp(
    '\\[\\[(?:' + escapeRe(oldDocPath) + '|' + escapeRe(oldSlug) + ')(\\|[^\\]]*)?\\]\\]',
    'g'
  );

  var linkIndex = await gh.fetchLinkIndex();
  var candidates = {};
  linkIndex.forEach(function(e) {
    if (e.target === oldSlug || e.target === oldDocPath) candidates[e.source] = true;
  });
  var sources = Object.keys(candidates).filter(function(s) {
    return s !== oldDocPath && s !== newDocPath;
  });
  if (!sources.length) return { updated: 0, touched: [] };

  var updated = 0;
  var touched = [];
  for (var i = 0; i < sources.length; i++) {
    var filePath = 'docs/' + sources[i] + '.md';
    try {
      var file = await gh.fetchFile(filePath);
      var newContent = file.content.replace(pattern, function(match, label) {
        return '[[' + newSlug + (label || '') + ']]';
      });
      if (newContent === file.content) continue;

      await gh.saveFile(filePath, newContent, file.sha, 'Update wikilinks: ' + oldSlug + ' → ' + newSlug);
      // Keep link-index overlay in sync so the rewritten pills resolve without
      // waiting for the static link-index.json to rebuild on next deploy.
      try { gh.patchLinkIndex(filePath, newContent); } catch(_) {}
      updated++;
      touched.push(filePath);
    } catch(e) {
      // Skip files we can't read/write — do not abort the whole sweep.
    }
  }
  if (updated > 0) {
    Lab.showToast('Updated links in ' + updated + ' file' + (updated > 1 ? 's' : ''), 'success');
  }
  return { updated: updated, touched: touched };
}

// ── Load Document ──
// ── Post-process rendered HTML ──
// 1. Wrap h2 sections in collapsible <details> elements
// 2. Resolve relative image/video paths to raw GitHub URLs
function postProcessRendered(el) {
  if (!el) return;

  // ── Collapsible h2 sections ──
  var h2s = el.querySelectorAll('h2');
  h2s.forEach(function(h2) {
    // Collect all siblings between this h2 and the next h2 (or end)
    var content = [];
    var next = h2.nextElementSibling;
    while (next && next.tagName !== 'H2') {
      content.push(next);
      next = next.nextElementSibling;
    }
    if (!content.length) return;

    var details = document.createElement('details');
    details.open = true;
    details.style.cssText = 'margin:0 0 8px;';

    var summary = document.createElement('summary');
    summary.style.cssText = 'cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;user-select:none;';
    summary.innerHTML = '<span class="material-icons-outlined" style="font-size:18px;color:var(--grey-400);transition:transform .2s">expand_more</span>';

    // Move h2 content into summary
    var h2Clone = h2.cloneNode(true);
    h2Clone.style.display = 'inline';
    h2Clone.style.margin = '0';
    summary.appendChild(h2Clone);

    details.appendChild(summary);

    // Wrap content in a div
    var body = document.createElement('div');
    body.style.cssText = 'padding-left:2px;';
    content.forEach(function(node) { body.appendChild(node); });
    details.appendChild(body);

    // Replace original h2 with details
    h2.parentNode.replaceChild(details, h2);

    // Rotate chevron on toggle
    details.addEventListener('toggle', function() {
      var chevron = summary.querySelector('.material-icons-outlined');
      if (chevron) chevron.style.transform = details.open ? '' : 'rotate(-90deg)';
    });
  });

  // Resolve relative image/video paths against the document's directory
  // so that e.g. images/foo.png in plant-harvesting/poplar-leaf-collection
  // resolves to plant-harvesting/images/foo.png, not /images/foo.png.
  if (currentDoc) {
    var docDir = currentDoc.split('/').slice(0, -1).join('/');
    if (docDir) {
      el.querySelectorAll('img, video source, video').forEach(function(media) {
        var src = media.getAttribute('src') || '';
        if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('/')) {
          media.setAttribute('src', docDir + '/' + src);
        }
      });
    }
  }
  Lab.postProcessImages(el);
  el.querySelectorAll('video').forEach(function(vid) {
    vid.addEventListener('error', function() {
      if (vid.dataset.retried) return;
      vid.dataset.retried = '1';
      var msg = document.createElement('div');
      msg.style.cssText = 'padding:24px;background:var(--grey-100);border-radius:8px;color:var(--grey-500);font-size:13px;font-style:italic;text-align:center;';
      msg.innerHTML = '<span class="material-icons-outlined" style="font-size:32px;display:block;margin-bottom:8px">hourglass_top</span>Video deploying... refresh in a moment';
      vid.parentNode.replaceChild(msg, vid);
    });
  });
}

async function loadDoc(docPath) {
  currentDoc = docPath;
  isEditing = false;
  window.removeEventListener('beforeunload', unsavedGuard);
  document.body.classList.remove('editing-mode');
  editorInstance = null;
  cachedBody = null; // clear cache when loading a different doc

  renderSidebar(document.getElementById('protoSearch').value);
  history.pushState(null, '', location.pathname + '?doc=' + encodeURIComponent(docPath));

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');

  var contentEl = document.getElementById('protoContent');
  contentEl.innerHTML = '<div class="loading-state" style="padding-top:80px"><div class="spinner"></div></div>';

  try {
    var filePath = 'docs/' + docPath + '.md';
    var result = await Lab.gh.fetchFile(filePath);
    currentSha = result.sha;
    var parsed = Lab.parseFrontmatter(result.content);
    currentMeta = parsed.meta;
    var title = parsed.meta.title || docPath.split('/').pop();

    var html = await Lab.editorModal.renderMarkdown(parsed.body);

    contentEl.innerHTML =
      '<div class="proto-content">' +
        '<div class="proto-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(docPath) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="togglePrintPreview(this)"><span class="material-icons-outlined">article</span> Print Preview</button>' +
            (Lab.gh.isLoggedIn() ?
              '<button class="btn btn-outline btn-sm" onclick="renameDoc()"><span class="material-icons-outlined">drive_file_rename_outline</span> Rename</button>' +
              '<button class="btn btn-outline btn-sm" onclick="duplicateDoc()"><span class="material-icons-outlined">content_copy</span> Duplicate</button>' +
              '<button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteDoc()"><span class="material-icons-outlined">delete</span> Delete</button>' +
              '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span> Edit</button>' : '') +
          '</div>' +
        '</div>' +
        (Lab.renderFrontmatterBar ? Lab.renderFrontmatterBar(parsed.meta) : '') +
        '<div class="lab-rendered theme-teal" id="renderedDoc">' + html + '</div>' +
      '</div>';

    // Process wikilinks
    var renderedEl = document.getElementById('renderedDoc');
    if (Lab.wikilinks) {
      await Lab.wikilinks.processRendered(renderedEl);
    }
    postProcessRendered(renderedEl);

    // Scroll to top
    document.getElementById('protoMain').scrollTop = 0;
  } catch(e) {
    contentEl.innerHTML = '<div class="proto-content"><div class="empty-state"><span class="material-icons-outlined">error</span><p>' + Lab.escHtml(Lab.formatLoadError(e)) + '</p></div></div>';
  }
}

// ── Edit Mode ──
var editFrontmatter = ''; // preserved frontmatter for re-assembly on save
var cachedBody = null; // body from most recent save (avoids stale GitHub API reads)

async function startEdit() {
  console.log('[protocols] startEdit called, currentDoc:', currentDoc, 'isEditing:', isEditing);
  if (!currentDoc || isEditing) return;
  isEditing = true;
  document.body.classList.remove('print-preview-active');
  window.addEventListener('beforeunload', unsavedGuard);
  document.body.classList.add('editing-mode');

  var contentEl = document.getElementById('protoContent');
  var filePath = 'docs/' + currentDoc + '.md';

  try {
    var bodyOnly;
    if (cachedBody !== null) {
      // Use locally cached body from most recent save (avoids GitHub API propagation delay)
      bodyOnly = cachedBody;
      console.log('[protocols] using cached body, length:', bodyOnly.length);
    } else {
      console.log('[protocols] fetching file:', filePath);
      var result = await Lab.gh.fetchFile(filePath);
      currentSha = result.sha;
      console.log('[protocols] file fetched, content length:', result.content.length);

      // Strip frontmatter — Toast UI can't handle YAML blocks in WYSIWYG mode
      var parsed = Lab.parseFrontmatter(result.content);
      editFrontmatter = parsed.meta;
      bodyOnly = parsed.body;
    }
    console.log('[protocols] body length:', bodyOnly.length, 'preview:', bodyOnly.substring(0, 100));

    contentEl.innerHTML =
      '<div class="proto-content">' +
        '<div class="proto-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc) + ' (editing)</div>' +
          '<div style="display:flex;gap:6px;align-items:center">' +
            '<button class="btn btn-outline btn-sm" onclick="cancelEdit()" title="Cancel"><span class="material-icons-outlined">close</span><span class="btn-label"> Cancel</span></button>' +
            '<button class="btn btn-primary btn-sm" id="saveBtn" onclick="saveDoc()" title="Save"><span class="material-icons-outlined">save</span><span class="btn-label"> Save</span></button>' +
          '</div>' +
        '</div>' +
        (Lab.renderFrontmatterBar && currentMeta ? Lab.renderFrontmatterBar(currentMeta) : '') +
        '<div class="proto-editor-surface em-surface" id="editorSurface"></div>' +
      '</div>';

    var surface = document.getElementById('editorSurface');
    console.log('[protocols] editorSurface found:', !!surface, 'Lab.editorModal:', !!Lab.editorModal, 'initFullpage:', !!Lab.editorModal.initFullpage);

    editorInstance = await Lab.editorModal.initFullpage(
      surface,
      bodyOnly,
      filePath,
      currentSha
    );
    console.log('[protocols] editor initialized:', !!editorInstance);
  } catch(e) {
    console.error('[protocols] startEdit error:', e);
    Lab.showToast('Failed to load for editing: ' + e.message, 'error');
    isEditing = false;
    window.removeEventListener('beforeunload', unsavedGuard);
  }
}

async function saveDoc() {
  if (!editorInstance) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons-outlined">hourglass_empty</span> Saving...';

  try {
    // Re-assemble frontmatter + edited body
    var body = editorInstance.getMarkdown();

    // Capture loaded images from editor before destroying it (for instant view rendering)
    var editorImages = {};
    var editorSurface = document.getElementById('editorSurface');
    if (editorSurface) {
      editorSurface.querySelectorAll('img').forEach(function(img) {
        if (img.src && img.complete && img.naturalWidth > 0) {
          // Map the filename to the loaded src (may be data URL from API fallback)
          var origSrc = img.dataset.realSrc || img.getAttribute('src') || '';
          var fname = origSrc.split('/').pop().split('?')[0];
          if (fname) editorImages[fname] = img.src;
        }
      });
    }

    var fullContent = Lab.buildFrontmatter(editFrontmatter, body);
    var filePath = 'docs/' + currentDoc + '.md';
    var result = await Lab.gh.saveFile(filePath, fullContent, currentSha, 'Update ' + currentDoc);
    currentSha = result.sha;
    cachedBody = body; // cache for immediate re-editing without API delay
    Lab.gh.clearObjectIndexCache();
    Lab.showToast('Saved', 'success');

    // Render saved content directly (avoid GitHub API propagation delay)
    isEditing = false;
    window.removeEventListener('beforeunload', unsavedGuard);
    document.body.classList.remove('editing-mode');
    editorInstance = null;
    var html = await Lab.editorModal.renderMarkdown(body);
    var contentEl = document.getElementById('protoContent');
    contentEl.innerHTML =
      '<div class="proto-content">' +
        '<div class="proto-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="togglePrintPreview(this)"><span class="material-icons-outlined">article</span> Print Preview</button>' +
            '<button class="btn btn-outline btn-sm" onclick="renameDoc()"><span class="material-icons-outlined">drive_file_rename_outline</span> Rename</button>' +
            '<button class="btn btn-outline btn-sm" onclick="duplicateDoc()"><span class="material-icons-outlined">content_copy</span> Duplicate</button>' +
            '<button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteDoc()"><span class="material-icons-outlined">delete</span> Delete</button>' +
            '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span> Edit</button>' +
          '</div>' +
        '</div>' +
        (Lab.renderFrontmatterBar && editFrontmatter ? Lab.renderFrontmatterBar(editFrontmatter) : '') +
        '<div class="lab-rendered theme-teal" id="renderedDoc">' + html + '</div>' +
      '</div>';
    var renderedEl2 = document.getElementById('renderedDoc');
    if (Lab.wikilinks) {
      await Lab.wikilinks.processRendered(renderedEl2);
    }
    postProcessRendered(renderedEl2);

    // Inject images captured from the editor so they show instantly (no waiting for Pages deploy)
    if (Object.keys(editorImages).length) {
      renderedEl2.querySelectorAll('img').forEach(function(img) {
        var src = img.getAttribute('src') || '';
        var fname = src.split('/').pop().split('?')[0];
        if (fname && editorImages[fname]) {
          img.src = editorImages[fname];
        }
      });
    }

    document.getElementById('protoMain').scrollTop = 0;
  } catch(e) {
    var msg = e.message || 'Unknown error';
    if (msg.includes('does not match')) {
      Lab.showToast('Someone else edited this file. Click "Reload & retry" to get the latest version, then re-apply your changes.', 'error', 10000);
      // Add a reload button to the save bar
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons-outlined">refresh</span> Reload & retry';
      btn.onclick = function() {
        // Reload the doc (discards current edits, loads latest from GitHub)
        loadDoc(currentDoc);
        Lab.showToast('Reloaded latest version. Your previous edits were not saved — re-apply them and save again.', 'info', 8000);
      };
    } else {
      Lab.showToast('Save failed: ' + msg, 'error');
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons-outlined">save</span> Save';
    }
  }
}

function togglePrintPreview(btn) {
  var rendered = document.getElementById('renderedDoc');
  if (!rendered) return;
  var active = document.body.classList.toggle('print-preview-active');
  if (btn) {
    btn.innerHTML = active
      ? '<span class="material-icons-outlined">visibility_off</span> Exit Preview'
      : '<span class="material-icons-outlined">article</span> Print Preview';
  }
  if (active) {
    showPrintPreview(rendered);
    mountPrintFab();
  } else {
    // Remove the iframe overlay
    var iframe = document.getElementById('print-preview-frame');
    if (iframe) iframe.remove();
    rendered.style.display = '';
    var fab = document.getElementById('print-preview-fab');
    if (fab) fab.remove();
  }
}

// Floating Print button pinned to the browser viewport (NOT inside the iframe,
// where position:fixed anchors to the iframe's own thousands-of-pixels-tall
// content area and ends up scrolled off-screen).
function mountPrintFab() {
  if (document.getElementById('print-preview-fab')) return;
  var fab = document.createElement('button');
  fab.id = 'print-preview-fab';
  fab.type = 'button';
  fab.innerHTML = '<span class="material-icons-outlined" style="vertical-align:middle">print</span> Print';
  fab.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:10000;' +
    'background:#009688;color:#fff;border:none;border-radius:28px;' +
    'padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer;' +
    'box-shadow:0 2px 10px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;' +
    'font-family:inherit';
  fab.addEventListener('mouseenter', function() { fab.style.background = '#00796b'; });
  fab.addEventListener('mouseleave', function() { fab.style.background = '#009688'; });
  fab.addEventListener('click', function() {
    var iframe = document.getElementById('print-preview-frame');
    if (iframe && iframe.contentWindow) iframe.contentWindow.print();
  });
  document.body.appendChild(fab);
}

      '.content details[open] summary { margin-bottom: 6pt; }' +
      '.content summary { font-weight: 600; cursor: pointer; }' +
      '.object-pill { background: none !important; color: #000 !important; padding: 0 !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; text-decoration: underline !important; font-size: inherit !important; gap: 0 !important; }' +
      '.object-pill i, .object-pill .material-icons-outlined, .object-pill .material-icons { display: none !important; }' +
      '.frontmatter-bar { margin: 0 0 12pt; padding: 6pt 0; border-bottom: 1pt solid #ddd; display: flex; flex-wrap: wrap; gap: 6pt; }' +
      '.frontmatter-bar .fm-pill { display: inline-block; padding: 2pt 8pt; border-radius: 10pt; font-size: 9pt; font-weight: 500; }' +
      '.print-fab { position: fixed; bottom: 24px; right: 24px; background: #009688; color: #fff; border: none; border-radius: 28px; padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.25); font-family: inherit; display: flex; align-items: center; gap: 8px; z-index: 100; }' +
      '.print-fab:hover { background: #00796b; }' +
      '@media print {' +
        '  @page { size: letter; margin: 0; }' +
        '  html, body { background: #fff !important; padding: 0 !important; margin: 0 !important; }' +
        '  .print-fab { display: none !important; }' +
        '  .page { box-shadow: none !important; margin: 0 !important; width: 8.5in !important; min-height: 11in !important; page-break-after: always; break-after: page; }' +
        '  .page:last-child { page-break-after: auto; break-after: auto; }' +
        '  .page-number { position: absolute !important; }' +
      '}';
    idoc.head.appendChild(style);

    // Create measuring container with the rendered HTML. It MUST match the
    // per-page content width (8.5in − 2×1in = 6.5in) so that offsetHeight
    // reflects the height blocks will have once placed into a .page, not the
    // much wider iframe body. Without this, images over-measured (leaving
    // huge blank space on each page) and text under-measured (overflowed).
    var content = idoc.createElement('div');
    content.className = 'content';
    content.style.width = '6.5in';
    content.style.maxWidth = '6.5in';
    content.style.margin = '0 auto';
    // Include frontmatter bar in print preview if available
    var fmBar = rendered.parentNode.querySelector('.frontmatter-bar');
    if (fmBar) content.innerHTML = fmBar.outerHTML + rendered.innerHTML;
    else content.innerHTML = rendered.innerHTML;
    content.querySelectorAll('details').forEach(function(d) { d.open = true; });
    // Strip Material Icons spans (font not loaded in iframe)
    content.querySelectorAll('.material-icons-outlined, .material-icons').forEach(function(el) { el.remove(); });
    idoc.body.appendChild(content);

    // Unwrap containers to get leaf block elements
    function getBlocks(el) {
      var result = [];
      for (var i = 0; i < el.childNodes.length; i++) {
        var child = el.childNodes[i];
        if (child.nodeType === 3) {
          if (child.textContent.trim()) result.push(child);
        } else if (child.nodeType === 1) {
          var tag = child.tagName;
          if (tag === 'DETAILS' || tag === 'DIV' || tag === 'SECTION') {
            // For DETAILS, keep the summary but unwrap the rest
            if (tag === 'DETAILS') {
              var sum = child.querySelector('summary');
              if (sum) result.push(sum);
              var inner = child.querySelector('div') || child;
              result = result.concat(getBlocks(inner === child ? child : inner));
            } else if (tag === 'DIV' && child.classList && child.classList.contains('frontmatter-bar')) {
              // The frontmatter bar carries its own flex layout + bottom border.
              // Keep it as a single block so its wrapper styles survive into the
              // iframe (cycle 58: was being unwrapped, leaving pills bare).
              result.push(child);
            } else {
              result = result.concat(getBlocks(child));
            }
          } else {
            result.push(child);
          }
        }
      }
      return result;
    }

    // Wait for all images to load before measuring heights — otherwise images
    // register as 0 height and pagination puts them on the wrong page (#93).
    var imgs = Array.from(content.querySelectorAll('img'));
    var imgWaits = imgs.map(function(img) {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise(function(res) {
        var done = false;
        function finish() { if (done) return; done = true; res(); }
        img.addEventListener('load', finish);
        img.addEventListener('error', finish);
        setTimeout(finish, 4000); // don't stall forever on slow/dead images
      });
    });

    Promise.all(imgWaits).then(function() { paginate(); });

    function paginate() {
    var blocks = getBlocks(content);
    var PAGE_H = 912; // 11in - 1.5in margins at 96dpi

    // Build pages
    var pagesDiv = idoc.createElement('div');
    var pageNum = 0;
    var currentContent = null;
    var usedH = 0;

    function newPage() {
      pageNum++;
      var page = idoc.createElement('div');
      page.className = 'page';
      currentContent = idoc.createElement('div');
      currentContent.className = 'content';
      page.appendChild(currentContent);
      pagesDiv.appendChild(page);
      usedH = 0;
    }
    newPage();

    function isImageBlock(el) {
      if (el.nodeType !== 1) return false;
      if (el.tagName === 'IMG' || el.tagName === 'FIGURE') return true;
      // paragraph / list item whose only real content is an image
      var imgs = el.querySelectorAll('img');
      if (!imgs.length) return false;
      var text = (el.textContent || '').trim();
      return text.length < 40;
    }

    blocks.forEach(function(block, idx) {
      var h = block.nodeType === 1 ? block.offsetHeight : 20;
      if (block.nodeType === 1) {
        var cs = idoc.defaultView.getComputedStyle(block);
        h += (parseFloat(cs.marginTop) || 0) + (parseFloat(cs.marginBottom) || 0);
      }
      // Keep an image together with the heading immediately before it, so
      // the heading doesn't orphan at the bottom of a page (#93). cycle 49:
      // also treat <summary> (from an unwrapped <details>) as a heading and
      // keep tables / blockquotes / callouts together with their preceding
      // heading the same way images are.
      var prev = idx > 0 ? blocks[idx - 1] : null;
      var prevIsHeadingLike = prev && prev.nodeType === 1 &&
        (/^H[1-6]$/.test(prev.tagName) || prev.tagName === 'SUMMARY');
      var blockIsTall = block.nodeType === 1 && (
        isImageBlock(block) ||
        block.tagName === 'TABLE' || block.tagName === 'FIGURE' ||
        block.tagName === 'BLOCKQUOTE' ||
        (block.classList && (block.classList.contains('callout') || block.classList.contains('admonition')))
      );
      if (usedH > 0 && usedH + h > PAGE_H) {
        if (prevIsHeadingLike && blockIsTall && currentContent.lastChild === prev) {
          currentContent.removeChild(prev);
          newPage();
          currentContent.appendChild(prev);
          var ph = prev.offsetHeight;
          var pcs = idoc.defaultView.getComputedStyle(prev);
          ph += (parseFloat(pcs.marginTop) || 0) + (parseFloat(pcs.marginBottom) || 0);
          usedH = ph;
        } else {
          newPage();
        }
      }
      currentContent.appendChild(block);
      usedH += h;
    });

    content.remove();

    // Add page numbers
    var allPages = pagesDiv.querySelectorAll('.page');
    var total = allPages.length;
    allPages.forEach(function(p, i) {
      var num = idoc.createElement('div');
      num.className = 'page-number';
      num.textContent = (i + 1) + ' of ' + total;
      p.appendChild(num);
    });

    idoc.body.innerHTML = '';
    idoc.body.appendChild(pagesDiv);

    // Resize iframe to fit content
    iframe.style.height = (idoc.body.scrollHeight + 48) + 'px';
    }
  });

  // Trigger load by writing a blank doc
  iframe.src = 'about:blank';
}

// Inject a new doc into the local NAV so sidebar updates immediately
function injectIntoNav(docPath, title) {
  var parts = docPath.split('/');
  parts.pop();
  var dir = parts.join('/');
  var label = CATEGORY_CONFIG.labels[dir] || prettifyDir(dir);

  // Find existing category or create one
  var cat = NAV.find(function(c) { return c.label === label; });
  if (!cat) {
    cat = { label: label, items: [] };
    NAV.push(cat);
  }
  // Avoid duplicates
  if (!cat.items.some(function(i) { return i.path === docPath; })) {
    cat.items.push({ title: title, path: docPath });
    cat.items.sort(function(a, b) { return a.title.localeCompare(b.title); });
  }
  // Rebuild flat search list
  allProtocols = [];
  NAV.forEach(function(c) {
    c.items.forEach(function(item) {
      allProtocols.push({ title: item.title, path: item.path, category: c.label });
    });
  });
}

async function createNewProtocol() {
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  // Build directory options from NAV
  var defaultDir = 'wet-lab';
  if (currentDoc) { var _p = currentDoc.split('/'); _p.pop(); defaultDir = _p.join('/'); }
  var dirOpts = [];
  NAV.forEach(function(cat) { if (cat.dir) dirOpts.push({ value: cat.dir, label: cat.label }); });

  var result = await Lab.modal.form({
    title: 'New Protocol',
    fields: [
      { key: 'title', label: 'Protocol title', placeholder: 'e.g. RNA Extraction from Leaf Tissue' },
      { key: 'dir', label: 'Folder', type: 'select', options: dirOpts, default: defaultDir },
    ],
    submitText: 'Create',
  });
  if (!result || !result.title || !result.title.trim()) return;
  var title = result.title.trim();

  var slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  var dir = result.dir || defaultDir;

  var user = gh.getUser();
  var userName = user ? user.name || user.login : 'unknown';
  var today = new Date().toISOString().slice(0, 10);

  var content = Lab.buildFrontmatter(
    { title: title, type: 'protocol' },
    '\n# ' + title + '\n\n*Created by ' + userName + ' on ' + today + '*\n\n'
  );

  var filePath = 'docs/' + dir + '/' + slug + '.md';
  var docPath = dir + '/' + slug;

  try {
    await gh.saveFile(filePath, content, null, 'New protocol: ' + title);
    gh.clearObjectIndexCache();
    injectIntoNav(docPath, title);
    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Created: ' + title, 'success');
    loadDoc(docPath);
  } catch(e) {
    Lab.showToast('Create failed: ' + e.message, 'error');
  }
}

async function duplicateDoc() {
  if (!currentDoc) return;
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  try {
    // Fetch source file
    var srcPath = 'docs/' + currentDoc + '.md';
    var result = await gh.fetchFile(srcPath);
    var parsed = Lab.parseFrontmatter(result.content);
    var srcTitle = parsed.meta.title || currentDoc.split('/').pop();

    // Build new filename: "Name (2).md" in same directory
    var dir = currentDoc.substring(0, currentDoc.lastIndexOf('/'));
    var srcSlug = currentDoc.split('/').pop();
    var newSlug = srcSlug + '-copy';
    var newPath = 'docs/' + dir + '/' + newSlug + '.md';
    var newTitle = srcTitle + ' (Copy)';

    // Get user info for attribution
    var user = gh.getUser();
    var userName = user ? user.name || user.login : 'unknown';
    var today = new Date().toISOString().slice(0, 10);

    // Update frontmatter title
    parsed.meta.title = newTitle;

    // Prepend duplication note to body
    var dupeNote = '\n> Duplicated from [[' + srcSlug + ']] by ' + userName + ' on ' + today + '\n\n';
    var newBody = dupeNote + parsed.body;
    var newContent = Lab.buildFrontmatter(parsed.meta, newBody);

    await gh.saveFile(newPath, newContent, null, 'Duplicate protocol: ' + srcTitle);
    gh.clearObjectIndexCache();
    injectIntoNav(dir + '/' + newSlug, newTitle);
    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Duplicated: ' + newTitle, 'success');

    // Load the new doc
    loadDoc(dir + '/' + newSlug);
  } catch(e) {
    Lab.showToast('Duplicate failed: ' + e.message, 'error');
  }
}

async function deleteDoc() {
  if (!currentDoc) return;
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  var title = currentDoc.split('/').pop();
  // Find display title from NAV
  NAV.forEach(function(cat) {
    cat.items.forEach(function(i) { if (i.path === currentDoc) title = i.title; });
  });

  var confirmed = await Lab.modal.confirm({ title: 'Delete Protocol', message: 'Delete "' + title + '"?\nThis cannot be undone.', confirmText: 'Delete', danger: true });
  if (!confirmed) return;

  try {
    var filePath = 'docs/' + currentDoc + '.md';
    await gh.deleteFile(filePath, null, 'Delete protocol: ' + title);
    gh.removeFromObjectIndex(filePath);

    // Remove from local NAV
    NAV.forEach(function(cat) {
      cat.items = cat.items.filter(function(i) { return i.path !== currentDoc; });
    });
    NAV = NAV.filter(function(cat) { return cat.items.length > 0 || CATEGORY_CONFIG.order.indexOf(getNavCategoryDir(cat)) >= 0; });

    currentDoc = null;
    currentSha = null;
    cachedBody = null;
    renderSidebar(document.getElementById('protoSearch').value);
    showWelcome();
    Lab.showToast('Deleted: ' + title, 'success');
  } catch(e) {
    Lab.showToast('Delete failed: ' + e.message, 'error');
  }
}

var renameInFlight = false;
async function renameDoc() {
  if (!currentDoc) return;
  // Guard against impatient double-clicks — the first click deletes the old
  // file, so a second click with the stale sha would 404 and fire a spurious
  // "Rename failed: Not Found" toast even though the rename actually succeeded.
  // Set before the first await so both synchronous clicks can't pass the check.
  if (renameInFlight) return;
  renameInFlight = true;
  try {
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  // Get current title. Prefer the loaded frontmatter title (set by loadDoc),
  // then NAV's cached title, and only fall back to the slug if neither is
  // available — otherwise the rename prompt and the H1 rewrite both default
  // to the slug, which (a) shows users the URL slug instead of their title
  // in the prompt, and (b) makes the H1 regex below fail to match the actual
  // human-titled heading. qa-cycle-64.
  var slug = currentDoc.split('/').pop();
  var oldTitle = (currentMeta && currentMeta.title) || slug;
  NAV.forEach(function(cat) {
    cat.items.forEach(function(i) {
      if (i.path === currentDoc && i.title) oldTitle = i.title;
    });
  });

  var newTitle = await Lab.modal.prompt({ title: 'Rename Protocol', message: 'New title:', defaultValue: oldTitle });
  if (!newTitle || newTitle === oldTitle) return;

  try {
    var filePath = 'docs/' + currentDoc + '.md';
    var result = await gh.fetchFile(filePath);
    var parsed = Lab.parseFrontmatter(result.content);

    // Update title in frontmatter
    parsed.meta.title = newTitle;

    // Update H1 heading in body if it matches old title
    var newBody = parsed.body.replace(
      new RegExp('^(# )' + oldTitle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*$', 'm'),
      '$1' + newTitle
    );

    var newContent = Lab.buildFrontmatter(parsed.meta, newBody);

    // Check if slug should change too
    var dir = currentDoc.substring(0, currentDoc.lastIndexOf('/'));
    var oldSlug = currentDoc.split('/').pop();
    var newSlug = Lab.slugify(newTitle);

    if (newSlug !== oldSlug) {
      // Slug changed — create new file, delete old
      var newPath = 'docs/' + dir + '/' + newSlug + '.md';
      var createResult = await gh.saveFile(newPath, newContent, null, 'Rename: ' + oldTitle + ' → ' + newTitle);
      await gh.deleteFile(filePath, result.sha, 'Renamed ' + oldSlug + ' to ' + newSlug);

      var newDocPath = dir + '/' + newSlug;

      // Update NAV
      NAV.forEach(function(cat) {
        cat.items.forEach(function(i) {
          if (i.path === currentDoc) { i.path = newDocPath; i.title = newTitle; }
        });
      });

      gh.clearObjectIndexCache();
      gh.patchObjectIndex(newPath, parsed.meta);
      gh.removeFromObjectIndex(filePath);
      renderSidebar(document.getElementById('protoSearch').value);

      // Render directly from saved content (avoid stale GitHub API cache)
      currentDoc = newDocPath;
      currentSha = createResult.sha;
      editFrontmatter = parsed.meta;
      cachedBody = newBody;
      isEditing = false;
      window.removeEventListener('beforeunload', unsavedGuard);

      // QA13: rewrite inbound wikilinks in other files so [[old-slug]] and
      // [[dir/old-slug]] continue to resolve to the renamed protocol. Runs in
      // the background so the rename toast fires promptly.
      updateWikilinksAfterRename(currentDoc, oldSlug, newSlug, dir).catch(function(e) {
        console.warn('Wikilink rewrite after rename failed', e);
        Lab.showToast('Links to old slug not fully updated: ' + e.message, 'warning', 6000);
      });
    } else {
      // Same slug, just update title in file
      var saveResult = await gh.saveFile(filePath, newContent, result.sha, 'Rename: ' + oldTitle + ' → ' + newTitle);
      currentSha = saveResult.sha;

      // Update NAV
      NAV.forEach(function(cat) {
        cat.items.forEach(function(i) {
          if (i.path === currentDoc) i.title = newTitle;
        });
      });

      gh.patchObjectIndex(filePath, parsed.meta);
      renderSidebar(document.getElementById('protoSearch').value);

      // Render directly from saved content (avoid stale GitHub API cache)
      editFrontmatter = parsed.meta;
      cachedBody = newBody;
      isEditing = false;
      window.removeEventListener('beforeunload', unsavedGuard);
    }

    // Render the content directly instead of calling loadDoc (which hits stale API cache)
    var html = await Lab.editorModal.renderMarkdown(newBody);
    var contentEl = document.getElementById('protoContent');
    contentEl.innerHTML =
      '<div class="proto-content">' +
        '<div class="proto-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="togglePrintPreview(this)"><span class="material-icons-outlined">article</span> Print Preview</button>' +
            '<button class="btn btn-outline btn-sm" onclick="renameDoc()"><span class="material-icons-outlined">drive_file_rename_outline</span> Rename</button>' +
            '<button class="btn btn-outline btn-sm" onclick="duplicateDoc()"><span class="material-icons-outlined">content_copy</span> Duplicate</button>' +
            '<button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteDoc()"><span class="material-icons-outlined">delete</span> Delete</button>' +
            '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span> Edit</button>' +
          '</div>' +
        '</div>' +
        (Lab.renderFrontmatterBar && editFrontmatter ? Lab.renderFrontmatterBar(editFrontmatter) : '') +
        '<div class="lab-rendered theme-teal" id="renderedDoc">' + html + '</div>' +
      '</div>';
    currentMeta = editFrontmatter;
    var renderedEl = document.getElementById('renderedDoc');
    if (Lab.wikilinks) {
      await Lab.wikilinks.processRendered(renderedEl);
    }
    postProcessRendered(renderedEl);
    document.getElementById('protoMain').scrollTop = 0;
    history.pushState(null, '', '?doc=' + encodeURIComponent(currentDoc));

    Lab.showToast('Renamed to: ' + newTitle, 'success');
  } catch(e) {
    Lab.showToast('Rename failed: ' + e.message, 'error');
  }
  } finally {
    renameInFlight = false;
  }
}

function cancelEdit() {
  if (currentDoc) loadDoc(currentDoc);
}

// ── Welcome ──
function showWelcome() {
  var contentEl = document.getElementById('protoContent');
  contentEl.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--grey-400);gap:12px;padding:60px">' +
      '<span class="material-icons-outlined" style="font-size:56px;color:var(--grey-300)">menu_book</span>' +
      '<p style="font-size:15px">Select a protocol from the sidebar</p>' +
    '</div>';
}

// ── Search ──
document.getElementById('protoSearch').addEventListener('input', function() {
  renderSidebar(this.value);
});

// ── Mobile sidebar ──
document.getElementById('hamburger').onclick = function() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('open');
};
document.getElementById('sidebarBackdrop').onclick = function() {
  document.getElementById('sidebar').classList.remove('open');
  this.classList.remove('open');
};

// ── Keyboard shortcut ──
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 's' && isEditing) {
    e.preventDefault();
    saveDoc();
  }
});

// ── Back/forward navigation ──
window.addEventListener('popstate', function() {
  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  if (doc) loadDoc(doc);
  else showWelcome();
});

// ── Init ──
(async function init() {
  await buildNav();
  renderSidebar();

  // Show logged-in features
  loggedIn = Lab.gh.isLoggedIn();
  if (loggedIn) {
    document.getElementById('newProtoBtn').style.display = '';
    document.getElementById('newFolderBtn').style.display = '';
  }

  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  if (doc) {
    loadDoc(doc);
  } else {
    showWelcome();
  }
})();
</script>
