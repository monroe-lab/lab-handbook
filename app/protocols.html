<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocols - Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.protocols-layout {
  display: flex;
  height: calc(100vh - var(--nav-height));
}

/* Sidebar */
.proto-sidebar {
  width: 280px;
  min-width: 280px;
  background: #fff;
  border-right: 1px solid var(--grey-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.proto-sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--grey-200);
}
.proto-sidebar-header input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  outline: none;
}
.proto-sidebar-header input:focus { border-color: var(--teal); }
.proto-sidebar-header .search-icon {
  position: absolute;
  left: 26px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--grey-500);
  pointer-events: none;
}
.proto-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.proto-tree::-webkit-scrollbar { width: 5px; }
.proto-tree::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 3px; }
.proto-category {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--grey-600);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  user-select: none;
  background: var(--grey-50);
  border-bottom: 1px solid var(--grey-200);
}
.proto-category:hover { color: var(--teal); background: var(--teal-50); }
.proto-category .material-icons-outlined { font-size: 18px; transition: transform .15s; color: var(--grey-400); }
.proto-category.collapsed .material-icons-outlined { transform: rotate(-90deg); }
.proto-cat-count {
  margin-left: auto;
  font-size: 10px;
  font-weight: 500;
  color: var(--grey-400);
  background: var(--grey-200);
  padding: 1px 6px;
  border-radius: 8px;
}
.proto-items { padding-left: 8px; }
.proto-items.hidden { display: none; }
.proto-item {
  display: block;
  padding: 6px 16px 6px 24px;
  font-size: 13px;
  color: var(--grey-700);
  text-decoration: none;
  cursor: pointer;
  border-radius: 0 4px 4px 0;
  transition: background .1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.proto-item:hover { background: var(--grey-100); color: var(--grey-900); }
.proto-item.active { background: var(--teal-light); color: var(--teal-dark); font-weight: 500; }

/* Main content */
.proto-main {
  flex: 1;
  overflow-y: auto;
  background: var(--grey-100);
}
.proto-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 40px;
}

/* Rendered markdown */
.proto-rendered { font-size: 15px; line-height: 1.75; color: var(--grey-900); }
.proto-rendered h1 { font-size: 28px; font-weight: 700; margin: 0 0 12px; border-bottom: 2px solid var(--grey-200); padding-bottom: 10px; }
.proto-rendered h2 { font-size: 22px; font-weight: 600; margin: 28px 0 10px; color: var(--grey-800); }
.proto-rendered h3 { font-size: 18px; font-weight: 600; margin: 22px 0 8px; }
.proto-rendered h4 { font-size: 16px; font-weight: 600; margin: 18px 0 6px; }
.proto-rendered table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.proto-rendered td, .proto-rendered th { border: 1px solid var(--grey-300); padding: 8px 12px; }
.proto-rendered thead th { background: var(--grey-50); font-weight: 600; }
.proto-rendered code { background: var(--grey-100); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.proto-rendered pre { background: var(--grey-900); color: #e0e0e0; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
.proto-rendered pre code { background: transparent; padding: 0; color: inherit; }
.proto-rendered ul, .proto-rendered ol { padding-left: 24px; margin: 8px 0; }
.proto-rendered li { margin: 4px 0; }
.proto-rendered blockquote { border-left: 4px solid var(--teal); padding: 8px 16px; margin: 12px 0; background: var(--teal-50); border-radius: 0 8px 8px 0; }
.proto-rendered img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
.proto-rendered a:not(.object-pill) { color: var(--teal-dark); }
.proto-rendered hr { border: none; border-top: 1px solid var(--grey-300); margin: 24px 0; }

/* Welcome / card grid */
.proto-welcome { padding: 32px 40px; max-width: 1100px; margin: 0 auto; }
.proto-welcome h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
.proto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.proto-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: box-shadow .15s, transform .15s;
  text-decoration: none;
  color: inherit;
}
.proto-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.proto-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.proto-card p { font-size: 13px; color: var(--grey-500); }

/* Edit toolbar */
.proto-edit-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--grey-200);
}
.proto-edit-bar .breadcrumb { font-size: 13px; color: var(--grey-500); }

/* Editing surface */
.proto-editor-surface { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; min-height: 500px; }

/* Mobile hamburger */
.proto-hamburger {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--teal);
  color: #fff;
  border: none;
  box-shadow: var(--shadow-lg);
  cursor: pointer;
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.proto-hamburger .material-icons-outlined { font-size: 24px; }
.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 200;
}

/* Drag and drop */
.proto-item[draggable="true"] { cursor: grab; }
.proto-item.dragging { opacity: .4; }
.proto-items.drag-over { background: var(--teal-50); outline: 2px dashed var(--teal); outline-offset: -2px; border-radius: 4px; }
.proto-category.drag-over-cat { background: var(--teal-50); color: var(--teal); }
.new-folder-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  font-size: 12px;
  color: var(--grey-500);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  font-family: inherit;
  transition: color .15s;
}
.new-folder-btn:hover { color: var(--teal); }

/* Print styles */
@media print {
  #lab-nav, .proto-sidebar, .sidebar-backdrop, .proto-hamburger,
  .proto-edit-bar, #password-gate { display: none !important; }
  .protocols-layout { display: block !important; }
  .proto-main { overflow: visible !important; }
  .proto-content { max-width: 100% !important; padding: 0 !important; }
  .proto-rendered { font-size: 12pt; line-height: 1.5; }
  .proto-rendered h1 { font-size: 18pt; border-bottom: 1px solid #999; }
  .proto-rendered h2 { font-size: 15pt; }
  .proto-rendered h3 { font-size: 13pt; }
  .proto-rendered pre { white-space: pre-wrap; word-wrap: break-word; border: 1px solid #ccc; }
  .proto-rendered table { page-break-inside: avoid; }
  .object-pill { background: none !important; color: #000 !important; padding: 0 !important; text-decoration: underline; }
  a { color: #000 !important; }
  body { background: #fff; }
}

@media (max-width: 768px) {
  .proto-sidebar {
    position: fixed;
    left: -300px;
    top: var(--nav-height);
    bottom: 0;
    z-index: 300;
    transition: left .25s ease;
    box-shadow: 4px 0 16px rgba(0,0,0,.1);
  }
  .proto-sidebar.open { left: 0; }
  .sidebar-backdrop.open { display: block; }
  .proto-hamburger { display: flex; }
  .proto-content { padding: 20px 16px; }
  .proto-welcome { padding: 20px 16px; }
}
</style>
</head>
<body>

<div class="protocols-layout">
  <!-- Sidebar -->
  <div class="proto-sidebar" id="sidebar">
    <div class="proto-sidebar-header" style="position:relative;display:flex;gap:6px;align-items:center">
      <div style="position:relative;flex:1">
        <span class="material-icons-outlined search-icon">search</span>
        <input type="text" id="protoSearch" placeholder="Search protocols...">
      </div>
      <button id="newProtoBtn" class="btn btn-primary btn-sm" style="display:none;padding:6px 10px;white-space:nowrap" onclick="createNewProtocol()">
        <span class="material-icons-outlined" style="font-size:18px">add</span>
      </button>
    </div>
    <div class="proto-template-link" onclick="loadDoc('workflow-templates/protocol-template')" style="padding:8px 16px;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--teal-dark);border-bottom:1px solid var(--grey-200);font-weight:500;">
      <span class="material-icons-outlined" style="font-size:16px">description</span> Protocol Template
    </div>
    <div class="proto-tree" id="protoTree">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Main -->
  <div class="proto-main" id="protoMain">
    <div id="protoContent">
      <div class="loading-state" style="padding-top:80px"><div class="spinner"></div><p>Loading protocols...</p></div>
    </div>
  </div>
</div>

<button class="proto-hamburger" id="hamburger">
  <span class="material-icons-outlined">menu</span>
</button>

<script src="js/shared.js"></script>
<script src="js/types.js"></script>
<script src="js/github-api.js"></script>
<script src="js/nav.js"></script>
<script src="js/wikilinks.js"></script>
<script src="js/editor-modal.js"></script>
<script src="js/annotate.js"></script>
<script>
// Category labels and ordering for protocol directories.
// New directories not listed here auto-generate a label from the folder name.
var CATEGORY_CONFIG = {
  order: [
    'wet-lab', 'wet-lab/extraction', 'wet-lab/library-prep', 'wet-lab/epigenomics', 'wet-lab/mutagenesis',
    'lab-safety',
    'lab-management',
    'workflow-templates',
    'bioinformatics',
  ],
  labels: {
    'wet-lab':                'Wet Lab Basics',
    'wet-lab/extraction':     'DNA Extraction',
    'wet-lab/library-prep':   'Library Prep & Sequencing',
    'wet-lab/epigenomics':    'Epigenomics',
    'wet-lab/mutagenesis':    'Mutagenesis & Genetics',
    'lab-management':         'Lab Management',
    'lab-safety':             'Lab Safety',
    'workflow-templates':     'Workflow Templates',
    'bioinformatics':         'Bioinformatics',
  }
};

var NAV = [];
var currentDoc = null;
var currentSha = null;
var isEditing = false;
var editorInstance = null;
var allProtocols = [];

// Build NAV dynamically from object-index.json
async function buildNav() {
  var index = await Lab.gh.fetchObjectIndex();
  var protocols = index.filter(function(o) { return o.type === 'protocol'; });

  // Group by directory path (strip .md, get dir portion)
  var groups = {};
  protocols.forEach(function(p) {
    // p.path is like "wet-lab/autoclave.md" or "wet-lab/extraction/hifi-dna-extraction.md"
    var parts = p.path.replace(/\.md$/, '').split('/');
    var slug = parts.pop(); // filename without .md
    var dir = parts.join('/'); // directory key

    // Skip index files
    if (slug === 'index') return;

    if (!groups[dir]) groups[dir] = [];
    groups[dir].push({ title: p.title, path: p.path.replace(/\.md$/, '') });
  });

  // Sort items alphabetically within each group
  Object.keys(groups).forEach(function(dir) {
    groups[dir].sort(function(a, b) { return a.title.localeCompare(b.title); });
  });

  // Build NAV in configured order, then append any new directories not in config
  var usedDirs = {};
  NAV = [];

  CATEGORY_CONFIG.order.forEach(function(dir) {
    if (groups[dir]) {
      NAV.push({ label: CATEGORY_CONFIG.labels[dir] || prettifyDir(dir), items: groups[dir] });
      usedDirs[dir] = true;
    }
  });

  // Append any directories not in the config (auto-discovered)
  Object.keys(groups).sort().forEach(function(dir) {
    if (!usedDirs[dir]) {
      NAV.push({ label: CATEGORY_CONFIG.labels[dir] || prettifyDir(dir), items: groups[dir] });
    }
  });

  // Build flat search list
  allProtocols = [];
  NAV.forEach(function(cat) {
    cat.items.forEach(function(item) {
      allProtocols.push({ title: item.title, path: item.path, category: cat.label });
    });
  });
}

function prettifyDir(dir) {
  // "wet-lab/extraction" → "Extraction", "lab-management" → "Lab Management"
  var last = dir.split('/').pop();
  return last.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
}

// ── Sidebar ──
var loggedIn = false;

function renderSidebar(filter) {
  var tree = document.getElementById('protoTree');
  var q = (filter || '').toLowerCase();
  var html = '';

  NAV.forEach(function(cat, ci) {
    var items = cat.items;
    if (q) {
      items = items.filter(function(i) {
        return i.title.toLowerCase().includes(q) || cat.label.toLowerCase().includes(q);
      });
      if (!items.length) return;
    }

    // Collapse by default unless searching or a doc in this category is active
    var hasActive = items.some(function(i) { return i.path === currentDoc; });
    var collapsed = !q && !hasActive ? ' collapsed' : '';
    var hidden = collapsed ? ' hidden' : '';

    html += '<div class="proto-category' + collapsed + '" data-cat-idx="' + ci + '" onclick="toggleCategory(this)">' +
      '<span class="material-icons-outlined">expand_more</span>' +
      '<span class="material-cat-label">' + Lab.escHtml(cat.label) + '</span>' +
      '<span class="proto-cat-count">' + items.length + '</span>' +
      '</div><div class="proto-items' + hidden + '" data-cat-idx="' + ci + '">';

    items.forEach(function(item) {
      var active = currentDoc === item.path ? ' active' : '';
      var draggable = loggedIn ? ' draggable="true"' : '';
      html += '<div class="proto-item' + active + '"' + draggable + ' data-path="' + item.path + '" onclick="loadDoc(\'' + item.path + '\')">' + Lab.escHtml(item.title) + '</div>';
    });
    html += '</div>';
  });

  if (loggedIn && !q) {
    html += '<button class="new-folder-btn" onclick="createNewFolder()">' +
      '<span class="material-icons-outlined" style="font-size:16px">create_new_folder</span> New folder' +
      '</button>';
  }

  tree.innerHTML = html || '<div class="empty-state"><p>No protocols match</p></div>';

  // Wire up drag events
  if (loggedIn) initDragDrop();
}

function toggleCategory(el) {
  el.classList.toggle('collapsed');
  var items = el.nextElementSibling;
  if (items) items.classList.toggle('hidden');
}

// ── New Folder ──
async function createNewFolder() {
  var name = prompt('Folder name (e.g. "tissue-culture"):');
  if (!name || !name.trim()) return;
  var slug = name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  var label = prompt('Display label:', slug.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' '));
  if (!label || !label.trim()) return;

  // Determine parent dir — for now, all new folders go under docs/wet-lab/ or top-level docs/
  var parentDir = prompt('Parent directory (e.g. "wet-lab" or leave blank for top-level):', '');
  var dir = parentDir ? parentDir.trim() + '/' + slug : slug;

  // GitHub requires a file to create a directory — create a placeholder index
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  var indexContent = Lab.buildFrontmatter({ title: 'Index', type: 'index' }, '\n# ' + label.trim() + '\n');
  try {
    await gh.saveFile('docs/' + dir + '/index.md', indexContent, null, 'New folder: ' + label.trim());
    gh.clearObjectIndexCache();

    // Add to CATEGORY_CONFIG and NAV
    CATEGORY_CONFIG.labels[dir] = label.trim();
    CATEGORY_CONFIG.order.push(dir);
    NAV.push({ label: label.trim(), items: [] });

    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Created folder: ' + label.trim(), 'success');
  } catch(e) {
    Lab.showToast('Failed: ' + e.message, 'error');
  }
}

// ── Drag and Drop ──
var dragData = null;

function initDragDrop() {
  var items = document.querySelectorAll('.proto-item[draggable="true"]');
  var containers = document.querySelectorAll('.proto-items');
  var categories = document.querySelectorAll('.proto-category');

  items.forEach(function(el) {
    el.addEventListener('dragstart', function(e) {
      dragData = { path: el.dataset.path, title: el.textContent };
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Expand all collapsed categories so user can see drop targets
      categories.forEach(function(cat) {
        cat.classList.remove('collapsed');
        var next = cat.nextElementSibling;
        if (next) next.classList.remove('hidden');
      });
    });
    el.addEventListener('dragend', function() {
      el.classList.remove('dragging');
      dragData = null;
      containers.forEach(function(c) { c.classList.remove('drag-over'); });
      categories.forEach(function(c) { c.classList.remove('drag-over-cat'); });
    });
  });

  containers.forEach(function(container) {
    container.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      container.classList.add('drag-over');
      // Also highlight the category header
      var catHeader = container.previousElementSibling;
      if (catHeader) catHeader.classList.add('drag-over-cat');
    });
    container.addEventListener('dragleave', function(e) {
      // Only remove if leaving the container entirely
      if (!container.contains(e.relatedTarget)) {
        container.classList.remove('drag-over');
        var catHeader = container.previousElementSibling;
        if (catHeader) catHeader.classList.remove('drag-over-cat');
      }
    });
    container.addEventListener('drop', function(e) {
      e.preventDefault();
      container.classList.remove('drag-over');
      var catHeader = container.previousElementSibling;
      if (catHeader) catHeader.classList.remove('drag-over-cat');
      if (!dragData) return;

      var targetCatIdx = parseInt(container.dataset.catIdx);
      var targetCat = NAV[targetCatIdx];
      if (!targetCat) return;

      // Get target directory from the first item in this category, or from config
      var targetDir = getNavCategoryDir(targetCat);
      if (!targetDir && targetDir !== '') {
        Lab.showToast('Cannot determine target directory', 'error');
        return;
      }

      moveProtocol(dragData.path, dragData.title, targetDir, targetCat.label);
    });
  });
}

function getNavCategoryDir(cat) {
  // Find the directory key for this category by checking items or reversing the label map
  if (cat.items.length > 0) {
    var path = cat.items[0].path;
    var parts = path.split('/');
    parts.pop();
    return parts.join('/');
  }
  // Empty category — find from config labels
  for (var dir in CATEGORY_CONFIG.labels) {
    if (CATEGORY_CONFIG.labels[dir] === cat.label) return dir;
  }
  return null;
}

async function moveProtocol(srcDocPath, title, targetDir, targetLabel) {
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) return;

  // Parse source
  var srcParts = srcDocPath.split('/');
  var slug = srcParts.pop();
  var srcDir = srcParts.join('/');

  // Don't move to same directory
  if (srcDir === targetDir) return;

  var srcFilePath = 'docs/' + srcDocPath + '.md';
  var dstFilePath = 'docs/' + targetDir + '/' + slug + '.md';

  try {
    // Fetch source file content and SHA
    var result = await gh.fetchFile(srcFilePath);

    // Create file in new location
    await gh.saveFile(dstFilePath, result.content, null, 'Move ' + slug + ' to ' + targetDir);

    // Delete from old location
    await gh.deleteFile(srcFilePath, result.sha, 'Moved ' + slug + ' from ' + srcDir);

    gh.clearObjectIndexCache();

    // Update local NAV
    var newDocPath = targetDir + '/' + slug;
    NAV.forEach(function(cat) {
      cat.items = cat.items.filter(function(i) { return i.path !== srcDocPath; });
    });
    injectIntoNav(newDocPath, title);
    // Remove empty categories (except configured ones)
    NAV = NAV.filter(function(cat) { return cat.items.length > 0 || CATEGORY_CONFIG.order.indexOf(getNavCategoryDir(cat)) >= 0; });

    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Moved to ' + targetLabel, 'success');

    // If we were viewing the moved doc, update URL
    if (currentDoc === srcDocPath) {
      loadDoc(newDocPath);
    }
  } catch(e) {
    Lab.showToast('Move failed: ' + e.message, 'error');
  }
}

// ── Load Document ──
// ── Post-process rendered HTML ──
// 1. Wrap h2 sections in collapsible <details> elements
// 2. Resolve relative image/video paths to raw GitHub URLs
function postProcessRendered(el) {
  if (!el) return;

  // ── Collapsible h2 sections ──
  var h2s = el.querySelectorAll('h2');
  h2s.forEach(function(h2) {
    // Collect all siblings between this h2 and the next h2 (or end)
    var content = [];
    var next = h2.nextElementSibling;
    while (next && next.tagName !== 'H2') {
      content.push(next);
      next = next.nextElementSibling;
    }
    if (!content.length) return;

    var details = document.createElement('details');
    details.open = true;
    details.style.cssText = 'margin:0 0 8px;';

    var summary = document.createElement('summary');
    summary.style.cssText = 'cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;user-select:none;';
    summary.innerHTML = '<span class="material-icons-outlined" style="font-size:18px;color:var(--grey-400);transition:transform .2s">expand_more</span>';

    // Move h2 content into summary
    var h2Clone = h2.cloneNode(true);
    h2Clone.style.display = 'inline';
    h2Clone.style.margin = '0';
    summary.appendChild(h2Clone);

    details.appendChild(summary);

    // Wrap content in a div
    var body = document.createElement('div');
    body.style.cssText = 'padding-left:2px;';
    content.forEach(function(node) { body.appendChild(node); });
    details.appendChild(body);

    // Replace original h2 with details
    h2.parentNode.replaceChild(details, h2);

    // Rotate chevron on toggle
    details.addEventListener('toggle', function() {
      var chevron = summary.querySelector('.material-icons-outlined');
      if (chevron) chevron.style.transform = details.open ? '' : 'rotate(-90deg)';
    });
  });

  // ── Resolve relative image/video paths ──
  // Use GitHub Pages base URL (docs/ maps to site root)
  var mediaBase = (window.Lab && window.Lab.BASE) || '/lab-handbook/';
  el.querySelectorAll('img').forEach(function(img) {
    var src = img.getAttribute('src') || '';
    if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('/')) {
      img.src = mediaBase + src;
    }
  });
  el.querySelectorAll('video source, video').forEach(function(v) {
    var src = v.getAttribute('src') || '';
    if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('/')) {
      v.src = mediaBase + src;
      if (v.parentElement && v.parentElement.tagName === 'VIDEO') v.parentElement.load();
    }
  });

  // If image fails to load from Pages (not deployed yet), fetch via GitHub API (works for private repos)
  el.querySelectorAll('img').forEach(function(img) {
    img.addEventListener('error', function() {
      if (img.dataset.retried) return;
      img.dataset.retried = '1';
      var src = img.getAttribute('src') || '';
      var relPath = src.replace(mediaBase, '');
      if (relPath.startsWith('images/') && window.Lab && window.Lab.gh && window.Lab.gh.isLoggedIn()) {
        // Fetch image content via authenticated GitHub API
        fetch('https://api.github.com/repos/' + window.Lab.gh.REPO + '/contents/docs/' + relPath + '?ref=' + window.Lab.gh.BRANCH, {
          headers: { 'Authorization': 'Bearer ' + window.Lab.gh.getToken(), 'Accept': 'application/vnd.github.v3+json' }
        }).then(function(r) { return r.ok ? r.json() : null; }).then(function(data) {
          if (data && data.content) {
            var ext = relPath.split('.').pop().toLowerCase();
            var mime = ext === 'png' ? 'image/png' : ext === 'gif' ? 'image/gif' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
            img.src = 'data:' + mime + ';base64,' + data.content.replace(/\n/g, '');
          }
        }).catch(function() {});
      }
    });
  });
  el.querySelectorAll('video').forEach(function(vid) {
    vid.addEventListener('error', function() {
      if (vid.dataset.retried) return;
      vid.dataset.retried = '1';
      var msg = document.createElement('div');
      msg.style.cssText = 'padding:24px;background:var(--grey-100);border-radius:8px;color:var(--grey-500);font-size:13px;font-style:italic;text-align:center;';
      msg.innerHTML = '<span class="material-icons-outlined" style="font-size:32px;display:block;margin-bottom:8px">hourglass_top</span>Video deploying... refresh in a moment';
      vid.parentNode.replaceChild(msg, vid);
    });
  });
}

async function loadDoc(docPath) {
  currentDoc = docPath;
  isEditing = false;
  editorInstance = null;
  cachedBody = null; // clear cache when loading a different doc

  renderSidebar(document.getElementById('protoSearch').value);
  history.pushState(null, '', location.pathname + '?doc=' + encodeURIComponent(docPath));

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');

  var contentEl = document.getElementById('protoContent');
  contentEl.innerHTML = '<div class="loading-state" style="padding-top:80px"><div class="spinner"></div></div>';

  try {
    var filePath = 'docs/' + docPath + '.md';
    var result = await Lab.gh.fetchFile(filePath);
    currentSha = result.sha;
    var parsed = Lab.parseFrontmatter(result.content);
    var title = parsed.meta.title || docPath.split('/').pop();

    var html = await Lab.editorModal.renderMarkdown(parsed.body);

    contentEl.innerHTML =
      '<div class="proto-content">' +
        '<div class="proto-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(docPath) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="printProtocol()"><span class="material-icons-outlined">print</span> Print</button>' +
            (Lab.gh.isLoggedIn() ?
              '<button class="btn btn-outline btn-sm" onclick="duplicateDoc()"><span class="material-icons-outlined">content_copy</span> Duplicate</button>' +
              '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span> Edit</button>' : '') +
          '</div>' +
        '</div>' +
        '<div class="proto-rendered" id="renderedDoc">' + html + '</div>' +
      '</div>';

    // Process wikilinks
    var renderedEl = document.getElementById('renderedDoc');
    if (Lab.wikilinks) {
      await Lab.wikilinks.processRendered(renderedEl);
    }
    postProcessRendered(renderedEl);

    // Scroll to top
    document.getElementById('protoMain').scrollTop = 0;
  } catch(e) {
    contentEl.innerHTML = '<div class="proto-content"><div class="empty-state"><span class="material-icons-outlined">error</span><p>Failed to load: ' + Lab.escHtml(e.message) + '</p></div></div>';
  }
}

// ── Edit Mode ──
var editFrontmatter = ''; // preserved frontmatter for re-assembly on save
var cachedBody = null; // body from most recent save (avoids stale GitHub API reads)

async function startEdit() {
  console.log('[protocols] startEdit called, currentDoc:', currentDoc, 'isEditing:', isEditing);
  if (!currentDoc || isEditing) return;
  isEditing = true;

  var contentEl = document.getElementById('protoContent');
  var filePath = 'docs/' + currentDoc + '.md';

  try {
    var bodyOnly;
    if (cachedBody !== null) {
      // Use locally cached body from most recent save (avoids GitHub API propagation delay)
      bodyOnly = cachedBody;
      console.log('[protocols] using cached body, length:', bodyOnly.length);
    } else {
      console.log('[protocols] fetching file:', filePath);
      var result = await Lab.gh.fetchFile(filePath);
      currentSha = result.sha;
      console.log('[protocols] file fetched, content length:', result.content.length);

      // Strip frontmatter — Toast UI can't handle YAML blocks in WYSIWYG mode
      var parsed = Lab.parseFrontmatter(result.content);
      editFrontmatter = parsed.meta;
      bodyOnly = parsed.body;
    }
    console.log('[protocols] body length:', bodyOnly.length, 'preview:', bodyOnly.substring(0, 100));

    contentEl.innerHTML =
      '<div class="proto-content">' +
        '<div class="proto-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc) + ' (editing)</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="cancelEdit()"><span class="material-icons-outlined">close</span> Cancel</button>' +
            '<button class="btn btn-primary btn-sm" id="saveBtn" onclick="saveDoc()"><span class="material-icons-outlined">save</span> Save</button>' +
          '</div>' +
        '</div>' +
        '<div class="proto-editor-surface em-surface" id="editorSurface"></div>' +
      '</div>';

    var surface = document.getElementById('editorSurface');
    console.log('[protocols] editorSurface found:', !!surface, 'Lab.editorModal:', !!Lab.editorModal, 'initFullpage:', !!Lab.editorModal.initFullpage);

    editorInstance = await Lab.editorModal.initFullpage(
      surface,
      bodyOnly,
      filePath,
      currentSha
    );
    console.log('[protocols] editor initialized:', !!editorInstance);
  } catch(e) {
    console.error('[protocols] startEdit error:', e);
    Lab.showToast('Failed to load for editing: ' + e.message, 'error');
    isEditing = false;
  }
}

async function saveDoc() {
  if (!editorInstance) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons-outlined">hourglass_empty</span> Saving...';

  try {
    // Re-assemble frontmatter + edited body
    var body = editorInstance.getMarkdown();

    // Capture loaded images from editor before destroying it (for instant view rendering)
    var editorImages = {};
    var editorSurface = document.getElementById('editorSurface');
    if (editorSurface) {
      editorSurface.querySelectorAll('img').forEach(function(img) {
        if (img.src && img.complete && img.naturalWidth > 0) {
          // Map the filename to the loaded src (may be data URL from API fallback)
          var origSrc = img.dataset.realSrc || img.getAttribute('src') || '';
          var fname = origSrc.split('/').pop().split('?')[0];
          if (fname) editorImages[fname] = img.src;
        }
      });
    }

    var fullContent = Lab.buildFrontmatter(editFrontmatter, body);
    var filePath = 'docs/' + currentDoc + '.md';
    var result = await Lab.gh.saveFile(filePath, fullContent, currentSha, 'Update ' + currentDoc);
    currentSha = result.sha;
    cachedBody = body; // cache for immediate re-editing without API delay
    Lab.gh.clearObjectIndexCache();
    Lab.showToast('Saved', 'success');

    // Render saved content directly (avoid GitHub API propagation delay)
    isEditing = false;
    editorInstance = null;
    var html = await Lab.editorModal.renderMarkdown(body);
    var contentEl = document.getElementById('protoContent');
    contentEl.innerHTML =
      '<div class="proto-content">' +
        '<div class="proto-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="printProtocol()"><span class="material-icons-outlined">print</span> Print</button>' +
            '<button class="btn btn-outline btn-sm" onclick="duplicateDoc()"><span class="material-icons-outlined">content_copy</span> Duplicate</button>' +
            '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span> Edit</button>' +
          '</div>' +
        '</div>' +
        '<div class="proto-rendered" id="renderedDoc">' + html + '</div>' +
      '</div>';
    var renderedEl2 = document.getElementById('renderedDoc');
    if (Lab.wikilinks) {
      await Lab.wikilinks.processRendered(renderedEl2);
    }
    postProcessRendered(renderedEl2);

    // Inject images captured from the editor so they show instantly (no waiting for Pages deploy)
    if (Object.keys(editorImages).length) {
      renderedEl2.querySelectorAll('img').forEach(function(img) {
        var src = img.getAttribute('src') || '';
        var fname = src.split('/').pop().split('?')[0];
        if (fname && editorImages[fname]) {
          img.src = editorImages[fname];
        }
      });
    }

    document.getElementById('protoMain').scrollTop = 0;
  } catch(e) {
    var msg = e.message || 'Unknown error';
    if (msg.includes('does not match')) {
      Lab.showToast('Someone else edited this file. Click "Reload & retry" to get the latest version, then re-apply your changes.', 'error', 10000);
      // Add a reload button to the save bar
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons-outlined">refresh</span> Reload & retry';
      btn.onclick = function() {
        // Reload the doc (discards current edits, loads latest from GitHub)
        loadDoc(currentDoc);
        Lab.showToast('Reloaded latest version. Your previous edits were not saved — re-apply them and save again.', 'info', 8000);
      };
    } else {
      Lab.showToast('Save failed: ' + msg, 'error');
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons-outlined">save</span> Save';
    }
  }
}

function printProtocol() {
  window.print();
}

// Inject a new doc into the local NAV so sidebar updates immediately
function injectIntoNav(docPath, title) {
  var parts = docPath.split('/');
  parts.pop();
  var dir = parts.join('/');
  var label = CATEGORY_CONFIG.labels[dir] || prettifyDir(dir);

  // Find existing category or create one
  var cat = NAV.find(function(c) { return c.label === label; });
  if (!cat) {
    cat = { label: label, items: [] };
    NAV.push(cat);
  }
  // Avoid duplicates
  if (!cat.items.some(function(i) { return i.path === docPath; })) {
    cat.items.push({ title: title, path: docPath });
    cat.items.sort(function(a, b) { return a.title.localeCompare(b.title); });
  }
  // Rebuild flat search list
  allProtocols = [];
  NAV.forEach(function(c) {
    c.items.forEach(function(item) {
      allProtocols.push({ title: item.title, path: item.path, category: c.label });
    });
  });
}

async function createNewProtocol() {
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  var title = prompt('Protocol title:');
  if (!title || !title.trim()) return;
  title = title.trim();

  var slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

  // Pick directory — default to current doc's directory, or wet-lab
  var dir = 'wet-lab';
  if (currentDoc) {
    var parts = currentDoc.split('/');
    parts.pop();
    dir = parts.join('/');
  }

  var user = gh.getUser();
  var userName = user ? user.name || user.login : 'unknown';
  var today = new Date().toISOString().slice(0, 10);

  var content = Lab.buildFrontmatter(
    { title: title, type: 'protocol' },
    '\n# ' + title + '\n\n*Created by ' + userName + ' on ' + today + '*\n\n'
  );

  var filePath = 'docs/' + dir + '/' + slug + '.md';
  var docPath = dir + '/' + slug;

  try {
    await gh.saveFile(filePath, content, null, 'New protocol: ' + title);
    gh.clearObjectIndexCache();
    injectIntoNav(docPath, title);
    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Created: ' + title, 'success');
    loadDoc(docPath);
  } catch(e) {
    Lab.showToast('Create failed: ' + e.message, 'error');
  }
}

async function duplicateDoc() {
  if (!currentDoc) return;
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  try {
    // Fetch source file
    var srcPath = 'docs/' + currentDoc + '.md';
    var result = await gh.fetchFile(srcPath);
    var parsed = Lab.parseFrontmatter(result.content);
    var srcTitle = parsed.meta.title || currentDoc.split('/').pop();

    // Build new filename: "Name (2).md" in same directory
    var dir = currentDoc.substring(0, currentDoc.lastIndexOf('/'));
    var srcSlug = currentDoc.split('/').pop();
    var newSlug = srcSlug + '-copy';
    var newPath = 'docs/' + dir + '/' + newSlug + '.md';
    var newTitle = srcTitle + ' (Copy)';

    // Get user info for attribution
    var user = gh.getUser();
    var userName = user ? user.name || user.login : 'unknown';
    var today = new Date().toISOString().slice(0, 10);

    // Update frontmatter title
    parsed.meta.title = newTitle;

    // Prepend duplication note to body
    var dupeNote = '\n> Duplicated from [[' + srcSlug + ']] by ' + userName + ' on ' + today + '\n\n';
    var newBody = dupeNote + parsed.body;
    var newContent = Lab.buildFrontmatter(parsed.meta, newBody);

    await gh.saveFile(newPath, newContent, null, 'Duplicate protocol: ' + srcTitle);
    gh.clearObjectIndexCache();
    injectIntoNav(dir + '/' + newSlug, newTitle);
    renderSidebar(document.getElementById('protoSearch').value);
    Lab.showToast('Duplicated: ' + newTitle, 'success');

    // Load the new doc
    loadDoc(dir + '/' + newSlug);
  } catch(e) {
    Lab.showToast('Duplicate failed: ' + e.message, 'error');
  }
}

function cancelEdit() {
  if (currentDoc) loadDoc(currentDoc);
}

// ── Welcome ──
function showWelcome() {
  var contentEl = document.getElementById('protoContent');
  contentEl.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--grey-400);gap:12px;padding:60px">' +
      '<span class="material-icons-outlined" style="font-size:56px;color:var(--grey-300)">menu_book</span>' +
      '<p style="font-size:15px">Select a protocol from the sidebar</p>' +
    '</div>';
}

// ── Search ──
document.getElementById('protoSearch').addEventListener('input', function() {
  renderSidebar(this.value);
});

// ── Mobile sidebar ──
document.getElementById('hamburger').onclick = function() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('open');
};
document.getElementById('sidebarBackdrop').onclick = function() {
  document.getElementById('sidebar').classList.remove('open');
  this.classList.remove('open');
};

// ── Keyboard shortcut ──
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 's' && isEditing) {
    e.preventDefault();
    saveDoc();
  }
});

// ── Back/forward navigation ──
window.addEventListener('popstate', function() {
  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  if (doc) loadDoc(doc);
  else showWelcome();
});

// ── Init ──
(async function init() {
  await buildNav();
  renderSidebar();

  // Show logged-in features
  loggedIn = Lab.gh.isLoggedIn();
  if (loggedIn) {
    document.getElementById('newProtoBtn').style.display = '';
  }

  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  if (doc) {
    loadDoc(doc);
  } else {
    showWelcome();
  }
})();
</script>
