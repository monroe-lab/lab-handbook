<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Notebooks - Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.nb-layout { display: flex; height: calc(100vh - var(--nav-height)); }

/* Sidebar */
.nb-sidebar {
  width: 280px; min-width: 280px; background: #fff;
  border-right: 1px solid var(--grey-200); display: flex; flex-direction: column; overflow: hidden;
}
.nb-sidebar-header { padding: 16px; border-bottom: 1px solid var(--grey-200); display: flex; gap: 6px; align-items: center; }
.nb-sidebar-header .search-wrap { position: relative; flex: 1; }
.nb-sidebar-header input {
  width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--grey-300);
  border-radius: var(--radius); font-family: inherit; font-size: 14px; outline: none;
}
.nb-sidebar-header input:focus { border-color: #795548; }
.nb-sidebar-header .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 20px; color: var(--grey-500); pointer-events: none;
}

.nb-tree { flex: 1; overflow-y: auto; padding: 8px 0; }
.nb-tree::-webkit-scrollbar { width: 5px; }
.nb-tree::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 3px; }

.nb-folder {
  padding: 8px 16px; font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--grey-600); cursor: pointer;
  display: flex; align-items: center; gap: 4px; user-select: none;
  background: var(--grey-50); border-bottom: 1px solid var(--grey-200);
}
.nb-folder:hover { color: #795548; background: #efebe9; }
.nb-folder .material-icons-outlined { font-size: 18px; transition: transform .15s; color: var(--grey-400); }
.nb-folder.collapsed .material-icons-outlined:first-child { transform: rotate(-90deg); }
.nb-folder-count {
  margin-left: auto; font-size: 10px; font-weight: 500; color: var(--grey-400);
  background: var(--grey-200); padding: 1px 6px; border-radius: 8px;
}
.nb-folder-actions { display: flex; gap: 2px; margin-left: 4px; }
.nb-folder-actions button {
  background: none; border: none; cursor: pointer; padding: 2px; color: var(--grey-400);
  border-radius: 4px; display: flex; align-items: center;
}
.nb-folder-actions button:hover { color: #795548; background: #efebe9; }
.nb-folder-actions .material-icons-outlined { font-size: 15px; }

.nb-items { padding-left: 8px; }
.nb-items.hidden { display: none; }
.nb-item {
  display: block; padding: 6px 16px 6px 24px; font-size: 13px; color: var(--grey-700);
  cursor: pointer; border-radius: 0 4px 4px 0; transition: background .1s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nb-item:hover { background: var(--grey-100); color: var(--grey-900); }
.nb-item.active { background: #efebe9; color: #795548; font-weight: 500; }

/* Main */
.nb-main { flex: 1; overflow-y: auto; background: var(--grey-100); }
.nb-content { max-width: 900px; margin: 0 auto; padding: 32px 40px; }

/* Rendered markdown: uses .lab-rendered.theme-brown from base.css */

.nb-edit-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; margin-bottom: 16px; border-bottom: 1px solid var(--grey-200);
}
.nb-edit-bar .breadcrumb { font-size: 13px; color: var(--grey-500); }
.nb-editor-surface { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; min-height: 500px; }

/* Mobile */
.nb-hamburger {
  display: none; position: fixed; bottom: calc(var(--bottom-nav-height) + 16px); left: 16px;
  width: 48px; height: 48px; border-radius: 50%; background: #795548; color: #fff; border: none;
  box-shadow: var(--shadow-lg); cursor: pointer; z-index: 100; align-items: center; justify-content: center;
}
.nb-hamburger .material-icons-outlined { font-size: 24px; }
.nb-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; }
@media (max-width: 768px) {
  .nb-sidebar { position: fixed; left: -300px; top: var(--nav-height); bottom: var(--bottom-nav-height); z-index: 300; transition: left .25s; box-shadow: 4px 0 16px rgba(0,0,0,.1); }
  .nb-sidebar.open { left: 0; }
  .nb-backdrop.open { display: block; }
  .nb-hamburger { display: flex; }
  .nb-content { padding: 12px 8px; }
  .nb-layout { height: calc(100vh - var(--nav-height) - var(--bottom-nav-height)); }
  .nb-edit-bar .breadcrumb { display: none; }
  .nb-edit-bar .btn { padding: 6px 8px; }
  .btn-label { display: none; }
  body.editing-mode #lab-nav { display: none; }
  body.editing-mode #lab-bottom-nav { display: none; }
  body.editing-mode .nb-sidebar { display: none; }
  body.editing-mode .nb-hamburger { display: none; }
  body.editing-mode .nb-layout { height: 100vh; }
  body.editing-mode .nb-edit-bar { display: none; }
}

/* Modal */
.nb-modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 400;
  display: none; align-items: center; justify-content: center;
}
.nb-modal-backdrop.open { display: flex; }
.nb-modal {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg);
  width: 90%; max-width: 420px; padding: 20px 24px;
}
.nb-modal h3 { font-size: 16px; font-weight: 600; margin: 0 0 14px; display: flex; align-items: center; gap: 8px; }
.nb-modal h3 .material-icons-outlined { font-size: 20px; color: #795548; }
.nb-modal label { display: block; font-size: 12px; font-weight: 600; color: var(--grey-600); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .3px; }
.nb-modal input, .nb-modal select {
  width: 100%; padding: 9px 12px; border: 1px solid var(--grey-300);
  border-radius: var(--radius); font-family: inherit; font-size: 14px; outline: none; box-sizing: border-box;
}
.nb-modal input:focus, .nb-modal select:focus { border-color: #795548; }
.nb-modal .field { margin-bottom: 14px; }
.nb-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

@media print {
  #lab-nav, #lab-bottom-nav, .nb-sidebar, .nb-backdrop, .nb-hamburger,
  .nb-edit-bar, #password-gate { display: none !important; }
  .nb-layout { display: block !important; }
  .nb-main { overflow: visible !important; }
  .nb-content { max-width: 100% !important; padding: 0 !important; }
}
</style>
</head>
<body>

<div class="nb-layout">
  <div class="nb-sidebar" id="sidebar">
    <div class="nb-sidebar-header">
      <div class="search-wrap">
        <span class="material-icons-outlined search-icon">search</span>
        <input type="text" id="nbSearch" placeholder="Search notebooks...">
      </div>
      <button id="newFolderBtn" class="btn btn-sm" style="display:none;padding:6px 10px;background:none;border:1px solid var(--grey-300);color:var(--grey-600)" onclick="createNewFolder()" title="New folder">
        <span class="material-icons-outlined" style="font-size:18px">create_new_folder</span>
      </button>
      <button id="newEntryBtn" class="btn btn-sm" style="display:none;padding:6px 10px;background:#795548;color:#fff;border:none" onclick="createNewEntry()" title="New entry">
        <span class="material-icons-outlined" style="font-size:18px">add</span>
      </button>
    </div>
    <div class="nb-tree" id="nbTree">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>
  <div class="nb-backdrop" id="backdrop"></div>

  <div class="nb-main" id="nbMain">
    <div id="nbContent">
      <div class="loading-state" style="padding-top:80px"><div class="spinner"></div><p>Loading notebooks...</p></div>
    </div>
  </div>
</div>

<button class="nb-hamburger" id="hamburger"><span class="material-icons-outlined">menu</span></button>

<div class="nb-modal-backdrop" id="nbModalBackdrop">
  <div class="nb-modal" id="nbModal"></div>
</div>

<script src="js/lab.js"></script>
<script>
var ROOT = 'docs/notebooks';
var TREE = null;        // { dir, label, children: [Tree], items: [{title,path}] }
var allFiles = [];
var currentDoc = null;  // path relative to docs/, no .md (e.g., notebooks/barb-m/2026-04-01)
var currentSha = null;
var isEditing = false;
var editorInstance = null;

function unsavedGuard(e) { e.preventDefault(); e.returnValue = ''; }
var loggedIn = false;

function prettify(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

// ── Modal ──
function showModal(opts) {
  // opts: { title, icon, fields: [{key, label, type:'text'|'select', value, options:[{value,label}]}], submitLabel }
  return new Promise(function(resolve) {
    var backdrop = document.getElementById('nbModalBackdrop');
    var modal = document.getElementById('nbModal');
    var html = '<h3><span class="material-icons-outlined">' + (opts.icon || 'add') + '</span> ' + Lab.escHtml(opts.title) + '</h3>';
    opts.fields.forEach(function(f) {
      html += '<div class="field"><label>' + Lab.escHtml(f.label) + '</label>';
      if (f.type === 'select') {
        html += '<select id="nbm_' + f.key + '">';
        f.options.forEach(function(o) {
          var sel = o.value === f.value ? ' selected' : '';
          html += '<option value="' + Lab.escHtml(o.value) + '"' + sel + '>' + Lab.escHtml(o.label) + '</option>';
        });
        html += '</select>';
      } else {
        html += '<input type="text" id="nbm_' + f.key + '" value="' + Lab.escHtml(f.value || '') + '" placeholder="' + Lab.escHtml(f.placeholder || '') + '">';
      }
      html += '</div>';
    });
    html += '<div class="nb-modal-actions">' +
      '<button class="btn btn-outline btn-sm" id="nbmCancel">Cancel</button>' +
      '<button class="btn btn-primary btn-sm" id="nbmOk" style="background:#795548">' + Lab.escHtml(opts.submitLabel || 'Create') + '</button>' +
      '</div>';
    modal.innerHTML = html;
    backdrop.classList.add('open');

    var firstInput = modal.querySelector('input,select');
    if (firstInput) { firstInput.focus(); if (firstInput.select) firstInput.select(); }

    function close(result) {
      backdrop.classList.remove('open');
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onKey(e) {
      if (e.key === 'Escape') close(null);
      if (e.key === 'Enter' && e.target.tagName !== 'SELECT') { e.preventDefault(); submit(); }
    }
    function submit() {
      var values = {};
      opts.fields.forEach(function(f) { values[f.key] = document.getElementById('nbm_' + f.key).value; });
      close(values);
    }
    document.addEventListener('keydown', onKey);
    document.getElementById('nbmCancel').onclick = function() { close(null); };
    document.getElementById('nbmOk').onclick = submit;
    backdrop.onclick = function(e) { if (e.target === backdrop) close(null); };

    if (opts.onMount) opts.onMount(modal);
  });
}

function getAllDirs() {
  var out = [];
  (function walk(node) {
    node.children.forEach(function(ch) { out.push(ch.dir); walk(ch); });
  })(TREE);
  return out;
}

// ── Load tree ──
async function loadTree() {
  var files = await Lab.gh.fetchTree(ROOT);
  allFiles = files; // keep .gitkeep so empty folders are visible
  buildNav();
}

function newNode(dir, label) {
  return { dir: dir, label: label, children: [], items: [] };
}

function ensureNode(root, dirParts) {
  // dirParts: array of folder slugs relative to ROOT (e.g., ['barb-m','dna-extraction'])
  var node = root;
  var acc = [];
  for (var i = 0; i < dirParts.length; i++) {
    acc.push(dirParts[i]);
    var dirKey = acc.join('/');
    var child = node.children.find(function(c) { return c.dir === dirKey; });
    if (!child) {
      child = newNode(dirKey, prettify(dirParts[i]));
      node.children.push(child);
      node.children.sort(function(a, b) { return a.label.localeCompare(b.label); });
    }
    node = child;
  }
  return node;
}

function buildNav() {
  TREE = newNode('', 'root');

  allFiles.forEach(function(f) {
    var rel = f.replace(ROOT + '/', '');
    var parts = rel.split('/');
    var fileName = parts.pop();
    if (parts.length < 1) return; // skip root-level files (template.md, index.md)

    if (fileName === '.gitkeep') {
      // register the folder as existing
      ensureNode(TREE, parts);
      return;
    }
    if (!fileName.endsWith('.md')) return;
    var slug = fileName.replace(/\.md$/, '');
    if (slug === 'index') return;

    var node = ensureNode(TREE, parts);
    var docPath = 'notebooks/' + parts.join('/') + '/' + slug;
    node.items.push({ title: slug, path: docPath });
  });

  // Sort items newest first within each node (recursive)
  (function sortAll(node) {
    node.items.sort(function(a, b) { return b.title.localeCompare(a.title); });
    node.children.forEach(sortAll);
  })(TREE);
}

function countDeep(node) {
  var c = node.items.length;
  node.children.forEach(function(ch) { c += countDeep(ch); });
  return c;
}

function filterTree(node, q) {
  // Returns a shallow copy that includes only branches matching q (in items or labels)
  var matchedItems = node.items.filter(function(i) { return i.title.toLowerCase().includes(q); });
  var matchedChildren = node.children
    .map(function(ch) { return filterTree(ch, q); })
    .filter(function(ch) { return ch !== null; });
  var labelMatch = node.label.toLowerCase().includes(q);
  if (labelMatch) {
    // include all descendants
    return { dir: node.dir, label: node.label, items: node.items, children: node.children };
  }
  if (!matchedItems.length && !matchedChildren.length) return null;
  return { dir: node.dir, label: node.label, items: matchedItems, children: matchedChildren };
}

// ── Sidebar ──
function nodeContainsActive(node) {
  if (node.items.some(function(i) { return i.path === currentDoc; })) return true;
  return node.children.some(nodeContainsActive);
}

function renderNode(node, depth, q) {
  // depth: nesting level (0 = top-level under TREE root)
  var collapsed = !q && !nodeContainsActive(node) ? ' collapsed' : '';
  var hidden = collapsed ? ' hidden' : '';
  var pad = 16 + depth * 14;
  var headerStyle = 'padding-left:' + pad + 'px';
  var dirAttr = Lab.escHtml(node.dir);
  var html = '<div class="nb-folder' + collapsed + '" style="' + headerStyle + '" onclick="toggleFolder(this)">' +
    '<span class="material-icons-outlined">expand_more</span>' +
    '<span>' + Lab.escHtml(node.label) + '</span>' +
    '<span class="nb-folder-count">' + countDeep(node) + '</span>';
  html += '</div><div class="nb-items' + hidden + '">';

  // Subfolders first
  node.children.forEach(function(ch) { html += renderNode(ch, depth + 1, q); });

  // Then files
  node.items.forEach(function(item) {
    var active = currentDoc === item.path ? ' active' : '';
    var itemPad = 24 + depth * 14;
    html += '<div class="nb-item' + active + '" style="padding-left:' + itemPad + 'px" data-path="' + item.path + '" onclick="loadDoc(\'' + item.path + '\')">' + Lab.escHtml(item.title) + '</div>';
  });

  html += '</div>';
  return html;
}

// R8 #39: return a normalised key derived from the logged-in GitHub user
// so we can match against a notebook folder slug. "greymonroe" login →
// "greymonroe", "grey-monroe" folder → "greymonroe", both match.
// Returns '' if not logged in (short-circuits the personalization).
function getCurrentUserKey() {
  try {
    var raw = localStorage.getItem('gh_lab_user');
    if (!raw) return '';
    var user = JSON.parse(raw);
    var login = user && user.login ? String(user.login) : '';
    return login.toLowerCase().replace(/[^a-z0-9]/g, '');
  } catch(e) { return ''; }
}

function normalizeFolderKey(slug) {
  return String(slug || '').toLowerCase().replace(/[^a-z0-9]/g, '');
}

// Sort children so the current user's folder is first. Otherwise stable
// alphabetical. Returns a new array (doesn't mutate the input).
function sortChildrenForUser(children) {
  var userKey = getCurrentUserKey();
  var sorted = children.slice();
  sorted.sort(function(a, b) {
    var an = normalizeFolderKey(a.dir.split('/').pop());
    var bn = normalizeFolderKey(b.dir.split('/').pop());
    if (userKey) {
      var aIsUser = an === userKey || an.indexOf(userKey) === 0;
      var bIsUser = bn === userKey || bn.indexOf(userKey) === 0;
      if (aIsUser && !bIsUser) return -1;
      if (bIsUser && !aIsUser) return 1;
    }
    return an < bn ? -1 : an > bn ? 1 : 0;
  });
  return sorted;
}

function renderSidebar(filter) {
  var treeEl = document.getElementById('nbTree');
  var q = (filter || '').toLowerCase();
  var view = TREE;
  if (q) {
    view = { dir: '', label: 'root', items: [], children: TREE.children.map(function(c) { return filterTree(c, q); }).filter(function(c) { return c !== null; }) };
  }

  if (!view.children.length) {
    treeEl.innerHTML = '<div style="padding:20px;color:var(--grey-500);font-size:14px;text-align:center">No notebooks' + (q ? ' match' : ' yet') + (loggedIn && !q ? '.<br>Click <strong>+</strong> above to create one.' : '') + '</div>';
    return;
  }

  // R8 #39: promote the current user's folder to the top so the first
  // thing a logged-in lab member sees is their own notebook.
  var orderedChildren = sortChildrenForUser(view.children);

  var html = '';
  // Mark the first child as "yours" with a subtle header if it matched.
  var userKey = getCurrentUserKey();
  var firstChild = orderedChildren[0];
  var firstIsUser = userKey && firstChild &&
    normalizeFolderKey(firstChild.dir.split('/').pop()).indexOf(userKey) === 0;
  if (firstIsUser) {
    html += '<div class="nb-section-label" style="padding:10px 16px 4px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--teal);letter-spacing:.5px">Your notebook</div>';
    html += renderNode(firstChild, 0, q);
    if (orderedChildren.length > 1) {
      html += '<div class="nb-section-label" style="padding:14px 16px 4px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--grey-500);letter-spacing:.5px">All notebooks</div>';
    }
    orderedChildren.slice(1).forEach(function(ch) { html += renderNode(ch, 0, q); });
  } else {
    orderedChildren.forEach(function(ch) { html += renderNode(ch, 0, q); });
  }
  treeEl.innerHTML = html;
}

function toggleFolder(el) {
  el.classList.toggle('collapsed');
  var items = el.nextElementSibling;
  if (items) items.classList.toggle('hidden');
}

// ── New folder ──
async function createNewFolder() {
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  var parentOpts = [{ value: '', label: '(root)' }].concat(getAllDirs().map(function(d) { return { value: d, label: d }; }));
  var values = await showModal({
    title: 'New Folder',
    icon: 'create_new_folder',
    submitLabel: 'Create folder',
    fields: [
      { key: 'parent', label: 'Parent folder', type: 'select', value: '', options: parentOpts },
      { key: 'name',   label: 'Folder name',   type: 'text',   value: '', placeholder: 'e.g. barb-m' }
    ]
  });
  if (!values || !values.name.trim()) return;

  var slug = values.name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  if (!slug) return;
  var dir = values.parent ? values.parent + '/' + slug : slug;
  var path = ROOT + '/' + dir + '/.gitkeep';
  try {
    // Probe — if .gitkeep already exists, the folder is already there.
    var sha = null;
    try {
      var existing = await gh.fetchFile(path);
      sha = existing.sha;
    } catch(e) { /* doesn't exist, will create */ }

    if (!sha) {
      await gh.saveFile(path, '', null, 'New notebook folder: ' + dir);
    }
    ensureNode(TREE, dir.split('/'));
    renderSidebar(document.getElementById('nbSearch').value);
    Lab.showToast(sha ? 'Folder already exists, added to sidebar' : 'Created folder: ' + dir, 'success');
  } catch(e) {
    Lab.showToast('Failed: ' + e.message, 'error');
  }
}

// ── New entry ──
function getDailyTemplate(personLabel, dateStr) {
  return '# ' + dateStr + ' — ' + personLabel + '\n\n' +
    '**Person:** ' + personLabel + '\n\n' +
    '**Date:** ' + dateStr + '\n\n' +
    '## Plan for today\n\n' +
    '## What I did\n\n' +
    '## Results & observations\n\n' +
    '## Next steps\n\n';
}

function getBlankTemplate(title, personLabel, dateStr) {
  return '# ' + title + '\n\n' +
    '**Person:** ' + personLabel + '\n\n' +
    '**Date:** ' + dateStr + '\n\n';
}

async function createNewEntry() {
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) { Lab.showToast('Sign in first', 'error'); return; }

  var allDirs = getAllDirs();
  if (!allDirs.length) { Lab.showToast('Create a folder first', 'error'); return; }

  // Default folder: current doc's, else first
  var defaultDir = allDirs[0];
  if (currentDoc) {
    var p = currentDoc.replace(/^notebooks\//, '').split('/');
    p.pop();
    var d = p.join('/');
    if (allDirs.indexOf(d) >= 0) defaultDir = d;
  }

  var today = new Date().toISOString().slice(0, 10);
  var values = await showModal({
    title: 'New Entry',
    icon: 'add',
    submitLabel: 'Create entry',
    fields: [
      { key: 'type',   label: 'Entry type', type: 'select', value: 'daily', options: [
        { value: 'daily', label: 'Daily entry (dated, with template)' },
        { value: 'blank', label: 'Blank document (custom title)' }
      ]},
      { key: 'folder', label: 'Folder', type: 'select', value: defaultDir, options: allDirs.map(function(d) { return { value: d, label: d }; }) },
      { key: 'name',   label: 'Filename / title', type: 'text', value: today, placeholder: today }
    ],
    onMount: function(modal) {
      var typeSel = modal.querySelector('#nbm_type');
      var nameInput = modal.querySelector('#nbm_name');
      var nameLabel = nameInput.previousElementSibling; // not the <label> in DOM order; field wraps it
      // Actual label is the .field's first child
      var labelEl = nameInput.parentNode.querySelector('label');
      typeSel.addEventListener('change', function() {
        if (typeSel.value === 'daily') {
          labelEl.textContent = 'Filename';
          nameInput.value = today;
          nameInput.placeholder = today;
        } else {
          labelEl.textContent = 'Title';
          nameInput.value = '';
          nameInput.placeholder = 'e.g. Cloning notes';
        }
        nameInput.focus();
        nameInput.select && nameInput.select();
      });
    }
  });
  if (!values || !values.name.trim()) return;
  var dir = values.folder;
  var rawName = values.name.trim();
  var slug = rawName.replace(/\.md$/, '').replace(/[^a-zA-Z0-9._-]+/g, '-').replace(/^-|-$/g, '');
  if (!slug) return;

  var personLabel = prettify(dir.split('/').pop());
  var content;
  if (values.type === 'daily') {
    content = getDailyTemplate(personLabel, today);
  } else {
    content = getBlankTemplate(rawName, personLabel, today);
  }

  var filePath = ROOT + '/' + dir + '/' + slug + '.md';
  var docPath = 'notebooks/' + dir + '/' + slug;

  try {
    // Check existence
    var sha = null;
    try {
      var existing = await gh.fetchFile(filePath);
      if (!confirm('An entry "' + slug + '" already exists in ' + dir + '. Open it instead?')) return;
      loadDoc(docPath);
      return;
    } catch(e) {}

    await gh.saveFile(filePath, content, null, 'New notebook entry: ' + dir + '/' + slug);

    // Inject into TREE
    var node = ensureNode(TREE, dir.split('/'));
    node.items.unshift({ title: slug, path: docPath });
    node.items.sort(function(a, b) { return b.title.localeCompare(a.title); });

    renderSidebar(document.getElementById('nbSearch').value);
    Lab.showToast('Entry created', 'success');
    loadDoc(docPath);
  } catch(e) {
    Lab.showToast('Create failed: ' + e.message, 'error');
  }
}

// ── Load entry ──
async function loadDoc(docPath) {
  currentDoc = docPath;
  isEditing = false;
  window.removeEventListener('beforeunload', unsavedGuard);
  document.body.classList.remove('editing-mode');
  editorInstance = null;
  renderSidebar(document.getElementById('nbSearch').value);
  history.pushState(null, '', location.pathname + '?doc=' + encodeURIComponent(docPath));

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');

  var contentEl = document.getElementById('nbContent');
  contentEl.innerHTML = '<div class="loading-state" style="padding-top:80px"><div class="spinner"></div></div>';

  try {
    var filePath = 'docs/' + docPath + '.md';
    var result = await Lab.gh.fetchFile(filePath);
    currentSha = result.sha;
    var html = await Lab.editorModal.renderMarkdown(result.content);

    contentEl.innerHTML =
      '<div class="nb-content">' +
        '<div class="nb-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(docPath.replace(/^notebooks\//, '')) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="window.print()"><span class="material-icons-outlined">print</span><span class="btn-label"> Print</span></button>' +
            (loggedIn ?
              '<button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteDoc()"><span class="material-icons-outlined">delete</span><span class="btn-label"> Delete</span></button>' +
              '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span><span class="btn-label"> Edit</span></button>' : '') +
          '</div>' +
        '</div>' +
        '<div class="lab-rendered theme-brown" id="renderedDoc">' + html + '</div>' +
      '</div>';

    var renderedEl = document.getElementById('renderedDoc');
    if (Lab.wikilinks) await Lab.wikilinks.processRendered(renderedEl);
    Lab.postProcessImages(renderedEl);
    document.getElementById('nbMain').scrollTop = 0;
  } catch(e) {
    contentEl.innerHTML = '<div class="nb-content"><div class="empty-state"><span class="material-icons-outlined">error</span><p>Failed to load: ' + Lab.escHtml(e.message) + '</p></div></div>';
  }
}

// ── Edit ──
async function startEdit() {
  if (!currentDoc || isEditing) return;
  isEditing = true;
  window.addEventListener('beforeunload', unsavedGuard);
  document.body.classList.add('editing-mode');

  var contentEl = document.getElementById('nbContent');
  var filePath = 'docs/' + currentDoc + '.md';

  try {
    var result = await Lab.gh.fetchFile(filePath);
    currentSha = result.sha;

    contentEl.innerHTML =
      '<div class="nb-content">' +
        '<div class="nb-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc.replace(/^notebooks\//, '')) + ' (editing)</div>' +
          '<div style="display:flex;gap:6px">' +
            '<button class="btn btn-outline btn-sm" onclick="cancelEdit()"><span class="material-icons-outlined">close</span><span class="btn-label"> Cancel</span></button>' +
            '<button class="btn btn-primary btn-sm" id="saveBtn" onclick="saveDoc()" style="background:#795548"><span class="material-icons-outlined">save</span><span class="btn-label"> Save</span></button>' +
          '</div>' +
        '</div>' +
        '<div class="nb-editor-surface em-surface" id="editorSurface"></div>' +
      '</div>';

    editorInstance = await Lab.editorModal.initFullpage(
      document.getElementById('editorSurface'),
      result.content,
      filePath,
      currentSha
    );
  } catch(e) {
    Lab.showToast('Failed to load for editing: ' + e.message, 'error');
    isEditing = false;
    window.removeEventListener('beforeunload', unsavedGuard);
  }
}

async function saveDoc() {
  if (!editorInstance) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons-outlined">hourglass_empty</span> Saving...';

  try {
    var md = editorInstance.getMarkdown();

    var editorImages = {};
    var editorSurface = document.getElementById('editorSurface');
    if (editorSurface) {
      editorSurface.querySelectorAll('img').forEach(function(img) {
        if (img.src && img.complete && img.naturalWidth > 0) {
          var origSrc = img.dataset.realSrc || img.getAttribute('src') || '';
          var fname = origSrc.split('/').pop().split('?')[0];
          if (fname) editorImages[fname] = img.src;
        }
      });
    }

    var filePath = 'docs/' + currentDoc + '.md';
    var result = await Lab.gh.saveFile(filePath, md, currentSha, 'Update notebook ' + currentDoc);
    currentSha = result.sha;
    Lab.showToast('Saved', 'success');

    isEditing = false;
    window.removeEventListener('beforeunload', unsavedGuard);
    document.body.classList.remove('editing-mode');
    editorInstance = null;
    var html = await Lab.editorModal.renderMarkdown(md);
    var contentEl = document.getElementById('nbContent');
    contentEl.innerHTML =
      '<div class="nb-content">' +
        '<div class="nb-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc.replace(/^notebooks\//, '')) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="window.print()"><span class="material-icons-outlined">print</span><span class="btn-label"> Print</span></button>' +
            '<button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteDoc()"><span class="material-icons-outlined">delete</span><span class="btn-label"> Delete</span></button>' +
            '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span><span class="btn-label"> Edit</span></button>' +
          '</div>' +
        '</div>' +
        '<div class="lab-rendered theme-brown" id="renderedDoc">' + html + '</div>' +
      '</div>';
    var renderedEl2 = document.getElementById('renderedDoc');
    if (Lab.wikilinks) await Lab.wikilinks.processRendered(renderedEl2);
    Lab.postProcessImages(renderedEl2);
    if (Object.keys(editorImages).length) {
      renderedEl2.querySelectorAll('img').forEach(function(img) {
        var src = img.getAttribute('src') || '';
        var fname = src.split('/').pop().split('?')[0];
        if (fname && editorImages[fname]) img.src = editorImages[fname];
      });
    }
    document.getElementById('nbMain').scrollTop = 0;
  } catch(e) {
    Lab.showToast('Save failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-icons-outlined">save</span> Save';
  }
}

function cancelEdit() {
  if (currentDoc) loadDoc(currentDoc);
}

async function deleteDoc() {
  if (!currentDoc) return;
  var gh = Lab.gh;
  if (!gh || !gh.isLoggedIn()) return;
  var name = currentDoc.split('/').pop();
  if (!confirm('Delete entry "' + name + '"? This cannot be undone.')) return;

  try {
    var filePath = 'docs/' + currentDoc + '.md';
    await gh.deleteFile(filePath, null, 'Delete notebook entry: ' + name);
    (function strip(node) {
      node.items = node.items.filter(function(i) { return i.path !== currentDoc; });
      node.children.forEach(strip);
    })(TREE);
    currentDoc = null;
    currentSha = null;
    renderSidebar(document.getElementById('nbSearch').value);
    showWelcome();
    Lab.showToast('Deleted', 'success');
  } catch(e) {
    Lab.showToast('Delete failed: ' + e.message, 'error');
  }
}

// ── Welcome ──
function showWelcome() {
  var contentEl = document.getElementById('nbContent');
  // Build flat recent list (walk tree)
  var recent = [];
  (function walk(node, labelChain) {
    var label = labelChain ? labelChain + ' / ' + node.label : node.label;
    if (node.dir) {
      node.items.slice(0, 3).forEach(function(it) {
        recent.push({ folder: label, title: it.title, path: it.path });
      });
    }
    node.children.forEach(function(ch) { walk(ch, node.dir ? label : ''); });
  })(TREE, '');
  recent.sort(function(a, b) { return b.title.localeCompare(a.title); });

  var recentHtml = '';
  if (recent.length) {
    recentHtml = '<h3 style="font-size:15px;font-weight:600;margin:24px 0 12px">Recent Entries</h3>' +
      recent.slice(0, 10).map(function(e) {
        return '<div onclick="loadDoc(\'' + Lab.escHtml(e.path) + '\')" style="background:#fff;border-radius:var(--radius);padding:14px 20px;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">' +
          '<div><div style="font-weight:500">' + Lab.escHtml(e.folder) + '</div><div style="font-size:13px;color:var(--grey-500)">' + Lab.escHtml(e.title) + '</div></div>' +
          '<span class="material-icons-outlined" style="color:var(--grey-400)">chevron_right</span></div>';
      }).join('');
  }

  contentEl.innerHTML =
    '<div style="padding:32px 40px;max-width:900px;margin:0 auto">' +
      '<h1 style="font-size:22px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:10px">' +
        '<span class="material-icons-outlined" style="font-size:28px;color:#795548">edit_note</span> Lab Notebooks</h1>' +
      '<p style="color:var(--grey-500);margin-bottom:16px">Folders are people. Files are entries. Pick one from the sidebar or create a new one.</p>' +
      (loggedIn ? '<button class="btn btn-primary" style="background:#795548" onclick="createNewEntry()"><span class="material-icons-outlined">add</span> New Entry</button>' : '') +
      recentHtml +
    '</div>';
}

// ── Search ──
document.getElementById('nbSearch').addEventListener('input', function() {
  renderSidebar(this.value);
});

// ── Mobile sidebar ──
document.getElementById('hamburger').onclick = function() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('open');
};
document.getElementById('backdrop').onclick = function() {
  document.getElementById('sidebar').classList.remove('open');
  this.classList.remove('open');
};

// ── Keyboard ──
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 's' && isEditing) { e.preventDefault(); saveDoc(); }
});

// ── Back/forward ──
window.addEventListener('popstate', function() {
  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  if (doc) loadDoc(doc);
  else showWelcome();
});

// ── Init ──
(async function init() {
  loggedIn = Lab.gh.isLoggedIn();
  if (loggedIn) {
    document.getElementById('newFolderBtn').style.display = '';
    document.getElementById('newEntryBtn').style.display = '';
  }
  await loadTree();
  renderSidebar();

  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  if (doc) loadDoc(doc);
  else showWelcome();
})();
</script>
