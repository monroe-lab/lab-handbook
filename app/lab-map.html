<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Map - Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.map-page { padding: 0; height: calc(100vh - var(--nav-height)); display: flex; flex-direction: column; }

/* Breadcrumb */
.map-breadcrumb {
  background: #fff;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--grey-200);
  box-shadow: var(--shadow);
  flex-shrink: 0;
  font-size: 14px;
  z-index: 10;
}
.map-breadcrumb a {
  color: var(--teal);
  text-decoration: none;
  cursor: pointer;
  font-weight: 500;
}
.map-breadcrumb a:hover { text-decoration: underline; }
.map-breadcrumb .sep { color: var(--grey-400); }
.map-breadcrumb .current { color: var(--grey-800); font-weight: 600; }

/* Main canvas */
.map-canvas {
  flex: 1;
  overflow: auto;
  padding: 24px;
  background: var(--grey-100);
}

/* ── Room Layout ── */
.room-layout {
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
}
.room-header {
  margin-bottom: 20px;
}
.room-header h1 {
  font-size: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--grey-800);
  margin: 0 0 4px;
}
.room-header p { color: var(--grey-600); font-size: 14px; margin: 0; }

.room-grid {
  display: grid;
  gap: 16px;
}

/* Zone card (a location in the room) */
.zone-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: box-shadow .15s, transform .1s;
  display: flex;
  align-items: center;
  gap: 14px;
  border-left: 4px solid var(--grey-300);
}
.zone-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.zone-card .zone-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.zone-card .zone-info { flex: 1; min-width: 0; }
.zone-card .zone-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
.zone-card .zone-count { font-size: 13px; color: var(--grey-500); }
.zone-card .zone-arrow {
  color: var(--grey-400);
  font-size: 20px;
  flex-shrink: 0;
}

/* ── Freezer / Cabinet Interior ── */
.container-view {
  max-width: 900px;
  margin: 0 auto;
}
.container-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.container-header .ch-icon {
  width: 56px;
  height: 56px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.container-header h2 { font-size: 20px; margin: 0; }
.container-header .ch-subtitle { font-size: 13px; color: var(--grey-500); margin-top: 2px; }

/* Shelf/rack grid */
.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.shelf-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: box-shadow .15s;
  text-align: center;
  border: 2px solid transparent;
}
.shelf-card:hover { box-shadow: var(--shadow-md); border-color: var(--teal); }
.shelf-card .shelf-label { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.shelf-card .shelf-count { font-size: 12px; color: var(--grey-500); }
.shelf-card .shelf-preview {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 3px;
  margin-top: 8px;
}
.shelf-card .shelf-preview .sp-cell {
  aspect-ratio: 1;
  border-radius: 2px;
  background: var(--grey-100);
}
.shelf-card .shelf-preview .sp-cell.filled { background: var(--teal-light); border: 1px solid var(--teal); }

/* ── Box Grid (tube-level) ── */
.box-view { max-width: 700px; margin: 0 auto; }
.box-grid-wrap {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.box-grid {
  display: grid;
  gap: 4px;
}
.box-grid .grid-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--grey-500);
  text-align: center;
  padding: 4px;
}
.tube-cell {
  aspect-ratio: 1;
  border-radius: 50%;
  border: 2px solid var(--grey-200);
  background: var(--grey-50);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .15s;
  font-size: 10px;
  font-weight: 600;
  color: var(--grey-500);
  position: relative;
  min-width: 0;
}
.tube-cell:hover { border-color: var(--teal); background: var(--teal-light); transform: scale(1.1); z-index: 2; }
.tube-cell.occupied { background: var(--teal-light); border-color: var(--teal); color: var(--teal-dark); }
.tube-cell.occupied:hover { background: var(--teal); color: #fff; }
.tube-cell.empty { border-style: dashed; }
.tube-cell.selected { border-color: var(--teal-dark); background: var(--teal); color: #fff; box-shadow: 0 0 0 3px rgba(0,150,136,.3); transform: scale(1.1); z-index: 2; }

/* Tube detail panel */
.tube-detail {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-top: 16px;
}
.tube-detail h3 { font-size: 16px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
.tube-detail .td-field { display: flex; gap: 8px; margin-bottom: 8px; font-size: 14px; }
.tube-detail .td-label { color: var(--grey-500); min-width: 80px; font-weight: 500; }
.tube-detail .td-value { color: var(--grey-800); }
.tube-detail .td-actions { display: flex; gap: 8px; margin-top: 16px; }

/* Item list (for cabinets, bench — non-grid locations) */
.item-list { margin-top: 16px; }
.item-row {
  background: #fff;
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: box-shadow .15s;
}
.item-row:hover { box-shadow: var(--shadow-md); }
.item-row .ir-icon { font-size: 20px; flex-shrink: 0; }
.item-row .ir-info { flex: 1; }
.item-row .ir-name { font-weight: 600; font-size: 14px; }
.item-row .ir-meta { font-size: 12px; color: var(--grey-500); margin-top: 2px; }
.item-row .ir-pill {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}

/* Visual floor plan (SVG-based room) */
.floor-plan {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 20px;
}
.floor-plan svg { width: 100%; height: auto; }
.floor-plan .fp-zone { cursor: pointer; transition: opacity .15s; }
.floor-plan .fp-zone:hover { opacity: 0.8; }
.floor-plan .fp-label { font-family: Inter, sans-serif; font-size: 11px; font-weight: 600; fill: #fff; pointer-events: none; }
.floor-plan .fp-count { font-family: Inter, sans-serif; font-size: 9px; fill: rgba(255,255,255,.8); pointer-events: none; }

/* Edit form overlay */
.edit-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.4);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.edit-panel {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  width: 420px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.edit-panel h3 { margin: 0 0 16px; font-size: 18px; }
.edit-panel label { display: block; margin-bottom: 12px; font-size: 13px; font-weight: 500; color: var(--grey-700); }
.edit-panel input, .edit-panel select, .edit-panel textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  margin-top: 4px;
}
.edit-panel textarea { min-height: 60px; resize: vertical; }
.edit-panel .ep-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

/* No-data state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--grey-500);
}
.empty-state .material-icons-outlined { font-size: 48px; margin-bottom: 12px; color: var(--grey-300); }
.empty-state h3 { font-size: 16px; margin: 0 0 8px; color: var(--grey-600); }
.empty-state p { font-size: 14px; }

@media (max-width: 768px) {
  .map-canvas { padding: 16px; }
  .shelf-grid { grid-template-columns: repeat(2, 1fr); }
  .zone-card { padding: 12px 14px; }
}
</style>
</head>
<body>
<div class="map-page">

  <!-- Breadcrumb -->
  <div class="map-breadcrumb" id="breadcrumb">
    <span class="material-icons-outlined" style="font-size:18px;color:var(--teal)">map</span>
    <span class="current">Lab Map</span>
  </div>

  <!-- Main content area -->
  <div class="map-canvas" id="mapCanvas">
    <div class="loading-state" id="loadingState"><div class="spinner"></div><p>Loading lab map...</p></div>
  </div>

</div>

<script src="js/shared.js"></script>
<script src="js/nav.js"></script>
<script src="js/types.js"></script>
<script src="js/github-api.js"></script>
<script>
(function() {
  'use strict';

  var BASE = (window.Lab && window.Lab.BASE) || '/lab-handbook/';

  // ── Location definitions (the physical lab layout) ──
  // Each location has an id, label, icon, color, and a mode:
  //   'grid' = freezer-style (shelves → boxes → tubes)
  //   'list' = flat list of items (cabinets, benches)
  var LOCATIONS = [
    { id: 'freezer-80c',      label: 'Freezer -80\u00B0C',       icon: '\u2744\uFE0F',  color: '#1565c0', mode: 'grid',  matchKeys: ['Freezer -80C', '-80C Freezer', '-80C Freezer, rack'] },
    { id: 'freezer-20c',      label: 'Freezer -20\u00B0C',       icon: '\uD83E\uDDCA',  color: '#1976d2', mode: 'grid',  matchKeys: ['Freezer -20C'] },
    { id: 'refrigerator',     label: 'Refrigerator',              icon: '\uD83C\uDF21\uFE0F', color: '#0288d1', mode: 'list', matchKeys: ['Refrigerator'] },
    { id: 'chemical-cabinet',  label: 'Chemical Cabinet',          icon: '\uD83E\uDDEA',  color: '#00796b', mode: 'list', matchKeys: ['Chemical Cabinet'] },
    { id: 'flammable-cabinet', label: 'Flammable Cabinet',         icon: '\uD83D\uDD25',  color: '#e65100', mode: 'list', matchKeys: ['Flammable Cabinet'] },
    { id: 'corrosive-cabinet', label: 'Corrosive Cabinet',         icon: '\u26A0\uFE0F',  color: '#f57f17', mode: 'list', matchKeys: ['Corrosive Cabinet'] },
    { id: 'bench-1',          label: 'Bench 1',                   icon: '\uD83E\uDD4C',  color: '#455a64', mode: 'list', matchKeys: ['Bench', 'Bench 1', 'Lab bench'] },
    { id: 'bench-2',          label: 'Bench 2',                   icon: '\uD83E\uDD4C',  color: '#546e7a', mode: 'list', matchKeys: ['Bench 2'] },
    { id: 'bench-3',          label: 'Bench 3',                   icon: '\uD83E\uDD4C',  color: '#607d8b', mode: 'list', matchKeys: ['Bench 3'] },
    { id: 'seed-cabinet',     label: 'Seed Cabinet',              icon: '\uD83C\uDF31',  color: '#558b2f', mode: 'grid', matchKeys: ['Seed cabinet'] },
    { id: 'other',            label: 'Other Locations',           icon: '\uD83D\uDCCD',  color: '#757575', mode: 'list', matchKeys: [] }, // catch-all
  ];

  // ── State ──
  var allObjects = [];
  var mapData = {};      // location configs stored as markdown (future)
  var navStack = [];     // breadcrumb history: [{view, label, params}]
  var currentView = null;

  // ── Init ──
  async function loadData() {
    try {
      allObjects = await Lab.gh.fetchObjectIndex();
    } catch(e) {
      console.error('Failed to load data:', e);
      allObjects = [];
    }
    showRoomView();
  }

  Lab.checkPasswordGate();
  Lab.renderNav();
  loadData();

  // ── Assign items to locations ──
  function getItemsForLocation(loc) {
    if (loc.id === 'other') {
      // Items that don't match any named location
      var claimed = new Set();
      LOCATIONS.forEach(function(l) {
        if (l.id !== 'other') {
          l.matchKeys.forEach(function(k) { claimed.add(k.toLowerCase()); });
        }
      });
      return allObjects.filter(function(obj) {
        var objLoc = (obj.location || '').toLowerCase();
        if (!objLoc) return false;
        for (var i = 0; i < LOCATIONS.length; i++) {
          if (LOCATIONS[i].id === 'other') continue;
          for (var j = 0; j < LOCATIONS[i].matchKeys.length; j++) {
            if (objLoc.indexOf(LOCATIONS[i].matchKeys[j].toLowerCase()) !== -1) return false;
          }
        }
        return true;
      });
    }
    return allObjects.filter(function(obj) {
      var objLoc = (obj.location || '').toLowerCase();
      for (var j = 0; j < loc.matchKeys.length; j++) {
        if (objLoc.indexOf(loc.matchKeys[j].toLowerCase()) !== -1) return true;
      }
      // Also check containers
      if (obj.containers && obj.containers.length) {
        for (var c = 0; c < obj.containers.length; c++) {
          var cLoc = (obj.containers[c].location || '').toLowerCase();
          for (var j = 0; j < loc.matchKeys.length; j++) {
            if (cLoc.indexOf(loc.matchKeys[j].toLowerCase()) !== -1) return true;
          }
        }
      }
      return false;
    });
  }

  // ── Breadcrumb ──
  function updateBreadcrumb() {
    var el = document.getElementById('breadcrumb');
    var html = '<span class="material-icons-outlined" style="font-size:18px;color:var(--teal)">map</span>';

    if (navStack.length === 0) {
      html += '<span class="current">Robbins Hall 0170</span>';
    } else {
      html += '<a onclick="labMap.navigateTo(0)">Lab Map</a>';
      for (var i = 0; i < navStack.length; i++) {
        html += '<span class="sep">/</span>';
        if (i === navStack.length - 1) {
          html += '<span class="current">' + Lab.escHtml(navStack[i].label) + '</span>';
        } else {
          html += '<a onclick="labMap.navigateTo(' + (i + 1) + ')">' + Lab.escHtml(navStack[i].label) + '</a>';
        }
      }
    }
    el.innerHTML = html;
  }

  // ── Room View (top-level floor plan) ──
  function showRoomView() {
    navStack = [];
    updateBreadcrumb();

    var canvas = document.getElementById('mapCanvas');
    var html = '<div class="room-layout">';

    // Room header
    html += '<div class="room-header">';
    html += '<h1><span class="material-icons-outlined">map</span> Robbins Hall 0170</h1>';
    html += '<p>Click a location to explore its contents</p>';
    html += '</div>';

    // Floor plan SVG
    html += '<div class="floor-plan">';
    html += buildFloorPlanSVG();
    html += '</div>';

    // Location cards grid
    html += '<div class="room-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">';
    LOCATIONS.forEach(function(loc) {
      var items = getItemsForLocation(loc);
      if (items.length === 0 && loc.id === 'other') return; // hide empty "other"
      html += '<div class="zone-card" onclick="labMap.openLocation(\'' + loc.id + '\')" style="border-left-color:' + loc.color + '">';
      html += '<div class="zone-icon" style="background:' + loc.color + '15">' + loc.icon + '</div>';
      html += '<div class="zone-info">';
      html += '<div class="zone-name">' + Lab.escHtml(loc.label) + '</div>';
      html += '<div class="zone-count">' + items.length + ' item' + (items.length !== 1 ? 's' : '') + '</div>';
      html += '</div>';
      html += '<span class="material-icons-outlined zone-arrow">chevron_right</span>';
      html += '</div>';
    });
    html += '</div></div>';

    canvas.innerHTML = html;
  }

  // ── Floor Plan SVG ──
  function buildFloorPlanSVG() {
    // Simplified top-down layout of the lab
    var svg = '<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">';

    // Room outline
    svg += '<rect x="10" y="10" width="780" height="380" rx="4" fill="none" stroke="#e0e0e0" stroke-width="2"/>';

    // Door
    svg += '<rect x="370" y="380" width="60" height="12" rx="2" fill="#fff" stroke="#bdbdbd" stroke-width="1"/>';
    svg += '<text x="400" y="400" text-anchor="middle" font-size="9" fill="#9e9e9e" font-family="Inter,sans-serif">Door</text>';

    // Define zones as positioned rectangles
    var zones = [
      // Freezers along back wall
      { loc: 'freezer-80c',      x: 20,  y: 20,  w: 120, h: 70,  label: '-80\u00B0C Freezer' },
      { loc: 'freezer-20c',      x: 150, y: 20,  w: 100, h: 70,  label: '-20\u00B0C Freezer' },
      { loc: 'refrigerator',     x: 260, y: 20,  w: 90,  h: 70,  label: 'Fridge' },

      // Cabinets along left wall
      { loc: 'chemical-cabinet',  x: 20,  y: 110, w: 100, h: 60,  label: 'Chemical\nCabinet' },
      { loc: 'flammable-cabinet', x: 20,  y: 180, w: 100, h: 60,  label: 'Flammable\nCabinet' },
      { loc: 'corrosive-cabinet', x: 20,  y: 250, w: 100, h: 60,  label: 'Corrosive\nCabinet' },

      // Benches (center)
      { loc: 'bench-1', x: 200, y: 130, w: 240, h: 50, label: 'Bench 1' },
      { loc: 'bench-2', x: 200, y: 200, w: 240, h: 50, label: 'Bench 2' },
      { loc: 'bench-3', x: 200, y: 270, w: 240, h: 50, label: 'Bench 3' },

      // Seed cabinet
      { loc: 'seed-cabinet', x: 20, y: 330, w: 100, h: 50, label: 'Seed Cabinet' },

      // Right side — other equipment
      { loc: 'other', x: 550, y: 20, w: 230, h: 360, label: 'Other Equipment' },
    ];

    zones.forEach(function(z) {
      var loc = LOCATIONS.find(function(l) { return l.id === z.loc; });
      if (!loc) return;
      var items = getItemsForLocation(loc);
      if (items.length === 0 && loc.id === 'other') return;

      svg += '<g class="fp-zone" onclick="labMap.openLocation(\'' + z.loc + '\')">';
      svg += '<rect x="' + z.x + '" y="' + z.y + '" width="' + z.w + '" height="' + z.h + '" rx="4" fill="' + loc.color + '" opacity="0.85"/>';

      // Label (handle newlines)
      var lines = z.label.split('\n');
      var labelY = z.y + z.h/2 - (lines.length - 1) * 7;
      lines.forEach(function(line, i) {
        svg += '<text class="fp-label" x="' + (z.x + z.w/2) + '" y="' + (labelY + i * 14) + '" text-anchor="middle" dominant-baseline="central">' + line + '</text>';
      });

      // Item count
      svg += '<text class="fp-count" x="' + (z.x + z.w/2) + '" y="' + (z.y + z.h - 8) + '" text-anchor="middle">' + items.length + ' items</text>';
      svg += '</g>';
    });

    svg += '</svg>';
    return svg;
  }

  // ── Location View (items in a zone) ──
  function openLocation(locId) {
    var loc = LOCATIONS.find(function(l) { return l.id === locId; });
    if (!loc) return;

    navStack = [{ label: loc.label, view: 'location', params: { locId: locId } }];
    updateBreadcrumb();

    var items = getItemsForLocation(loc);
    var canvas = document.getElementById('mapCanvas');

    if (loc.mode === 'grid') {
      showGridLocation(loc, items);
    } else {
      showListLocation(loc, items);
    }
  }

  // ── List-mode location (cabinets, benches) ──
  function showListLocation(loc, items) {
    var canvas = document.getElementById('mapCanvas');
    var html = '<div class="container-view">';

    html += '<div class="container-header">';
    html += '<div class="ch-icon" style="background:' + loc.color + '15">' + loc.icon + '</div>';
    html += '<div>';
    html += '<h2>' + Lab.escHtml(loc.label) + '</h2>';
    html += '<div class="ch-subtitle">' + items.length + ' item' + (items.length !== 1 ? 's' : '') + '</div>';
    html += '</div>';
    html += '</div>';

    if (items.length === 0) {
      html += '<div class="empty-state"><span class="material-icons-outlined">inventory_2</span>';
      html += '<h3>Nothing here yet</h3><p>Items assigned to this location will appear here.</p></div>';
    } else {
      html += '<div class="item-list">';
      items.sort(function(a, b) { return (a.title || '').localeCompare(b.title || ''); });
      items.forEach(function(obj) {
        var typeConf = Lab.Types.getType(obj.type || 'reagent');
        var qty = '';
        if (obj.containers && obj.containers.length) {
          qty = obj.containers.map(function(c) { return (c.quantity || '?') + ' ' + (c.unit || ''); }).join(', ');
        }
        html += '<div class="item-row" onclick="labMap.openItem(\'' + Lab.escHtml(obj.path || '') + '\')">';
        html += '<div class="ir-icon">' + typeConf.icon + '</div>';
        html += '<div class="ir-info">';
        html += '<div class="ir-name">' + Lab.escHtml(obj.title || 'Untitled') + '</div>';
        html += '<div class="ir-meta">' + Lab.escHtml(qty) + '</div>';
        html += '</div>';
        html += '<span class="ir-pill" style="background:' + typeConf.color + '15;color:' + typeConf.color + '">' + Lab.escHtml(typeConf.label) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
    canvas.innerHTML = html;
  }

  // ── Grid-mode location (freezers — shelves → boxes → tubes) ──
  function showGridLocation(loc, items) {
    var canvas = document.getElementById('mapCanvas');
    var html = '<div class="container-view">';

    html += '<div class="container-header">';
    html += '<div class="ch-icon" style="background:' + loc.color + '15">' + loc.icon + '</div>';
    html += '<div>';
    html += '<h2>' + Lab.escHtml(loc.label) + '</h2>';
    html += '<div class="ch-subtitle">' + items.length + ' item' + (items.length !== 1 ? 's' : '') + ' stored here</div>';
    html += '</div>';
    html += '</div>';

    // For the prototype, show a freezer with 5 shelves, 4 racks per shelf
    // Items are distributed across shelves based on their data
    // (In the full version, shelf/box assignments come from markdown files)
    var shelves = buildShelves(loc, items);

    html += '<div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">';
    html += '<span style="font-size:14px;color:var(--grey-600)">' + shelves.length + ' shelves</span>';
    html += '</div>';

    html += '<div class="shelf-grid">';
    shelves.forEach(function(shelf, si) {
      var occupied = shelf.items.length;
      html += '<div class="shelf-card" onclick="labMap.openShelf(\'' + loc.id + '\',' + si + ')">';
      html += '<div class="shelf-label">' + Lab.escHtml(shelf.label) + '</div>';
      html += '<div class="shelf-count">' + occupied + ' item' + (occupied !== 1 ? 's' : '') + '</div>';
      // Mini preview grid
      html += '<div class="shelf-preview">';
      for (var i = 0; i < 8; i++) {
        html += '<div class="sp-cell' + (i < occupied ? ' filled' : '') + '"></div>';
      }
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Also show all items as a list below
    html += '<div style="margin-top:20px">';
    html += '<h3 style="font-size:15px;color:var(--grey-700);margin-bottom:12px">All Items</h3>';
    html += '<div class="item-list">';
    items.sort(function(a, b) { return (a.title || '').localeCompare(b.title || ''); });
    items.forEach(function(obj) {
      var typeConf = Lab.Types.getType(obj.type || 'reagent');
      html += '<div class="item-row" onclick="labMap.openItem(\'' + Lab.escHtml(obj.path || '') + '\')">';
      html += '<div class="ir-icon">' + typeConf.icon + '</div>';
      html += '<div class="ir-info">';
      html += '<div class="ir-name">' + Lab.escHtml(obj.title || 'Untitled') + '</div>';
      html += '</div>';
      html += '<span class="ir-pill" style="background:' + typeConf.color + '15;color:' + typeConf.color + '">' + Lab.escHtml(typeConf.label) + '</span>';
      html += '</div>';
    });
    html += '</div></div>';

    html += '</div>';
    canvas.innerHTML = html;
  }

  function buildShelves(loc, items) {
    // Prototype: distribute items across shelves
    var numShelves = 5;
    var shelves = [];
    for (var i = 0; i < numShelves; i++) {
      shelves.push({ label: 'Shelf ' + (i + 1), items: [] });
    }
    items.forEach(function(item, idx) {
      shelves[idx % numShelves].items.push(item);
    });
    return shelves;
  }

  // ── Shelf View (boxes in a shelf) ──
  function openShelf(locId, shelfIdx) {
    var loc = LOCATIONS.find(function(l) { return l.id === locId; });
    if (!loc) return;

    var items = getItemsForLocation(loc);
    var shelves = buildShelves(loc, items);
    var shelf = shelves[shelfIdx];
    if (!shelf) return;

    navStack = [
      { label: loc.label, view: 'location', params: { locId: locId } },
      { label: shelf.label, view: 'shelf', params: { locId: locId, shelfIdx: shelfIdx } },
    ];
    updateBreadcrumb();

    var canvas = document.getElementById('mapCanvas');
    var html = '<div class="box-view">';

    html += '<div class="container-header">';
    html += '<div class="ch-icon" style="background:' + loc.color + '15">' + loc.icon + '</div>';
    html += '<div>';
    html += '<h2>' + Lab.escHtml(shelf.label) + '</h2>';
    html += '<div class="ch-subtitle">' + Lab.escHtml(loc.label) + ' &middot; ' + shelf.items.length + ' item' + (shelf.items.length !== 1 ? 's' : '') + '</div>';
    html += '</div>';
    html += '</div>';

    // Show a box grid (9x9 by default)
    var gridSize = 9;
    html += '<div class="box-grid-wrap">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
    html += '<span style="font-size:14px;font-weight:600;color:var(--grey-700)">Box Layout (' + gridSize + ' x ' + gridSize + ')</span>';
    html += '</div>';

    html += '<div class="box-grid" style="grid-template-columns: 30px repeat(' + gridSize + ', 1fr);">';

    // Column headers
    html += '<div class="grid-header"></div>';
    for (var c = 1; c <= gridSize; c++) {
      html += '<div class="grid-header">' + c + '</div>';
    }

    // Rows
    var itemIdx = 0;
    for (var r = 0; r < gridSize; r++) {
      var rowLabel = String.fromCharCode(65 + r); // A, B, C...
      html += '<div class="grid-header" style="display:flex;align-items:center;justify-content:center">' + rowLabel + '</div>';
      for (var c = 0; c < gridSize; c++) {
        var item = shelf.items[itemIdx] || null;
        var cellId = rowLabel + (c + 1);
        if (item) {
          var typeConf = Lab.Types.getType(item.type || 'reagent');
          html += '<div class="tube-cell occupied" onclick="labMap.selectTube(\'' + locId + '\',' + shelfIdx + ',' + itemIdx + ')" title="' + Lab.escHtml(item.title || '') + '" style="font-size:8px;border-color:' + typeConf.color + ';background:' + typeConf.color + '15;color:' + typeConf.color + '">';
          // Show first 3 chars
          var short = (item.title || '').substring(0, 3);
          html += short;
          html += '</div>';
          itemIdx++;
        } else {
          html += '<div class="tube-cell empty">' + cellId + '</div>';
        }
      }
    }
    html += '</div></div>';

    // Selected tube detail (empty initially)
    html += '<div id="tubeDetail"></div>';

    html += '</div>';
    canvas.innerHTML = html;
  }

  // ── Tube Selection ──
  function selectTube(locId, shelfIdx, itemIdx) {
    var loc = LOCATIONS.find(function(l) { return l.id === locId; });
    if (!loc) return;

    var items = getItemsForLocation(loc);
    var shelves = buildShelves(loc, items);
    var shelf = shelves[shelfIdx];
    if (!shelf) return;
    var item = shelf.items[itemIdx];
    if (!item) return;

    // Clear previous selection
    document.querySelectorAll('.tube-cell.selected').forEach(function(el) { el.classList.remove('selected'); });
    // Find and select this cell
    var cells = document.querySelectorAll('.tube-cell.occupied');
    if (cells[itemIdx]) cells[itemIdx].classList.add('selected');

    var typeConf = Lab.Types.getType(item.type || 'reagent');
    var detail = document.getElementById('tubeDetail');

    var html = '<div class="tube-detail">';
    html += '<h3>' + typeConf.icon + ' ' + Lab.escHtml(item.title || 'Untitled') + '</h3>';

    html += '<div class="td-field"><span class="td-label">Type</span>';
    html += '<span class="td-value"><span style="display:inline-block;padding:1px 10px;border-radius:20px;font-size:12px;font-weight:600;background:' + typeConf.color + '15;color:' + typeConf.color + '">' + Lab.escHtml(typeConf.label) + '</span></span></div>';

    if (item.location) {
      html += '<div class="td-field"><span class="td-label">Location</span><span class="td-value">' + Lab.escHtml(item.location) + '</span></div>';
    }
    if (item.containers && item.containers.length) {
      item.containers.forEach(function(c) {
        var qty = (c.quantity || '?') + ' ' + (c.unit || '');
        html += '<div class="td-field"><span class="td-label">Container</span><span class="td-value">' + Lab.escHtml(qty) + ' @ ' + Lab.escHtml(c.location || '?') + '</span></div>';
      });
    }
    if (item.notes) {
      html += '<div class="td-field"><span class="td-label">Notes</span><span class="td-value">' + Lab.escHtml(item.notes) + '</span></div>';
    }

    html += '<div class="td-actions">';
    if (item.path) {
      html += '<a class="btn btn-ghost" href="' + BASE + 'app/wiki.html?file=' + encodeURIComponent(item.path) + '" style="text-decoration:none">';
      html += '<span class="material-icons-outlined" style="font-size:16px">open_in_new</span> View Card</a>';
    }
    html += '</div>';
    html += '</div>';

    detail.innerHTML = html;
  }

  // ── Open an item (navigate to wiki) ──
  function openItem(path) {
    if (!path) return;
    location.href = BASE + 'app/wiki.html?file=' + encodeURIComponent(path);
  }

  // ── Navigation ──
  function navigateTo(depth) {
    if (depth === 0) {
      showRoomView();
      return;
    }
    var target = navStack[depth - 1];
    if (!target) return;

    if (target.view === 'location') {
      openLocation(target.params.locId);
    } else if (target.view === 'shelf') {
      // First go to location, then shelf
      openLocation(target.params.locId);
      // then override to shelf
      openShelf(target.params.locId, target.params.shelfIdx);
    }
  }

  // ── Public API ──
  window.labMap = {
    openLocation: openLocation,
    openShelf: openShelf,
    selectTube: selectTube,
    openItem: openItem,
    navigateTo: navigateTo,
  };

})();
</script>
</body>
</html>
