<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.profile-page { max-width: 960px; margin: 0 auto; padding: 24px 20px calc(var(--bottom-nav-height) + 24px); }

.profile-header {
  background: linear-gradient(135deg, #00695c, #00897b);
  border-radius: var(--radius);
  padding: 28px 32px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: var(--shadow-md);
  margin-bottom: 20px;
}
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: #fff; flex-shrink: 0;
  border: 3px solid rgba(255,255,255,.35);
  overflow: hidden;
}
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-meta h1 { font-size: 26px; font-weight: 700; margin: 0; line-height: 1.1; }
.profile-meta .profile-login { font-size: 14px; color: rgba(255,255,255,.82); margin-top: 4px; }
.profile-meta .profile-active { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 6px; }

.profile-user-picker {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 12px;
  color: rgba(255,255,255,.7);
}
.profile-user-picker select {
  background: rgba(255,255,255,.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
}
.profile-user-picker option { color: #1a1a1a; }

.profile-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--grey-400);
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.profile-empty .material-icons-outlined { font-size: 48px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-tile {
  background: #fff;
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
}
.stat-tile .material-icons-outlined { font-size: 28px; color: var(--teal); flex-shrink: 0; }
.stat-tile-value { font-size: 24px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.stat-tile-label { font-size: 11px; color: var(--grey-500); text-transform: uppercase; letter-spacing: .4px; margin-top: 4px; }

.section-heading {
  font-size: 13px;
  font-weight: 700;
  color: var(--grey-600);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin: 24px 0 12px;
}

.badges-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.badge-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
}
.badge-card.locked { opacity: .5; filter: grayscale(.6); }
.badge-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffd54f, #ffa000);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  flex-shrink: 0;
  font-size: 20px;
}
.badge-card.locked .badge-icon {
  background: var(--grey-300);
}
.badge-title { font-size: 13px; font-weight: 700; color: #1a1a1a; line-height: 1.2; }
.badge-desc { font-size: 11px; color: var(--grey-500); margin-top: 2px; }
.badge-progress { font-size: 10px; color: var(--grey-400); margin-top: 3px; }

.recent-list {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 6px 0;
  margin-bottom: 24px;
}
.recent-item {
  padding: 10px 18px;
  border-bottom: 1px solid var(--grey-100);
  display: flex;
  align-items: center;
  gap: 12px;
}
.recent-item:last-child { border-bottom: none; }
.recent-sha {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11px;
  color: var(--grey-400);
  min-width: 62px;
}
.recent-subject { font-size: 13px; color: #1a1a1a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.recent-date { font-size: 11px; color: var(--grey-400); flex-shrink: 0; }

.leaderboard {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 6px 0;
}
.leaderboard-item {
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--grey-100);
  transition: background .1s;
}
.leaderboard-item:last-child { border-bottom: none; }
.leaderboard-item:hover { background: var(--grey-50, #f9fafb); }
.leaderboard-item.active { background: #e0f2f1; }
.leaderboard-rank { font-size: 13px; font-weight: 700; color: var(--grey-400); min-width: 24px; }
.leaderboard-name { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; }
.leaderboard-stats { font-size: 11px; color: var(--grey-500); }

@media (max-width: 768px) {
  .profile-page { padding: 14px 12px calc(var(--bottom-nav-height) + 14px); }
  .profile-header { flex-direction: column; text-align: center; padding: 20px; }
  .profile-user-picker { margin-left: 0; margin-top: 8px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .badges-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<script src="js/lab.js"></script>

<div class="profile-page" id="profilePage">
  <div id="loadingState" style="text-align:center;padding:40px;color:var(--grey-400);">
    <div class="spinner"></div><p>Loading profile...</p>
  </div>
  <div id="profileContent" style="display:none"></div>
</div>

<script>
(function() {
  'use strict';

  var BASE = (window.Lab && window.Lab.BASE) || '/lab-handbook/';

  function esc(s) { return Lab.escHtml ? Lab.escHtml(s) : String(s == null ? '' : s); }

  // ── Tiered badge system ──
  // Each category has 5 tiers. Your badge levels up as you hit higher
  // thresholds — there's always a next tier to work toward.
  var TIERS = [
    { name: 'Bronze',   color: '#cd7f32', bg: '#fdf4e7' },
    { name: 'Silver',   color: '#94a3b8', bg: '#f1f5f9' },
    { name: 'Gold',     color: '#d4a017', bg: '#fef9e7' },
    { name: 'Platinum', color: '#6366f1', bg: '#eef2ff' },
    { name: 'Diamond',  color: '#06b6d4', bg: '#ecfeff' },
  ];

  var BADGE_CATEGORIES = [
    { id: 'commits',    icon: '🔨', title: 'Contributor', field: 'total_commits',       thresholds: [10, 50, 100, 500, 1000] },
    { id: 'protocols',  icon: '🧪', title: 'Protocol Author', field: 'protocols_authored', thresholds: [1, 5, 10, 25, 50] },
    { id: 'notebooks',  icon: '📓', title: 'Chronicler',  field: 'notebooks_authored',  thresholds: [1, 10, 20, 50, 100] },
    { id: 'inventory',  icon: '📦', title: 'Inventory Keeper', field: 'inventory_edits', thresholds: [10, 50, 100, 500, 1000] },
    { id: 'wiki',       icon: '📚', title: 'Wiki Builder', field: 'wiki_edits',         thresholds: [10, 50, 100, 250, 500] },
    { id: 'photos',     icon: '📸', title: 'Photographer', field: 'images_uploaded',    thresholds: [5, 25, 50, 100, 200] },
    { id: 'bugs',       icon: '🐛', title: 'Bug Hunter',   field: 'issue_attachments',  thresholds: [1, 5, 10, 25, 50] },
  ];

  // Returns { tierIndex: 0-4 or -1 if none, current, nextThreshold, maxTier }
  function getBadgeLevel(category, stats) {
    var val = stats[category.field] || 0;
    var tierIndex = -1;
    for (var i = category.thresholds.length - 1; i >= 0; i--) {
      if (val >= category.thresholds[i]) { tierIndex = i; break; }
    }
    var nextThreshold = tierIndex < category.thresholds.length - 1
      ? category.thresholds[tierIndex + 1]
      : null;
    return {
      tierIndex: tierIndex,
      tier: tierIndex >= 0 ? TIERS[tierIndex] : null,
      current: val,
      nextThreshold: nextThreshold,
      maxTier: tierIndex === category.thresholds.length - 1,
    };
  }

  function getCurrentLogin() {
    try {
      var u = JSON.parse(localStorage.getItem('gh_lab_user') || '{}');
      return u.login || '';
    } catch(e) { return ''; }
  }

  function getUrlUser() {
    var params = new URLSearchParams(location.search);
    return params.get('user') || '';
  }

  async function loadStats() {
    try {
      var r = await fetch(BASE + 'user-stats.json?' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch(e) {
      throw new Error('Could not load user-stats.json: ' + e.message);
    }
  }

  function formatDateRange(first, last) {
    if (!first || !last) return '';
    if (first === last) return 'Active on ' + first;
    return 'Active ' + first + ' → ' + last;
  }

  function renderStats(user) {
    var tiles = [
      { icon: 'commit', value: user.total_commits || 0, label: 'Commits' },
      { icon: 'science', value: user.protocols_authored || 0, label: 'Protocols authored' },
      { icon: 'edit_note', value: user.notebooks_authored || 0, label: 'Notebook entries' },
      { icon: 'inventory_2', value: user.inventory_edits || 0, label: 'Inventory edits' },
      { icon: 'article', value: user.wiki_edits || 0, label: 'Wiki edits' },
      { icon: 'image', value: user.images_uploaded || 0, label: 'Images uploaded' },
      { icon: 'attach_file', value: user.issue_attachments || 0, label: 'Issue attachments' },
    ];
    return '<div class="stats-grid">' +
      tiles.map(function(t) {
        return '<div class="stat-tile" data-stat="' + t.label.toLowerCase().replace(/ /g, '-') + '">' +
          '<span class="material-icons-outlined">' + t.icon + '</span>' +
          '<div><div class="stat-tile-value">' + t.value + '</div>' +
          '<div class="stat-tile-label">' + t.label + '</div></div>' +
        '</div>';
      }).join('') +
      '</div>';
  }

  function renderBadges(user) {
    var html = '<h2 class="section-heading">Badges</h2><div class="badges-grid">';
    BADGE_CATEGORIES.forEach(function(cat) {
      var level = getBadgeLevel(cat, user);
      var hasAny = level.tierIndex >= 0;
      var tier = level.tier;
      var tierLabel = tier ? tier.name : 'Locked';
      var tierColor = tier ? tier.color : '#cbd5e1';
      var tierBg = tier ? tier.bg : '#f8fafc';
      var iconBg = tier
        ? 'background:linear-gradient(135deg,' + tier.color + '20,' + tier.color + '40);border:2px solid ' + tier.color + '60'
        : 'background:#e2e8f0;border:2px solid #cbd5e1';

      // Progress bar to next tier
      var progressHtml = '';
      if (!level.maxTier) {
        var prevThreshold = level.tierIndex >= 0 ? cat.thresholds[level.tierIndex] : 0;
        var nextT = level.nextThreshold || cat.thresholds[0];
        var range = nextT - prevThreshold;
        var progress = Math.min(level.current - prevThreshold, range);
        var pct = range > 0 ? Math.round((progress / range) * 100) : 0;
        var nextTierName = TIERS[level.tierIndex + 1] ? TIERS[level.tierIndex + 1].name : '';
        var nextTierColor = TIERS[level.tierIndex + 1] ? TIERS[level.tierIndex + 1].color : '#94a3b8';
        progressHtml =
          '<div style="margin-top:6px">' +
            '<div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-bottom:3px">' +
              '<span>' + level.current + ' / ' + nextT + '</span>' +
              '<span>' + nextTierName + '</span>' +
            '</div>' +
            '<div style="height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden">' +
              '<div style="height:100%;width:' + pct + '%;background:' + nextTierColor + ';border-radius:2px;transition:width .3s"></div>' +
            '</div>' +
          '</div>';
      } else {
        progressHtml = '<div style="margin-top:6px;font-size:10px;color:' + tierColor + ';font-weight:600">MAX TIER</div>';
      }

      // Tier dots showing all 5 levels
      var dotsHtml = '<div style="display:flex;gap:3px;margin-top:4px">';
      for (var i = 0; i < TIERS.length; i++) {
        var dotColor = i <= level.tierIndex ? TIERS[i].color : '#e2e8f0';
        dotsHtml += '<div title="' + TIERS[i].name + (i <= level.tierIndex ? ' ✓' : '') + '" style="width:8px;height:8px;border-radius:50%;background:' + dotColor + '"></div>';
      }
      dotsHtml += '</div>';

      html += '<div class="badge-card" data-badge="' + cat.id + '" style="background:' + tierBg + ';border:1px solid ' + tierColor + '30">' +
        '<div class="badge-icon" style="' + iconBg + '">' + cat.icon + '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="display:flex;align-items:center;gap:6px">' +
            '<div class="badge-title">' + esc(cat.title) + '</div>' +
            '<span style="font-size:10px;font-weight:700;color:' + tierColor + ';padding:1px 6px;border-radius:4px;background:' + tierColor + '18">' + tierLabel + '</span>' +
          '</div>' +
          dotsHtml +
          progressHtml +
        '</div>' +
      '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderRecent(user) {
    var recent = (user.recent_commits || []).slice().reverse();
    if (!recent.length) return '';
    var html = '<h2 class="section-heading">Recent activity</h2><div class="recent-list">';
    recent.forEach(function(c) {
      html += '<div class="recent-item">' +
        '<div class="recent-sha">' + esc(c.sha || '') + '</div>' +
        '<div class="recent-subject">' + esc(c.subject || '') + '</div>' +
        '<div class="recent-date">' + esc(c.date || '') + '</div>' +
      '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderLeaderboard(allUsers, activeLogin) {
    var logins = Object.keys(allUsers);
    if (logins.length <= 1) return '';
    var html = '<h2 class="section-heading">Lab leaderboard</h2><div class="leaderboard" id="leaderboard">';
    logins.forEach(function(login, i) {
      var u = allUsers[login];
      var cls = login === activeLogin ? 'leaderboard-item active' : 'leaderboard-item';
      html += '<div class="' + cls + '" data-login="' + esc(login) + '">' +
        '<div class="leaderboard-rank">#' + (i + 1) + '</div>' +
        '<div class="leaderboard-name">' + esc(u.display_name || login) + '</div>' +
        '<div class="leaderboard-stats">' + (u.total_commits || 0) + ' commits · ' +
          (u.protocols_authored || 0) + ' protocols · ' + (u.notebooks_authored || 0) + ' notes</div>' +
      '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderHeader(user, allUsers) {
    var avatar = '<div class="profile-avatar">' + esc(((user.display_name || user.login || '?')[0] || '?').toUpperCase()) + '</div>';
    // Use GitHub avatar if this is the logged-in user
    try {
      var me = JSON.parse(localStorage.getItem('gh_lab_user') || '{}');
      if (me.login === user.login && me.avatar) {
        avatar = '<div class="profile-avatar"><img src="' + esc(me.avatar) + '" alt=""></div>';
      }
    } catch(e) {}

    var picker = '';
    if (Object.keys(allUsers).length > 1) {
      var options = Object.keys(allUsers).map(function(l) {
        var selected = l === user.login ? ' selected' : '';
        return '<option value="' + esc(l) + '"' + selected + '">' + esc(allUsers[l].display_name || l) + '</option>';
      }).join('');
      picker = '<div class="profile-user-picker">Viewing: <select id="userPicker">' + options + '</select></div>';
    }

    return '<div class="profile-header">' +
      avatar +
      '<div class="profile-meta">' +
        '<h1>' + esc(user.display_name || user.login) + '</h1>' +
        '<div class="profile-login">@' + esc(user.login) + '</div>' +
        '<div class="profile-active">' + esc(formatDateRange(user.first_commit, user.last_commit)) + '</div>' +
      '</div>' +
      picker +
    '</div>';
  }

  async function init() {
    var statsPayload;
    try {
      statsPayload = await loadStats();
    } catch(e) {
      document.getElementById('loadingState').innerHTML =
        '<p>Could not load user stats. Is <code>user-stats.json</code> deployed?</p>';
      return;
    }

    var users = statsPayload.users || {};
    var loginFromUrl = getUrlUser();
    var loginFromLocal = getCurrentLogin();
    var login = loginFromUrl || loginFromLocal || Object.keys(users)[0];
    var user = users[login];

    document.getElementById('loadingState').style.display = 'none';
    var content = document.getElementById('profileContent');
    content.style.display = '';

    if (!user) {
      content.innerHTML =
        '<div class="profile-empty">' +
          '<span class="material-icons-outlined">person_off</span>' +
          '<p>No activity recorded for <strong>@' + esc(login) + '</strong> yet.</p>' +
          '<p style="font-size:12px;color:var(--grey-400);">' +
            'Push a commit and re-run <code>scripts/build-user-stats.py</code> to see stats here.' +
          '</p>' +
        '</div>';
      return;
    }

    content.innerHTML =
      renderHeader(user, users) +
      renderStats(user) +
      renderBadges(user) +
      renderRecent(user) +
      renderLeaderboard(users, login);

    // Wire the user picker
    var picker = document.getElementById('userPicker');
    if (picker) {
      picker.addEventListener('change', function(e) {
        var url = new URL(location.href);
        url.searchParams.set('user', e.target.value);
        location.href = url.toString();
      });
    }
    // Wire leaderboard rows
    document.querySelectorAll('.leaderboard-item').forEach(function(row) {
      row.addEventListener('click', function() {
        var l = row.getAttribute('data-login');
        if (!l) return;
        var url = new URL(location.href);
        url.searchParams.set('user', l);
        location.href = url.toString();
      });
    });

    // R12 #42: dispatch an event so tests (and other pages) can hook
    // into "profile loaded" without racing against network.
    window.dispatchEvent(new CustomEvent('profile-loaded', { detail: { user: user } }));
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
