<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People - Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.people-page { max-width: 960px; margin: 0 auto; padding: 24px 20px calc(var(--bottom-nav-height) + 24px); }
.people-header { margin-bottom: 20px; }
.people-header h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
.people-header p { font-size: 13px; color: var(--grey-500); margin: 0; }
.people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

.person-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow .15s, transform .1s;
}
.person-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.person-card-header {
  background: linear-gradient(135deg, #1565c0, #0d47a1);
  padding: 24px 20px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.person-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #fff; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,.3);
}
.person-name { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.2; }
.person-role { font-size: 13px; color: rgba(255,255,255,.8); margin-top: 2px; }

.person-card-body { padding: 16px 20px; }
.person-field {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 13px; color: var(--grey-700);
}
.person-field .material-icons-outlined { font-size: 16px; color: var(--grey-400); flex-shrink: 0; }
.person-field a { color: var(--teal); text-decoration: none; }
.person-field a:hover { text-decoration: underline; }

.person-links { padding: 12px 20px; border-top: 1px solid var(--grey-100); }
.person-links-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--grey-400); margin-bottom: 6px; }
.person-pill-list { display: flex; flex-wrap: wrap; gap: 6px; }

/* Person dashboard */
.person-dash-header {
  background: linear-gradient(135deg, #1565c0, #0d47a1);
  border-radius: var(--radius);
  padding: 24px 28px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-md);
}
.person-dash-header .person-avatar { width: 64px; height: 64px; font-size: 28px; }
.person-dash-back {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--grey-500); text-decoration: none; font-size: 13px;
  margin-bottom: 12px; font-weight: 500;
}
.person-dash-back:hover { color: var(--teal); }
.person-dash-section {
  margin-bottom: 20px;
}
.person-dash-section h3 {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--grey-600);
  margin: 0 0 10px; display: flex; align-items: center; gap: 6px;
}
.person-dash-section h3 .material-icons-outlined { font-size: 18px; }
.person-dash-list {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 4px 0;
}
.person-dash-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--grey-100);
  cursor: pointer; transition: background .1s; font-size: 13px;
}
.person-dash-item:last-child { border-bottom: none; }
.person-dash-item:hover { background: var(--grey-50, #f9fafb); }
.person-dash-item .material-icons-outlined { font-size: 18px; flex-shrink: 0; }
.person-dash-empty {
  padding: 16px; color: var(--grey-400); font-size: 13px; text-align: center;
}

@media (max-width: 768px) {
  .people-page { padding: 14px 12px calc(var(--bottom-nav-height) + 14px); }
  .people-grid { grid-template-columns: 1fr; }
  .person-dash-header { flex-direction: column; text-align: center; padding: 20px; }
}
@keyframes wizardSlideIn {
  from { opacity: 0; transform: translateY(24px) scale(.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>
<script src="js/lab.js"></script>

<div class="people-page">
  <div class="people-header" id="pageHeader">
    <h1>People</h1>
    <p>Monroe Lab members</p>
  </div>

  <!-- Join the Lab button -->
  <div id="joinBtnWrap" style="margin-bottom:20px;">
    <button id="joinLabBtn" onclick="openOnboardingWizard()" style="display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(21,101,192,.3);transition:transform .15s,box-shadow .15s;">
      <span class="material-icons-outlined" style="font-size:20px">person_add</span>
      Join the Lab
    </button>
  </div>

  <div id="loadingState" style="text-align:center;padding:40px;color:var(--grey-400);">
    <div class="spinner"></div><p>Loading...</p>
  </div>

  <div class="people-grid" id="peopleGrid"></div>

  <!-- Person dashboard (shown when ?person=<slug> is in the URL) -->
  <div id="personDashboard" style="display:none"></div>

  <!-- Onboarding wizard overlay -->
  <div id="wizardOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9000;overflow-y:auto;-webkit-overflow-scrolling:touch;">
    <div id="wizardModal" style="max-width:600px;margin:40px auto;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;animation:wizardSlideIn .3s ease-out;">
      <!-- Wizard content injected by JS -->
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var BASE = (window.Lab && window.Lab.BASE) || '/lab-handbook/';
  var REPO = 'monroe-lab/lab-handbook';

  function esc(s) { return Lab.escHtml ? Lab.escHtml(s) : s; }

  function getInitials(name) {
    return (name || '').split(/\s+/).map(function(w) { return w[0] || ''; }).join('').toUpperCase().slice(0, 2);
  }

  function getPageForType(typeName) {
    if (!typeName) return 'wiki.html';
    var t = Lab.types.get(typeName);
    if (!t) return 'wiki.html';
    if (t.group === 'resources' || t.group === 'stocks') return 'inventory.html';
    if (t.group === 'protocols') return 'protocols.html';
    if (t.group === 'projects') return 'projects.html';
    return 'wiki.html';
  }

  async function loadPeople() {
    var objects;
    try {
      objects = await Lab.gh.fetchObjectIndex();
    } catch(e) {
      try {
        var r = await fetch(BASE + 'object-index.json');
        objects = await r.json();
      } catch(e2) {
        document.getElementById('loadingState').innerHTML = '<p>Could not load people. Sign in with GitHub to see content.</p>';
        return;
      }
    }

    // Build object lookup for pill styling (mirrors wikilinks.js slug logic:
    // for folder-style pages like projects/foo/index.md, use "foo" not "index")
    var objectLookup = {};
    objects.forEach(function(obj) {
      var parts = obj.path.replace(/\.md$/, '').split('/');
      var last = parts[parts.length - 1];
      var slug = (last === 'index' && parts.length > 1) ? parts[parts.length - 2] : last;
      if (!objectLookup[slug]) objectLookup[slug] = obj;
    });

    var people = objects.filter(function(obj) { return obj.type === 'person'; });
    document.getElementById('loadingState').style.display = 'none';

    if (!people.length) {
      document.getElementById('peopleGrid').innerHTML =
        '<div style="text-align:center;padding:40px;color:var(--grey-400);grid-column:1/-1;">' +
        '<span class="material-icons-outlined" style="font-size:48px;">person_off</span>' +
        '<p>No people added yet.</p></div>';
      return;
    }

    // Load full markdown for each person to extract wikilinks and contact details
    var cards = await Promise.all(people.map(async function(person) {
      var slug = person.path.replace(/\.md$/, '').split('/').pop();
      var body = '';
      try {
        var headers = { 'Accept': 'application/vnd.github.v3+json' };
        var token = Lab.gh.getToken();
        if (token) headers['Authorization'] = 'token ' + token;
        var resp = await fetch('https://api.github.com/repos/' + REPO + '/contents/docs/people/' + slug + '.md', {
          headers: headers
        });
        var data = await resp.json();
        if (data.content) body = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      } catch(e) { /* use metadata only */ }

      // Extract wikilinks from body
      var wikilinks = [];
      var re = /\[\[([^\]]+)\]\]/g, m;
      while ((m = re.exec(body)) !== null) {
        var link = m[1];
        var label = link.indexOf('|') >= 0 ? link.split('|')[1] : link.split('/').pop();
        wikilinks.push({ slug: link.split('|')[0].split('/').pop(), label: label });
      }

      // Extract contact fields from body
      var phone = '';
      var location = '';
      var phoneMatch = body.match(/Phone:\s*(.+)/);
      if (phoneMatch) phone = phoneMatch[1].trim();
      var locMatch = body.match(/Location:\s*(.+)/);
      if (locMatch) location = locMatch[1].trim();

      return {
        title: person.title || slug,
        role: person.role || '',
        email: person.email || '',
        phone: phone,
        location: location,
        slug: slug,
        path: person.path,
        wikilinks: wikilinks,
      };
    }));

    // Render cards
    var grid = document.getElementById('peopleGrid');
    grid.innerHTML = cards.map(function(p) {
      var fieldsHtml = '';
      if (p.email) {
        fieldsHtml += '<div class="person-field"><span class="material-icons-outlined">email</span><a href="mailto:' + esc(p.email) + '" onclick="event.stopPropagation()">' + esc(p.email) + '</a></div>';
      }
      if (p.phone) {
        fieldsHtml += '<div class="person-field"><span class="material-icons-outlined">phone</span>' + esc(p.phone) + '</div>';
      }
      if (p.location) {
        fieldsHtml += '<div class="person-field"><span class="material-icons-outlined">location_on</span>' + esc(p.location) + '</div>';
      }

      var linksHtml = '';
      if (p.wikilinks.length) {
        var pills = p.wikilinks.map(function(wl) {
          var obj = objectLookup[wl.slug];
          var typeName = obj ? obj.type : null;
          var style = Lab.types.pillStyle(typeName || 'unknown');
          var content = Lab.types.pillContent(typeName || 'unknown', wl.label);
          return '<a href="' + esc(getPageForType(typeName)) + '?doc=' + esc(wl.slug) + '" style="' + style + '" onclick="event.stopPropagation()">' + content + '</a>';
        }).join('');
        linksHtml = '<div class="person-links"><div class="person-links-label">Connected</div><div class="person-pill-list">' + pills + '</div></div>';
      }

      return '<div class="person-card" onclick="openPerson(\'' + esc(p.slug) + '\')">' +
        '<div class="person-card-header">' +
          '<div class="person-avatar">' + getInitials(p.title) + '</div>' +
          '<div><div class="person-name">' + esc(p.title) + '</div>' +
          (p.role ? '<div class="person-role">' + esc(p.role) + '</div>' : '') +
          '</div></div>' +
        '<div class="person-card-body">' + fieldsHtml + '</div>' +
        linksHtml +
        '</div>';
    }).join('');
  }

  // R17 #51: clicking a person navigates to their full dashboard view
  // instead of opening the editor-modal popup.
  window.openPerson = function(slug) {
    history.pushState(null, '', location.pathname + '?person=' + encodeURIComponent(slug));
    route();
  };

  // ── Person dashboard (#51) ──
  // Full view of everything connected to one person: notebooks, protocols,
  // calendar events, inventory items, projects. Data comes from the
  // object-index (folder matching + created_by) and link-index (backlinks
  // from any object that wikilinks to [[people/<slug>]]).
  //
  // #101: Person frontmatter may include a `favorites:` list (list-of-mappings
  // YAML, since shared.js parseFrontmatter only supports scalars and that
  // shape) describing protocols/materials the person uses often. Rendered as
  // pinned pills at the top of the dashboard. Pin/unpin buttons appear on
  // each protocol/inventory row.
  async function renderPersonDashboard(slug) {
    document.getElementById('peopleGrid').style.display = 'none';
    var dash = document.getElementById('personDashboard');
    dash.style.display = '';
    dash.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>';

    var idx, linkIdx, personMeta;
    try {
      idx = await Lab.gh.fetchObjectIndex();
      linkIdx = await Lab.gh.fetchLinkIndex();
    } catch(e) {
      dash.innerHTML = '<p>Could not load data.</p>';
      return;
    }

    // Find the person entry
    personMeta = idx.find(function(e) { return e.path === 'people/' + slug + '.md'; });
    if (!personMeta) {
      dash.innerHTML = '<p>Person not found: ' + esc(slug) + '</p>';
      return;
    }

    var title = personMeta.title || slug;
    var role = personMeta.role || '';

    // #101: Pull the full markdown so we can read the `favorites:` frontmatter.
    // The object-index doesn't carry this field. Cache the sha so togglePin
    // doesn't have to re-fetch just to find it.
    var personPath = 'docs/people/' + slug + '.md';
    var personFile = null;
    var favorites = [];
    try {
      personFile = await Lab.gh.fetchFile(personPath);
      var parsed = (Lab.parseFrontmatter && personFile) ? Lab.parseFrontmatter(personFile.content) : { meta: {} };
      var rawFavs = parsed.meta && parsed.meta.favorites;
      if (Array.isArray(rawFavs)) {
        favorites = rawFavs.filter(function(f) { return f && f.slug; });
      }
    } catch(e) { /* offline / signed out: just hide pin UI */ }
    var pinnedSet = {};
    favorites.forEach(function(f) { pinnedSet[f.slug] = true; });
    // Stash for togglePinFavorite() to read without another fetch
    window._personFavoritesState = {
      slug: slug,
      personPath: personPath,
      sha: personFile ? personFile.sha : null,
      content: personFile ? personFile.content : null,
      favorites: favorites,
      canEdit: !!(personFile && Lab.gh.isLoggedIn && Lab.gh.isLoggedIn()),
    };

    // ── Gather connected items ──

    // 1. Notebooks: files in notebooks/<slug>/
    var notebooks = idx.filter(function(e) {
      return e.path.startsWith('notebooks/' + slug + '/');
    }).sort(function(a, b) { return (b.path || '').localeCompare(a.path || ''); });

    // 2. Backlinks: anything that wikilinks TO people/<slug>
    var personTarget = 'people/' + slug;
    var backlinkSources = {};
    (linkIdx || []).forEach(function(edge) {
      if (edge.target === personTarget) {
        backlinkSources[edge.source] = true;
      }
    });
    var backlinkedItems = idx.filter(function(e) {
      var s = e.path.replace(/\.md$/, '');
      return backlinkSources[s];
    });

    // 3. Calendar events where member mentions this person
    var events = idx.filter(function(e) {
      if (e.type !== 'event') return false;
      var m = e.member || '';
      return m.includes(slug) || m.toLowerCase().includes(title.toLowerCase());
    }).sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });

    // 4. Items with created_by matching this slug (approximate — person slug may differ from login)
    var createdItems = idx.filter(function(e) {
      return e.created_by && (e.created_by === slug || e.created_by === slug.replace(/-/g, ''));
    });

    // Categorize backlinks by type
    var protocols = backlinkedItems.filter(function(e) { return e.type === 'protocol' || e.type === 'guide'; });
    var projects = backlinkedItems.filter(function(e) { return e.type === 'project'; });
    var inventoryBacklinks = backlinkedItems.filter(function(e) {
      return ['reagent','buffer','chemical','enzyme','solution','bottle','seed','glycerol_stock','plasmid'].indexOf(e.type) >= 0;
    });
    var locationBacklinks = backlinkedItems.filter(function(e) {
      return ['room','freezer','fridge','shelf','box','tube','container'].indexOf(e.type) >= 0;
    });
    var sampleBacklinks = backlinkedItems.filter(function(e) { return e.type === 'sample'; });

    // Merge created_by items that aren't already in backlinks
    var backlinkedPaths = {};
    backlinkedItems.forEach(function(e) { backlinkedPaths[e.path] = true; });
    createdItems.forEach(function(e) {
      if (!backlinkedPaths[e.path]) {
        var t = e.type || '';
        if (['reagent','buffer','chemical','bottle','seed'].indexOf(t) >= 0) inventoryBacklinks.push(e);
        else if (['room','freezer','fridge','shelf','box','tube','container'].indexOf(t) >= 0) locationBacklinks.push(e);
        else if (t === 'sample') sampleBacklinks.push(e);
      }
    });

    // ── Render ──
    var header = document.getElementById('pageHeader');
    header.innerHTML =
      '<a class="person-dash-back" href="people.html">' +
        '<span class="material-icons-outlined" style="font-size:16px">arrow_back</span> All People</a>' +
      '<h1>' + esc(title) + '</h1>' +
      (role ? '<p>' + esc(role) + '</p>' : '');

    function renderSection(icon, label, items, renderItem) {
      if (!items.length) return '';
      var html = '<div class="person-dash-section">' +
        '<h3><span class="material-icons-outlined">' + icon + '</span> ' + esc(label) +
        ' <span style="font-weight:400;color:var(--grey-400)">(' + items.length + ')</span></h3>' +
        '<div class="person-dash-list">';
      items.forEach(function(item) { html += renderItem(item); });
      html += '</div></div>';
      return html;
    }

    // Compute the slug an item is referenced by in `favorites:` (folder-style
    // index.md → parent dir, otherwise the basename minus .md).
    function itemSlug(item) {
      var parts = item.path.replace(/\.md$/, '').split('/');
      var last = parts[parts.length - 1];
      return (last === 'index' && parts.length > 1) ? parts[parts.length - 2] : last;
    }

    function itemRow(item, icon, color, onClick, opts) {
      opts = opts || {};
      var typeConf = Lab.types.get(item.type);
      var itemIconRaw = (typeConf && typeConf.icon) || icon || '📄';
      var itemIcon = Lab.types.renderIcon(itemIconRaw);
      var itemColor = (typeConf && typeConf.color) || color || '#6b7280';
      var subtitle = [];
      if (item.type) subtitle.push(item.type);
      if (item.date) subtitle.push(item.date);
      if (item.start_time && item.end_time) subtitle.push(item.start_time + '–' + item.end_time);
      if (item.member) subtitle.push(item.member.replace(/\[\[|\]\]/g, ''));

      // #101: Pin button for protocol/inventory rows. Only render when we have
      // an editable person file (signed in + file fetched). event.stopPropagation
      // keeps the row's navigation onClick from firing when the star is clicked.
      var pinHtml = '';
      if (opts.pinnable && window._personFavoritesState && window._personFavoritesState.canEdit) {
        var thisSlug = itemSlug(item);
        var pinned = !!pinnedSet[thisSlug];
        var pinTitle = pinned ? 'Unpin from frequently used' : 'Pin to frequently used';
        var pinIcon = pinned ? 'star' : 'star_outline';
        var pinColor = pinned ? '#f9a825' : '#bdbdbd';
        pinHtml = '<button onclick="event.stopPropagation();togglePinFavorite(\'' +
          esc(thisSlug) + '\', \'' + esc(item.type || '') + '\')" ' +
          'title="' + pinTitle + '" ' +
          'style="background:none;border:none;cursor:pointer;padding:4px;color:' + pinColor + ';line-height:0;">' +
          '<span class="material-icons-outlined" style="font-size:18px;">' + pinIcon + '</span>' +
        '</button>';
      }

      return '<div class="person-dash-item" onclick="' + (onClick || '') + '">' +
        '<span style="font-size:16px;color:' + itemColor + '">' + itemIcon + '</span>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-weight:500">' + esc(item.title || item.path.split('/').pop().replace('.md', '')) + '</div>' +
          (subtitle.length ? '<div style="font-size:11px;color:var(--grey-400)">' + esc(subtitle.join(' · ')) + '</div>' : '') +
        '</div>' +
        pinHtml +
        '<span class="material-icons-outlined" style="font-size:14px;color:var(--grey-300)">chevron_right</span>' +
      '</div>';
    }

    function navTo(item) {
      var t = Lab.types.get(item.type);
      var group = t ? t.group : '';
      var docPath = item.path.replace(/\.md$/, '');
      if (item.type === 'protocol' || item.type === 'guide') return "location.href='protocols.html?doc=" + encodeURIComponent(docPath) + "'";
      if (item.path.startsWith('notebooks/')) return "location.href='notebooks.html?doc=" + encodeURIComponent(docPath) + "'";
      // Resources, stocks, locations, projects, events — open as popup card
      return "Lab.editorModal.open('docs/" + item.path + "')";
    }

    var dashHtml = '';

    // Person header card
    dashHtml += '<div class="person-dash-header">' +
      '<div class="person-avatar">' + getInitials(title) + '</div>' +
      '<div>' +
        '<div style="font-size:22px;font-weight:700">' + esc(title) + '</div>' +
        (role ? '<div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">' + esc(role) + '</div>' : '') +
      '</div>' +
      '<a href="wiki.html?doc=people%2F' + encodeURIComponent(slug) + '" style="margin-left:auto;padding:6px 14px;border-radius:6px;background:rgba(255,255,255,.15);color:#fff;text-decoration:none;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.25)">' +
        '<span class="material-icons-outlined" style="font-size:14px;vertical-align:middle">description</span> View card</a>' +
    '</div>';

    // Summary stats bar
    var statCounts = [
      { icon: 'edit_note', n: notebooks.length, l: 'Notebooks' },
      { icon: 'science', n: protocols.length, l: 'Protocols' },
      { icon: 'event', n: events.length, l: 'Events' },
      { icon: 'inventory_2', n: inventoryBacklinks.length, l: 'Inventory' },
      { icon: 'location_on', n: locationBacklinks.length, l: 'Locations' },
      { icon: 'folder_special', n: projects.length, l: 'Projects' },
    ];
    dashHtml += '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px">';
    statCounts.forEach(function(s) {
      dashHtml += '<div style="background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;display:flex;align-items:center;gap:10px;flex:1;min-width:120px">' +
        '<span class="material-icons-outlined" style="font-size:22px;color:var(--teal)">' + s.icon + '</span>' +
        '<div><div style="font-size:20px;font-weight:700">' + s.n + '</div>' +
        '<div style="font-size:11px;color:var(--grey-500)">' + s.l + '</div></div></div>';
    });
    dashHtml += '</div>';

    // #101: Frequently used (favorites). Pinned protocols/inventory items
    // surfaced as pills so the person can jump to the things they use most
    // without scrolling through the full backlinks list.
    if (favorites.length) {
      var favPills = favorites.map(function(f) {
        var obj = idx.find(function(e) { return itemSlug(e) === f.slug; });
        var typeName = (obj && obj.type) || f.type || 'unknown';

  // ── #101: Pin / unpin a protocol or inventory item to a person's favorites ──
  // Stored in the person card's frontmatter as a list-of-mappings:
  //   favorites:
  //     - slug: dneasy-plant
  //       type: protocol
  //     - slug: nanodrop-spectrophotometer
  //       type: equipment
  // The list-of-mappings shape is the only nested structure shared.js
  // parseFrontmatter / buildFrontmatter currently support, so we use it.
  // Toggling re-fetches a fresh sha right before saving (the cached one in
  // _personFavoritesState may be stale if Pages just rebuilt) and re-renders
  // the dashboard on success.
  window.togglePinFavorite = async function(slug, type) {
    var state = window._personFavoritesState;
    if (!state || !state.canEdit) return;
    var gh = Lab.gh;
    if (!gh || !gh.isLoggedIn()) { Lab.showToast && Lab.showToast('Sign in to pin items', 'error'); return; }

    try {
      // Always fetch fresh — sha may be stale.
      var fresh = await gh.fetchFile(state.personPath);
      var parsed = Lab.parseFrontmatter(fresh.content);
      var meta = parsed.meta || {};
      var favs = Array.isArray(meta.favorites) ? meta.favorites.slice() : [];

      var existing = favs.findIndex(function(f) { return f && f.slug === slug; });
      if (existing >= 0) {
        favs.splice(existing, 1);
      } else {
        var entry = { slug: slug };
        if (type) entry.type = type;
        favs.push(entry);
      }
      meta.favorites = favs;

      var newContent = Lab.buildFrontmatter(meta, parsed.body);
      await gh.saveFile(state.personPath, newContent, fresh.sha,
        (existing >= 0 ? 'Unpin' : 'Pin') + ' ' + slug + ' for ' + state.slug);

      Lab.showToast && Lab.showToast(existing >= 0 ? 'Unpinned' : 'Pinned to favorites', 'success');
      // Re-render the dashboard so the Frequently used section + star icons update.
      renderPersonDashboard(state.slug);
    } catch(e) {
      console.error('togglePinFavorite failed', e);
      Lab.showToast && Lab.showToast('Could not save: ' + e.message, 'error');
    }
  };

  async function loadWizardData() {
    try {
      var idx = await Lab.gh.fetchObjectIndex();
      wizardProtocols = idx.filter(function(o) { return o.type === 'protocol'; });
      // Only show top-level projects: index.md inside a project folder, or
      // single-file projects directly under projects/ (not sub-documents like
      // bill-of-materials.md inside a project folder).
      wizardProjects = idx.filter(function(o) {
        if (o.type !== 'project') return false;
        var parts = o.path.replace(/\.md$/, '').split('/');
        // projects/<slug>/index.md → top-level (folder project)
        if (parts.length === 3 && parts[2] === 'index') return true;
        // projects/<slug>.md → top-level (single-file project)
        if (parts.length === 2) return true;
        return false;
      });
    } catch(e) {
      wizardProtocols = [];
      wizardProjects = [];
    }
  }

  function groupProtocolsByCategory(protocols) {
    var groups = {};
    protocols.forEach(function(p) {
      var parts = p.path.replace(/\.md$/, '').split('/');
      parts.pop();
      var dir = parts.join('/');
      if (!groups[dir]) groups[dir] = [];
      groups[dir].push(p);
    });

    var ordered = [];
    var used = {};
    PROTOCOL_CATEGORIES.order.forEach(function(dir) {
      if (groups[dir]) {
        ordered.push({ dir: dir, label: PROTOCOL_CATEGORIES.labels[dir] || dir, items: groups[dir] });
        used[dir] = true;
      }
    });
    Object.keys(groups).sort().forEach(function(dir) {
      if (!used[dir]) {
        var last = dir.split('/').pop();
        var label = last.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
        ordered.push({ dir: dir, label: label, items: groups[dir] });
      }
    });
    return ordered;
  }

        '</div>' +
        '<div id="wizChecklist" style="display:none;padding:0 28px 28px;">' +
          '<div style="font-size:13px;font-weight:700;color:#333;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;">Next Steps</div>' +
          '<div id="wizChecklistItems"></div>' +
          '<div style="display:flex;justify-content:center;margin-top:20px;">' +
            '<button id="wizGoProfile" style="padding:12px 32px;background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(21,101,192,.25);">' +
              '<span class="material-icons-outlined" style="font-size:20px;">person</span> Go to My Profile' +
            '</button>' +
          '</div>' +
        '</div>';
    }

    modal.innerHTML = html;

    // Auto-trigger creation on step 4
    if (wizardState.step === 4) {
      createPersonFiles();
    }

    // Focus name input on step 1
    if (wizardState.step === 1) {
      var nameInput = document.getElementById('wizName');
      if (nameInput) setTimeout(function() { nameInput.focus(); }, 100);
    }
  }

  window.toggleWizCategory = function(el) {
    var icon = el.querySelector('.material-icons-outlined');
    var items = el.nextElementSibling;
    if (items.style.display === 'none') {
      items.style.display = '';
      icon.style.transform = '';
    } else {
      items.style.display = 'none';
      icon.style.transform = 'rotate(-90deg)';
    }
  };

  window.updateWizProtoCount = function() {
    var boxes = document.querySelectorAll('[data-wiz-proto]');
    var count = 0;
    boxes.forEach(function(b) { if (b.checked) count++; });
    var el = document.getElementById('wizProtoCount');
    if (el) el.textContent = count + ' selected';
  };

  window.updateWizProjCount = function() {
    var boxes = document.querySelectorAll('[data-wiz-proj]');
    var count = 0;
    boxes.forEach(function(b) { if (b.checked) count++; });
    var el = document.getElementById('wizProjCount');
    if (el) el.textContent = count + ' selected';
  };

  function collectSelections() {
    if (wizardState.step === 2) {
      wizardState.protocols = [];
      document.querySelectorAll('[data-wiz-proto]:checked').forEach(function(b) {
        wizardState.protocols.push(b.value);
      });
    } else if (wizardState.step === 3) {
      wizardState.projects = [];
      document.querySelectorAll('[data-wiz-proj]:checked').forEach(function(b) {
        wizardState.projects.push(b.value);
      });
    }
  }

  window.wizardNext = function() {
    if (wizardState.step === 1) {
      var nameEl = document.getElementById('wizName');
      var roleEl = document.getElementById('wizRole');
      var emailEl = document.getElementById('wizEmail');
      wizardState.name = (nameEl.value || '').trim();
      wizardState.role = roleEl.value;
      wizardState.email = (emailEl.value || '').trim();

      if (!wizardState.name) {
        nameEl.style.borderColor = '#e53935';
        nameEl.focus();
        return;
      }
    }
    collectSelections();
    wizardState.step++;
    renderWizardStep();
  };

  window.wizardBack = function() {
    collectSelections();
    wizardState.step--;
    renderWizardStep();
  };

  window.wizardSkip = function() {
    // Don't collect selections when skipping (clear them)
    if (wizardState.step === 2) wizardState.protocols = [];
    if (wizardState.step === 3) wizardState.projects = [];
    wizardState.step++;
    renderWizardStep();
  };

  // Upsert helper: PUT fails with 422 "sha wasn't supplied" when the path
  // already exists and no sha is passed. When that happens, fetch the existing
  // file's sha and retry the save. Also: if the file already exists with the
  // exact same content (common for empty .gitkeep placeholders), skip.
  async function upsertFile(path, content, message, opts) {
    opts = opts || {};
    try {
      return await Lab.gh.saveFile(path, content, null, message);
    } catch(e) {
      var msg = (e && e.message) || '';
      // GitHub returns: "Invalid request.\n\n\"sha\" wasn't supplied." when
      // the path exists and no sha is included.
      var shaRequired = /sha.{0,3}(wasn't|was not|isn't|is not)\s*supplied/i.test(msg) ||
                        /sha.*required/i.test(msg) ||
                        /already exists/i.test(msg);
      if (!shaRequired) throw e;

      // Fetch existing sha and decide whether to skip or retry.
      var existing;
      try {
        existing = await Lab.gh.fetchFile(path);
      } catch(fetchErr) {
        // If the file really isn't there, surface the original error.
        throw e;
      }
      if (opts.skipIfExists) return { sha: existing.sha, skipped: true };
      if (existing.content === content) return { sha: existing.sha, skipped: true };
      return await Lab.gh.saveFile(path, content, existing.sha, message);
    }
  }

  async function createPersonFiles() {
    var statusEl = document.getElementById('wizCreateStatus');
    var checklistEl = document.getElementById('wizChecklist');
    var gh = Lab.gh;
    var slug = Lab.slugify(wizardState.name);
    var today = new Date().toISOString().slice(0, 10);
    var personPath = 'docs/people/' + slug + '.md';

    try {
      // 1. Create person markdown
      statusEl.textContent = 'Creating your profile...';
      var meta = { type: 'person', title: wizardState.name };
      if (wizardState.role) meta.role = wizardState.role;
      if (wizardState.email) meta.email = wizardState.email;

      var bodyLines = ['# ' + wizardState.name, ''];
      if (wizardState.protocols.length) {
        bodyLines.push('## Protocols');
        wizardState.protocols.forEach(function(p) {
          bodyLines.push('- [[' + p + ']]');
        });
        bodyLines.push('');
      }
      if (wizardState.projects.length) {
        bodyLines.push('## Projects');
        wizardState.projects.forEach(function(p) {
          bodyLines.push('- [[' + p + ']]');
        });
        bodyLines.push('');
      }

      var personBody = bodyLines.join('\n');
      var personContent = Lab.buildFrontmatter(meta, personBody);
      await upsertFile(personPath, personContent, 'New lab member: ' + wizardState.name);

      // 2. Create notebook folder with .gitkeep (skip if it already exists —
      //    an empty placeholder is an empty placeholder).
      statusEl.textContent = 'Setting up your notebook...';
      await upsertFile('docs/notebooks/' + slug + '/.gitkeep', '', 'Create notebook folder for ' + wizardState.name, { skipIfExists: true });

      // 3. Create first notebook entry (don't clobber an existing entry for
      //    today — skip if present).
      var entryContent = '# ' + today + ' — ' + wizardState.name + '\n\n' +
        '**Person:** ' + wizardState.name + '\n\n' +
        '**Date:** ' + today + '\n\n' +
        '## Plan for today\n\n' +
        '## What I did\n\n' +
        '## Results & observations\n\n' +
        '## Next steps\n\n';
      await upsertFile('docs/notebooks/' + slug + '/' + today + '.md', entryContent, 'First notebook entry for ' + wizardState.name, { skipIfExists: true });

      // 4. Live-patch the object-index and link-index so the new person
      //    appears immediately on the People grid without waiting for the
      //    GitHub Actions rebuild (~40s). Without this, loadPeople() re-fetches
      //    the deployed object-index.json that doesn't include the new entry.
      if (gh.patchObjectIndex) {
        gh.patchObjectIndex(personPath, meta);
      }
      if (gh.patchLinkIndex) {
        gh.patchLinkIndex(personPath, personBody);
      }

      // Show success checklist
      statusEl.innerHTML = '<span style="color:#43a047;font-weight:600;">Done! All files created.</span>';
      checklistEl.style.display = '';

      var itemsHtml = '';
      var checkItems = [
        { icon: 'event', text: 'Add your schedule to the lab calendar', href: 'calendar.html' },
        { icon: 'edit_note', text: 'Write your first lab notebook entry', href: 'notebooks.html?person=' + slug },
        { icon: 'bug_report', text: 'Try the issue reporter (blue button, bottom right)', href: null },
      ];
      checkItems.forEach(function(item) {
        itemsHtml += '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8fafb;border-radius:8px;margin-bottom:8px;">' +
          '<span class="material-icons-outlined" style="font-size:20px;color:#1565c0;">' + item.icon + '</span>' +
          '<span style="font-size:13px;color:#333;flex:1;">' + esc(item.text) + '</span>' +
          (item.href ? '<a href="' + item.href + '" style="font-size:12px;color:#1565c0;text-decoration:none;font-weight:600;white-space:nowrap;">Go &rarr;</a>' : '<span style="font-size:11px;color:#999;">Look for the <span style="display:inline-block;width:14px;height:14px;background:#1565c0;border-radius:50%;vertical-align:middle;"></span> button</span>') +
        '</div>';
      });
      document.getElementById('wizChecklistItems').innerHTML = itemsHtml;

      // Re-render the People grid right now so the new card is visible behind
      // the wizard and on close — the object-index has already been patched
      // above, so we do NOT want to clearObjectIndexCache here (that would
      // drop the in-memory patch overlay and leave the new entry out).
      try { await loadPeople(); } catch(e) {}

      document.getElementById('wizGoProfile').onclick = function() {
        closeWizard();
        openPerson(slug);
      };

    } catch(e) {
      statusEl.innerHTML = '<span style="color:#e53935;">Error: ' + esc(e.message) + '</span>';
      console.error('Onboarding wizard error:', e);
    }
  }

  loadPeople().then(function() { route(); });
})();
</script>
</body>
</html>
