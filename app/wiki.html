<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki - Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.doc-layout { display: flex; height: calc(100vh - var(--nav-height)); }

/* Sidebar */
.doc-sidebar {
  width: 320px; min-width: 320px; background: #fff;
  border-right: 1px solid var(--grey-200); display: flex; flex-direction: column; overflow: hidden;
}
.doc-sidebar-header { padding: 16px; border-bottom: 1px solid var(--grey-200); }
.doc-search-wrap { position: relative; }
.doc-search-wrap input {
  width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--grey-300);
  border-radius: var(--radius); font-family: inherit; font-size: 14px; outline: none; box-sizing: border-box;
}
.doc-search-wrap input:focus { border-color: #3f51b5; }
.doc-search-wrap .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 20px; color: var(--grey-500); pointer-events: none;
}
.doc-meta-row { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--grey-500); }
.doc-meta-row .count { font-weight: 600; }
.doc-meta-row .clear-link { background: none; border: none; color: #3f51b5; cursor: pointer; font-size: 11px; padding: 0; font-family: inherit; }
.doc-meta-row .clear-link:hover { text-decoration: underline; }

.doc-type-filter { padding: 10px 12px 4px; border-bottom: 1px solid var(--grey-200); display: flex; flex-wrap: wrap; gap: 4px; max-height: 110px; overflow-y: auto; }
.doc-type-chip {
  display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px;
  border-radius: 12px; font-size: 11px; font-weight: 500; cursor: pointer; user-select: none;
  background: var(--grey-100); color: var(--grey-700); border: 1px solid var(--grey-200);
}
.doc-type-chip:hover { background: var(--grey-200); }
.doc-type-chip.active { background: #3f51b5; color: #fff; border-color: #3f51b5; }
.doc-type-chip .chip-count { opacity: .7; font-size: 10px; }

.doc-tree { flex: 1; overflow-y: auto; padding: 6px 0; }
.doc-tree::-webkit-scrollbar { width: 5px; }
.doc-tree::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 3px; }

.doc-folder {
  padding: 7px 16px; font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--grey-600); cursor: pointer;
  display: flex; align-items: center; gap: 4px; user-select: none;
  background: var(--grey-50); border-bottom: 1px solid var(--grey-200);
}
.doc-folder:hover { color: #3f51b5; background: #e8eaf6; }
.doc-folder .material-icons-outlined { font-size: 18px; transition: transform .15s; color: var(--grey-400); }
.doc-folder.collapsed .material-icons-outlined:first-child { transform: rotate(-90deg); }
.doc-folder-count {
  margin-left: auto; font-size: 10px; font-weight: 500; color: var(--grey-400);
  background: var(--grey-200); padding: 1px 6px; border-radius: 8px;
}
.doc-folder-actions { display: none; gap: 2px; margin-left: 6px; }
.doc-folder:hover .doc-folder-actions { display: flex; }
.doc-folder:hover .doc-folder-count { display: none; }
.doc-folder-actions button {
  background: none; border: none; cursor: pointer; padding: 3px; color: var(--grey-500);
  border-radius: 4px; display: flex; align-items: center;
}
.doc-folder-actions button:hover { color: #3f51b5; background: #e8eaf6; }
.doc-folder-actions .material-icons-outlined { font-size: 16px; }

.doc-items { padding-left: 0; }
.doc-items.hidden { display: none; }
.doc-item {
  display: flex; align-items: center; gap: 6px; padding: 6px 14px 6px 22px; font-size: 13px; color: var(--grey-700);
  cursor: pointer; transition: background .1s;
  white-space: nowrap; overflow: hidden;
}
.doc-item:hover { background: var(--grey-100); color: var(--grey-900); }
.doc-item.active { background: #e8eaf6; color: #3f51b5; font-weight: 500; border-left: 3px solid #3f51b5; padding-left: 19px; }
.doc-item-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.doc-item-pill { font-size: 10px; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; font-weight: 600; }
.doc-item-path { font-size: 10px; color: var(--grey-400); margin-left: 4px; }

/* Main */
.doc-main { flex: 1; overflow-y: auto; background: var(--grey-100); }
.doc-content { max-width: 900px; margin: 0 auto; padding: 32px 40px; }

/* Rendered markdown: uses .lab-rendered.theme-indigo from base.css */

.doc-edit-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; margin-bottom: 16px; border-bottom: 1px solid var(--grey-200);
  position: sticky; top: 0; background: var(--grey-100); z-index: 10;
}
.doc-edit-bar .breadcrumb { font-size: 13px; color: var(--grey-500); overflow: hidden; text-overflow: ellipsis; }
.doc-editor-surface { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; min-height: 500px; }

.doc-hamburger {
  display: none; position: fixed; bottom: calc(var(--bottom-nav-height) + 16px); left: 16px;
  width: 48px; height: 48px; border-radius: 50%; background: #3f51b5; color: #fff; border: none;
  box-shadow: var(--shadow-lg); cursor: pointer; z-index: 100; align-items: center; justify-content: center;
}
.doc-hamburger .material-icons-outlined { font-size: 24px; }
.doc-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; }
@media (max-width: 768px) {
  .doc-sidebar { position: fixed; left: -340px; top: var(--nav-height); bottom: var(--bottom-nav-height); z-index: 300; transition: left .25s; box-shadow: 4px 0 16px rgba(0,0,0,.1); }
  .doc-sidebar.open { left: 0; }
  .doc-backdrop.open { display: block; }
  .doc-hamburger { display: flex; }
  .doc-content { padding: 12px 8px; }
  .doc-layout { height: calc(100vh - var(--nav-height) - var(--bottom-nav-height)); }
  .doc-edit-bar .breadcrumb { font-size: 11px; }
  .btn-label { display: none; }
  body.editing-mode #lab-nav { display: none; }
  body.editing-mode #lab-bottom-nav { display: none; }
  body.editing-mode .doc-sidebar { display: none; }
  body.editing-mode .doc-hamburger { display: none; }
  body.editing-mode .doc-layout { height: 100vh; }
  body.editing-mode .doc-edit-bar { display: none; }
}

/* ── New-doc modal ── */
.wiki-modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 600;
  display: none; align-items: center; justify-content: center;
}
.wiki-modal-backdrop.open { display: flex; }
.wiki-modal {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg);
  width: 92%; max-width: 460px; padding: 22px 26px;
}
.wiki-modal h3 { font-size: 16px; font-weight: 600; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
.wiki-modal h3 .material-icons-outlined { font-size: 20px; color: #3f51b5; }
.wiki-modal label { display: block; font-size: 11px; font-weight: 600; color: var(--grey-600); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .3px; }
.wiki-modal input, .wiki-modal select {
  width: 100%; padding: 9px 12px; border: 1px solid var(--grey-300);
  border-radius: var(--radius); font-family: inherit; font-size: 14px; outline: none; box-sizing: border-box;
}
.wiki-modal input:focus, .wiki-modal select:focus { border-color: #3f51b5; }
.wiki-modal .field { margin-bottom: 14px; }
.wiki-modal .hint { font-size: 11px; color: var(--grey-500); margin-top: 4px; }
.wiki-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

/* ── Network graph ── */
.wiki-graph-welcome { position: relative; height: calc(100vh - var(--nav-height)); background: #0f1424; overflow: hidden; }
.wiki-graph-welcome canvas { display: block; width: 100%; height: 100%; cursor: grab; }
.wiki-graph-welcome canvas.grabbing { cursor: grabbing; }
.wiki-graph-overlay {
  position: absolute; top: 20px; left: 24px; color: #fff;
  font-family: Inter, -apple-system, sans-serif; pointer-events: none; max-width: 60%;
}
.wiki-graph-overlay h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; display: flex; align-items: center; gap: 10px; }
.wiki-graph-overlay h1 .material-icons-outlined { font-size: 26px; color: #7986cb; }
.wiki-graph-overlay p { margin: 0; font-size: 13px; color: rgba(255,255,255,.6); line-height: 1.5; }
.wiki-graph-stats { position: absolute; top: 20px; right: 24px; color: rgba(255,255,255,.5); font-size: 12px; font-family: Inter, sans-serif; pointer-events: none; }
.wiki-graph-tooltip {
  position: absolute; background: rgba(0,0,0,.85); color: #fff; padding: 6px 12px;
  border-radius: 6px; font-size: 12px; font-family: Inter, sans-serif; pointer-events: none;
  white-space: nowrap; transform: translate(-50%, -130%); display: none; z-index: 10;
  border: 1px solid rgba(255,255,255,.15);
}
.wiki-graph-tooltip.show { display: block; }
.wiki-graph-tooltip .tt-type { color: #9fa8da; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
.wiki-graph-legend {
  position: absolute; bottom: 16px; left: 16px; background: rgba(0,0,0,.6);
  border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 10px 14px;
  display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; color: #ccc;
  font-family: Inter, sans-serif; max-width: calc(100% - 32px);
}
.wiki-graph-legend .li { display: flex; align-items: center; gap: 5px; }
.wiki-graph-legend .dot { width: 9px; height: 9px; border-radius: 50%; }

/* Mini graph for selected doc */
.wiki-mini-graph {
  position: fixed; bottom: 18px; right: 18px; width: 280px; height: 220px;
  background: #0f1424; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.25);
  border: 1px solid rgba(63,81,181,.4); overflow: hidden; z-index: 50;
}
.wiki-mini-graph canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
.wiki-mini-graph .mini-header {
  position: absolute; top: 0; left: 0; right: 0; padding: 6px 10px;
  background: linear-gradient(rgba(0,0,0,.6), transparent);
  color: #fff; font-size: 11px; font-family: Inter, sans-serif; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px; pointer-events: none;
  display: flex; align-items: center; justify-content: space-between;
}
.wiki-mini-graph .mini-header .material-icons-outlined { font-size: 14px; color: #7986cb; }
.wiki-mini-graph .mini-empty {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.4); font-size: 11px; font-family: Inter, sans-serif; padding: 20px; text-align: center;
}
.wiki-mini-graph .mini-close {
  position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
  background: rgba(255,255,255,.1); border: none; border-radius: 50%;
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  /* R7 #24: explicit z-index + pointer-events so the X wins over the
     canvas/header stacking on mobile browsers that were swallowing the tap. */
  z-index: 3; pointer-events: auto;
}
.wiki-mini-graph .mini-close .material-icons-outlined { font-size: 14px; }
@media (max-width: 768px) {
  .wiki-mini-graph { width: 180px; height: 140px; bottom: calc(var(--bottom-nav-height) + 12px); right: 8px; }
  /* R7 #24: finger-friendly hit target on mobile — 22px was too small. */
  .wiki-mini-graph .mini-close { width: 32px; height: 32px; top: 6px; right: 6px; }
  .wiki-mini-graph .mini-close .material-icons-outlined { font-size: 18px; }
}

@media print {
  #lab-nav, #lab-bottom-nav, .doc-sidebar, .doc-backdrop, .doc-hamburger,
  .doc-edit-bar, #password-gate { display: none !important; }
  .doc-layout { display: block !important; }
  .doc-main { overflow: visible !important; }
  .doc-content { max-width: 100% !important; padding: 0 !important; }
}
</style>
</head>
<body>

<div class="doc-layout">
  <div class="doc-sidebar" id="sidebar">
    <div class="doc-sidebar-header">
      <div style="display:flex;gap:6px;align-items:center">
        <div class="doc-search-wrap" style="flex:1">
          <span class="material-icons-outlined search-icon">search</span>
          <input type="text" id="docSearch" placeholder="Search all documents…">
        </div>
        <button id="newDocBtn" style="display:none;padding:8px 10px;background:#3f51b5;color:#fff;border:none;border-radius:var(--radius);cursor:pointer" title="New document" onclick="createNewDoc()">
          <span class="material-icons-outlined" style="font-size:18px;display:block">add</span>
        </button>
      </div>
      <div class="doc-meta-row">
        <span class="count" id="docCount">…</span>
        <button class="clear-link" id="clearFiltersBtn" style="display:none" onclick="clearFilters()">Clear filters</button>
      </div>
    </div>
    <div class="wiki-modal-backdrop" id="wikiModalBackdrop">
      <div class="wiki-modal" id="wikiModal"></div>
    </div>
    <div class="doc-type-filter" id="typeFilter"></div>
    <div class="doc-tree" id="docTree">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>
  <div class="doc-backdrop" id="backdrop"></div>

  <div class="doc-main" id="docMain">
    <div id="docContentWrap">
      <div class="loading-state" style="padding-top:80px"><div class="spinner"></div><p>Loading documents…</p></div>
    </div>
  </div>
</div>

<button class="doc-hamburger" id="hamburger"><span class="material-icons-outlined">menu</span></button>

<script src="js/lab.js"></script>
<script>
// ── State ──
var ALL_DOCS = [];        // [{path, dir, slug, title, type}]
var INDEX_MAP = {};       // path (relative to docs/) → index entry
var DOC_BY_PATH = {};     // path (no .md) → doc record
var EDGES = [];           // [{source, target}] (paths without .md)
var ADJ = {};             // path → [paths] (undirected adjacency)
var TREE = null;          // grouped by top-level dir
var activeTypes = new Set(); // empty = all
var currentDoc = null;    // path relative to docs/, no .md
var currentSha = null;
var currentFrontmatter = '';  // raw frontmatter block (with delimiters and trailing newline) — preserved across edit/save so Toast UI doesn't corrupt it
var isEditing = false;
var editorInstance = null;
var loggedIn = false;

function unsavedGuard(e) { e.preventDefault(); e.returnValue = ''; }

// Splits a markdown file into [frontmatter, body]. Frontmatter delimiters can
// be --- or *** (Toast UI sometimes round-trips one to the other). The
// frontmatter string includes the delimiters and trailing newline so it can
// be re-prepended verbatim on save.
function splitFrontmatter(md) {
  var m = md.match(/^(---|\*\*\*)\r?\n(?:\r?\n)?((?:[a-zA-Z_][\w-]*:[^\n]*\r?\n)+)(---|\*\*\*)\r?\n?/);
  if (!m) return { fm: '', body: md };
  return { fm: '---\n' + m[2].replace(/\r/g, '') + '---\n', body: md.slice(m[0].length) };
}

var GENERIC_PILL = { color: '#607d8b', label: 'Document' };

function prettify(slug) {
  if (!slug) return '';
  return slug.replace(/[-_]/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function deriveTitleFromPath(p) {
  var parts = p.split('/');
  return prettify(parts[parts.length - 1].replace(/\.md$/, ''));
}

function topDir(relPath) {
  var i = relPath.indexOf('/');
  return i < 0 ? '(root)' : relPath.slice(0, i);
}

// ── Load everything ──
async function loadAll() {
  // Tree of every .md under docs/
  var files;
  try {
    files = await Lab.gh.fetchTree('docs');
  } catch(e) {
    document.getElementById('docTree').innerHTML = '<div style="padding:20px;color:var(--grey-500);font-size:14px;text-align:center">Failed to load file tree.<br>' + Lab.escHtml(e.message) + '</div>';
    return;
  }
  files = files.filter(function(f) {
    if (!f.endsWith('.md')) return false;
    if (f === 'docs/object-index.json') return false;
    var name = f.split('/').pop();
    if (name.toLowerCase() === 'readme.md') return false;
    return true;
  });

  // Object index for metadata
  try {
    var index = await Lab.gh.fetchObjectIndex();
    if (index && index.length) {
      index.forEach(function(e) { if (e && e.path) INDEX_MAP[e.path] = e; });
    }
  } catch(e) { /* fall through — typeless display still works */ }

  ALL_DOCS = files.map(function(f) {
    var rel = f.replace(/^docs\//, '');
    var slug = rel.replace(/\.md$/, '');
    var meta = INDEX_MAP[rel] || {};
    // Skip folder placeholder index files
    if (meta.type === 'index') return null;
    return {
      path: slug,                              // e.g. "protocols/pcr"
      relPath: rel,                            // e.g. "protocols/pcr.md"
      dir: topDir(rel),
      title: meta.title || deriveTitleFromPath(rel),
      type: meta.type || null,
      meta: meta,
    };
  }).filter(Boolean);

  // Sort by title within
  ALL_DOCS.sort(function(a, b) { return a.title.localeCompare(b.title); });
  DOC_BY_PATH = {};
  ALL_DOCS.forEach(function(d) { DOC_BY_PATH[d.path] = d; });

  // Load wikilink edges from link-index.json
  EDGES = [];
  ADJ = {};
  try {
    var base = Lab.BASE || '/lab-handbook/';
    var resp = await fetch(base + 'link-index.json?_=' + Date.now());
    if (resp.ok) {
      var raw = await resp.json();
      raw.forEach(function(e) {
        if (DOC_BY_PATH[e.source] && DOC_BY_PATH[e.target] && e.source !== e.target) {
          EDGES.push({ source: e.source, target: e.target });
          (ADJ[e.source] = ADJ[e.source] || []).push(e.target);
          (ADJ[e.target] = ADJ[e.target] || []).push(e.source);
        }
      });
    }
  } catch(e) { /* graph just shows nodes */ }

  buildTypeFilter();
  buildTree();
  renderSidebar();
  document.getElementById('docCount').textContent = ALL_DOCS.length + ' documents · ' + EDGES.length + ' links';
}

// ── Type filter chips ──
function buildTypeFilter() {
  var counts = {};
  ALL_DOCS.forEach(function(d) {
    var k = d.type || '_untyped';
    counts[k] = (counts[k] || 0) + 1;
  });
  var keys = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
  var html = '';
  keys.forEach(function(k) {
    var label, color;
    if (k === '_untyped') {
      label = 'Untyped';
      color = '#9e9e9e';
    } else {
      var t = Lab.types && Lab.types.get ? Lab.types.get(k) : null;
      label = (t && t.label) || prettify(k);
      color = (t && t.color) || '#607d8b';
    }
    html += '<span class="doc-type-chip" data-type="' + Lab.escHtml(k) + '" data-color="' + color + '" onclick="toggleType(\'' + Lab.escHtml(k) + '\')">' +
      Lab.escHtml(label) + ' <span class="chip-count">' + counts[k] + '</span></span>';
  });
  document.getElementById('typeFilter').innerHTML = html;
}

function toggleType(key) {
  if (activeTypes.has(key)) activeTypes.delete(key);
  else activeTypes.add(key);
  document.getElementById('typeFilter').querySelectorAll('.doc-type-chip').forEach(function(el) {
    var k = el.getAttribute('data-type');
    if (activeTypes.has(k)) {
      el.classList.add('active');
      el.style.background = el.getAttribute('data-color');
      el.style.borderColor = el.getAttribute('data-color');
      el.style.color = '#fff';
    } else {
      el.classList.remove('active');
      el.style.background = '';
      el.style.borderColor = '';
      el.style.color = '';
    }
  });
  document.getElementById('clearFiltersBtn').style.display = (activeTypes.size || document.getElementById('docSearch').value) ? '' : 'none';
  renderSidebar();
}

function clearFilters() {
  activeTypes.clear();
  document.getElementById('docSearch').value = '';
  document.getElementById('typeFilter').querySelectorAll('.doc-type-chip').forEach(function(el) {
    el.classList.remove('active');
    el.style.background = ''; el.style.borderColor = ''; el.style.color = '';
  });
  document.getElementById('clearFiltersBtn').style.display = 'none';
  renderSidebar();
}

// ── Tree (grouped by top-level dir) ──
// Recursive node: { dir, label, children: {name: node}, items: [doc] }
function newTreeNode(dir, label) {
  return { dir: dir, label: label, children: {}, items: [] };
}

function buildTree() {
  TREE = newTreeNode('', 'root');
  ALL_DOCS.forEach(function(d) {
    var parts = d.relPath.split('/');
    parts.pop(); // drop filename
    var node = TREE;
    var acc = '';
    for (var i = 0; i < parts.length; i++) {
      acc = acc ? acc + '/' + parts[i] : parts[i];
      if (!node.children[parts[i]]) {
        node.children[parts[i]] = newTreeNode(acc, prettify(parts[i]));
      }
      node = node.children[parts[i]];
    }
    node.items.push(d);
  });
  // Sort items at every level
  (function sortItems(node) {
    node.items.sort(function(a, b) { return a.title.localeCompare(b.title); });
    Object.keys(node.children).forEach(function(k) { sortItems(node.children[k]); });
  })(TREE);
}

function countNodeDeep(node) {
  var c = node.items.length;
  Object.keys(node.children).forEach(function(k) { c += countNodeDeep(node.children[k]); });
  return c;
}

function nodeContainsDoc(node, docPath) {
  if (node.items.some(function(i) { return i.path === docPath; })) return true;
  return Object.keys(node.children).some(function(k) { return nodeContainsDoc(node.children[k], docPath); });
}

// Returns a filtered shallow copy of `node` (or null if nothing matches)
function filterNode(node, q, types) {
  var matchedItems = node.items.filter(function(d) {
    if (types && types.size) {
      var k = d.type || '_untyped';
      if (!types.has(k)) return false;
    }
    if (q) {
      var hay = (d.title + ' ' + d.relPath + ' ' + (d.type || '')).toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });
  var matchedChildren = {};
  var anyChild = false;
  Object.keys(node.children).forEach(function(k) {
    var fc = filterNode(node.children[k], q, types);
    if (fc) { matchedChildren[k] = fc; anyChild = true; }
  });
  if (!matchedItems.length && !anyChild) return null;
  return { dir: node.dir, label: node.label, items: matchedItems, children: matchedChildren };
}

function renderNode(node, depth) {
  var html = '';
  // Subfolders first
  Object.keys(node.children).sort().forEach(function(k) {
    var ch = node.children[k];
    var count = countNodeDeep(ch);
    var containsActive = currentDoc && nodeContainsDoc(ch, currentDoc);
    // Auto-expand top level (depth 0) when there's an active filter; otherwise collapse unless contains active
    var collapsed = containsActive ? '' : ' collapsed';
    var hidden = collapsed ? ' hidden' : '';
    var pad = 12 + depth * 12;
    var actionsHtml = loggedIn ?
      '<div class="doc-folder-actions">' +
        '<button onclick="event.stopPropagation();createInFolder(\'' + Lab.escHtml(ch.dir) + '\')" title="New document in this folder"><span class="material-icons-outlined">note_add</span></button>' +
        '<button onclick="event.stopPropagation();createSubfolder(\'' + Lab.escHtml(ch.dir) + '\')" title="New subfolder"><span class="material-icons-outlined">create_new_folder</span></button>' +
      '</div>' : '';
    html += '<div class="doc-folder' + collapsed + '" style="padding-left:' + pad + 'px" onclick="toggleFolder(this)">' +
      '<span class="material-icons-outlined">expand_more</span>' +
      '<span>' + Lab.escHtml(ch.label) + '</span>' +
      '<span class="doc-folder-count">' + count + '</span>' +
      actionsHtml +
      '</div><div class="doc-items' + hidden + '">';
    html += renderNode(ch, depth + 1);
    html += '</div>';
  });
  // Then files in this node
  node.items.forEach(function(d) {
    var active = currentDoc === d.path ? ' active' : '';
    var pillHtml = '';
    if (d.type) {
      var t = Lab.types && Lab.types.get ? Lab.types.get(d.type) : null;
      var color = (t && t.color) || GENERIC_PILL.color;
      pillHtml = '<span class="doc-item-pill" style="background:' + color + '20;color:' + color + ';border:1px solid ' + color + '50">' +
        Lab.escHtml((t && t.label) || d.type) + '</span>';
    }
    var itemPad = 22 + depth * 12;
    html += '<div class="doc-item' + active + '" style="padding-left:' + itemPad + 'px" data-path="' + Lab.escHtml(d.path) + '" onclick="loadDoc(\'' + Lab.escHtml(d.path) + '\')" title="' + Lab.escHtml(d.relPath) + '">' +
      '<span class="doc-item-title">' + Lab.escHtml(d.title) + '</span>' +
      pillHtml +
      '</div>';
  });
  return html;
}

function renderSidebar() {
  var treeEl = document.getElementById('docTree');
  var q = (document.getElementById('docSearch').value || '').toLowerCase().trim();
  var view = (q || activeTypes.size) ? filterNode(TREE, q, activeTypes) : TREE;

  if (!view || (!Object.keys(view.children).length && !view.items.length)) {
    treeEl.innerHTML = '<div style="padding:20px;color:var(--grey-500);font-size:14px;text-align:center">No documents match.</div>';
    return;
  }
  treeEl.innerHTML = renderNode(view, 0);
}

function toggleFolder(el) {
  el.classList.toggle('collapsed');
  var items = el.nextElementSibling;
  if (items) items.classList.toggle('hidden');
}

// ── Load doc ──
async function loadDoc(docPath) {
  currentDoc = docPath;
  isEditing = false;
  window.removeEventListener('beforeunload', unsavedGuard);
  document.body.classList.remove('editing-mode');
  editorInstance = null;
  if (welcomeGraph) { welcomeGraph.stop(); welcomeGraph = null; }
  history.pushState(null, '', location.pathname + '?doc=' + encodeURIComponent(docPath));

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');

  // Update active highlight without rebuild
  document.querySelectorAll('.doc-item').forEach(function(el) {
    if (el.getAttribute('data-path') === docPath) el.classList.add('active');
    else el.classList.remove('active');
  });

  var contentEl = document.getElementById('docContentWrap');
  contentEl.innerHTML = '<div class="loading-state" style="padding-top:80px"><div class="spinner"></div></div>';

  try {
    var filePath = 'docs/' + docPath + '.md';
    var result = await Lab.gh.fetchFile(filePath);
    currentSha = result.sha;
    var html = await Lab.editorModal.renderMarkdown(result.content);

    // Parse frontmatter for the metadata bar
    var parsed = Lab.parseFrontmatter(result.content);
    var meta = parsed.meta || INDEX_MAP[docPath + '.md'] || {};
    var typeBadge = '';
    if (meta.type) {
      var t = Lab.types && Lab.types.get ? Lab.types.get(meta.type) : null;
      var color = (t && t.color) || GENERIC_PILL.color;
      typeBadge = '<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;background:' + color + '20;color:' + color + ';border:1px solid ' + color + '50;margin-right:8px">' + Lab.escHtml((t && t.label) || meta.type) + '</span>';
    }

    contentEl.innerHTML =
      '<div class="doc-content">' +
        '<div class="doc-edit-bar">' +
          '<div class="breadcrumb">' + typeBadge + Lab.escHtml(docPath) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="window.print()"><span class="material-icons-outlined">print</span><span class="btn-label"> Print</span></button>' +
            (loggedIn ?
              '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span><span class="btn-label"> Edit</span></button>' : '') +
          '</div>' +
        '</div>' +
        (Lab.renderFrontmatterBar ? Lab.renderFrontmatterBar(meta) : '') +
        '<div class="lab-rendered theme-indigo" id="renderedDoc">' + html + '</div>' +
      '</div>';

    var renderedEl = document.getElementById('renderedDoc');
    if (Lab.wikilinks) await Lab.wikilinks.processRendered(renderedEl);
    if (Lab.postProcessImages) Lab.postProcessImages(renderedEl);
    document.getElementById('docMain').scrollTop = 0;
    showMiniGraph(docPath);
  } catch(e) {
    contentEl.innerHTML = '<div class="doc-content"><div class="empty-state"><span class="material-icons-outlined">error</span><p>Failed to load: ' + Lab.escHtml(e.message) + '</p></div></div>';
  }
}

// ── Edit ──
async function startEdit() {
  if (!currentDoc || isEditing) return;
  isEditing = true;
  window.addEventListener('beforeunload', unsavedGuard);
  document.body.classList.add('editing-mode');
  closeMiniGraph();

  var contentEl = document.getElementById('docContentWrap');
  var filePath = 'docs/' + currentDoc + '.md';

  try {
    var result = await Lab.gh.fetchFile(filePath);
    currentSha = result.sha;

    // Strip frontmatter before handing the markdown to the editor.
    // Toast UI's ProseMirror corrupts --- delimiters (rewrites them as ***
    // on save), which breaks the YAML wrapper. We hold the original
    // frontmatter string aside and re-prepend it verbatim in saveDoc.
    var split = splitFrontmatter(result.content);
    currentFrontmatter = split.fm;

    contentEl.innerHTML =
      '<div class="doc-content">' +
        '<div class="doc-edit-bar">' +
          '<div class="breadcrumb">' + Lab.escHtml(currentDoc) + ' (editing)</div>' +
          '<div style="display:flex;gap:6px">' +
            '<button class="btn btn-outline btn-sm" onclick="cancelEdit()"><span class="material-icons-outlined">close</span><span class="btn-label"> Cancel</span></button>' +
            '<button class="btn btn-primary btn-sm" id="saveBtn" onclick="saveDoc()" style="background:#3f51b5"><span class="material-icons-outlined">save</span><span class="btn-label"> Save</span></button>' +
          '</div>' +
        '</div>' +
        '<div class="doc-editor-surface em-surface" id="editorSurface"></div>' +
      '</div>';

    editorInstance = await Lab.editorModal.initFullpage(
      document.getElementById('editorSurface'),
      split.body,
      filePath,
      currentSha
    );
  } catch(e) {
    Lab.showToast('Failed to load for editing: ' + e.message, 'error');
    isEditing = false;
    window.removeEventListener('beforeunload', unsavedGuard);
    document.body.classList.remove('editing-mode');
  }
}

async function saveDoc() {
  if (!editorInstance) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons-outlined">hourglass_empty</span> Saving…';

  try {
    var body = editorInstance.getMarkdown();
    // Re-prepend the original frontmatter (if any). Defensive: if the body
    // somehow still starts with frontmatter delimiters (e.g. user pasted some
    // in), don't double up.
    if (currentFrontmatter && !/^(---|\*\*\*)\r?\n/.test(body)) {
      body = currentFrontmatter + '\n' + body.replace(/^\n+/, '');
    }
    var md = body;
    var filePath = 'docs/' + currentDoc + '.md';
    var result = await Lab.gh.saveFile(filePath, md, currentSha, 'Update document ' + currentDoc);
    currentSha = result.sha;
    Lab.showToast('Saved', 'success');

    // R7 #22: if the user arrived here via `?from=dashboard` (the bulletin
    // Edit button on dashboard.html), return them to the dashboard after
    // a successful save instead of dumping them on the wiki article.
    var fromParam = new URLSearchParams(location.search).get('from');
    if (fromParam === 'dashboard') {
      window.removeEventListener('beforeunload', unsavedGuard);
      isEditing = false;
      setTimeout(function() { location.href = 'dashboard.html'; }, 250);
      return;
    }

    // Capture editor image data URLs before destroying the editor instance
    var editorImages = {};
    var editorSurface = document.getElementById('editorSurface');
    if (editorSurface) {
      editorSurface.querySelectorAll('img').forEach(function(img) {
        if (img.src && img.complete && img.naturalWidth > 0) {
          var origSrc = img.dataset.realSrc || img.getAttribute('src') || '';
          var fname = origSrc.split('/').pop().split('?')[0];
          if (fname) editorImages[fname] = img.src;
        }
      });
    }

    isEditing = false;
    window.removeEventListener('beforeunload', unsavedGuard);
    document.body.classList.remove('editing-mode');
    editorInstance = null;

    // Render directly from the just-saved markdown (avoids GitHub API cache lag)
    var html = await Lab.editorModal.renderMarkdown(md);
    var meta = INDEX_MAP[currentDoc + '.md'] || {};
    var typeBadge = '';
    if (meta.type) {
      var t = Lab.types && Lab.types.get ? Lab.types.get(meta.type) : null;
      var color = (t && t.color) || GENERIC_PILL.color;
      typeBadge = '<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;background:' + color + '20;color:' + color + ';border:1px solid ' + color + '50;margin-right:8px">' + Lab.escHtml((t && t.label) || meta.type) + '</span>';
    }
    var contentEl = document.getElementById('docContentWrap');
    contentEl.innerHTML =
      '<div class="doc-content">' +
        '<div class="doc-edit-bar">' +
          '<div class="breadcrumb">' + typeBadge + Lab.escHtml(currentDoc) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-outline btn-sm" onclick="window.print()"><span class="material-icons-outlined">print</span><span class="btn-label"> Print</span></button>' +
            '<button class="btn btn-outline btn-sm" onclick="startEdit()"><span class="material-icons-outlined">edit</span><span class="btn-label"> Edit</span></button>' +
          '</div>' +
        '</div>' +
        '<div class="lab-rendered theme-indigo" id="renderedDoc">' + html + '</div>' +
      '</div>';

    var renderedEl = document.getElementById('renderedDoc');

    // Swap image srcs with captured data URLs from editor (for images not yet deployed)
    if (Object.keys(editorImages).length > 0) {
      renderedEl.querySelectorAll('img').forEach(function(img) {
        var src = img.getAttribute('src') || '';
        var fname = src.split('/').pop().split('?')[0];
        if (editorImages[fname]) {
          img.dataset.realSrc = src;
          img.src = editorImages[fname];
        }
      });
    }

    if (Lab.wikilinks) await Lab.wikilinks.processRendered(renderedEl);
    if (Lab.postProcessImages) Lab.postProcessImages(renderedEl);
    document.getElementById('docMain').scrollTop = 0;
    showMiniGraph(currentDoc);
  } catch(e) {
    Lab.showToast('Save failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-icons-outlined">save</span> Save';
  }
}

function cancelEdit() {
  if (currentDoc) loadDoc(currentDoc);
}

// ── Force-directed graph component ──
// opts: { canvas, tooltipEl, docs:[], edges:[], onClick, interactive, focusSlug, showLabels }
function createForceGraph(opts) {
  var canvas = opts.canvas;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W = 0, H = 0;
  var stopped = false;

  // Build node objects
  var nodeMap = {};
  var nodes = opts.docs.map(function(d) {
    var t = d.type && Lab.types && Lab.types.get ? Lab.types.get(d.type) : null;
    var color = (t && t.color) || (d.type ? '#607d8b' : '#9e9e9e');
    var n = {
      slug: d.path, title: d.title, type: d.type, color: color,
      x: Math.random() * 600 + 100, y: Math.random() * 400 + 100,
      vx: 0, vy: 0, links: 0, radius: 4,
    };
    nodeMap[d.path] = n;
    return n;
  });

  var edges = [];
  opts.edges.forEach(function(e) {
    if (nodeMap[e.source] && nodeMap[e.target]) {
      edges.push({ source: nodeMap[e.source], target: nodeMap[e.target] });
      nodeMap[e.source].links++;
      nodeMap[e.target].links++;
    }
  });

  // Drop orphans for a denser graph (only when not focused)
  if (!opts.focusSlug && opts.dropOrphans !== false) {
    nodes = nodes.filter(function(n) { return n.links > 0; });
  }

  nodes.forEach(function(n) {
    n.radius = Math.min(3 + Math.sqrt(n.links) * 1.6, 12);
  });

  // Highlight focus node
  var focusNode = opts.focusSlug ? nodeMap[opts.focusSlug] : null;
  if (focusNode) {
    focusNode.radius = 9;
    focusNode.isFocus = true;
  }

  function resize() {
    var rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  var onResize = function() { resize(); alpha = Math.max(alpha, 0.3); };
  window.addEventListener('resize', onResize);

  // Pan/zoom
  var scale = 1, panX = 0, panY = 0;
  var isPanning = false, lastPanX = 0, lastPanY = 0;
  var dragging = null;
  var hoverNode = null;
  var alpha = 1;
  var decay = 0.992;
  var repulsion = opts.focusSlug ? 400 : 700;
  var attraction = opts.focusSlug ? 0.025 : 0.012;
  var centerGravity = 0.015;

  function screenToWorld(sx, sy) {
    return { x: (sx - panX) / scale, y: (sy - panY) / scale };
  }

  function findNode(sx, sy) {
    var w = screenToWorld(sx, sy);
    for (var i = nodes.length - 1; i >= 0; i--) {
      var n = nodes[i];
      var dx = w.x - n.x, dy = w.y - n.y;
      var hit = n.radius + 5;
      if (dx * dx + dy * dy <= hit * hit) return n;
    }
    return null;
  }

  function tick() {
    if (stopped) return;
    alpha *= decay;
    if (alpha < 0.005 && !dragging) { draw(); return; }

    var cx = W / 2, cy = H / 2;
    nodes.forEach(function(n) {
      n.vx += (cx - n.x) * centerGravity;
      n.vy += (cy - n.y) * centerGravity;
    });

    // Repulsion (O(n^2), capped distance)
    var cap = opts.focusSlug ? 300 : 220;
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var dx = nodes[j].x - nodes[i].x;
        var dy = nodes[j].y - nodes[i].y;
        var d2 = dx * dx + dy * dy;
        if (d2 > cap * cap || d2 < 0.01) continue;
        var dist = Math.sqrt(d2);
        var force = repulsion / d2;
        var fx = dx / dist * force;
        var fy = dy / dist * force;
        nodes[i].vx -= fx; nodes[i].vy -= fy;
        nodes[j].vx += fx; nodes[j].vy += fy;
      }
    }

    // Edge attraction
    edges.forEach(function(e) {
      var dx = e.target.x - e.source.x;
      var dy = e.target.y - e.source.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var force = (dist - 30) * attraction;
      var fx = dx / dist * force, fy = dy / dist * force;
      e.source.vx += fx; e.source.vy += fy;
      e.target.vx -= fx; e.target.vy -= fy;
    });

    nodes.forEach(function(n) {
      if (n === dragging) return;
      n.vx *= 0.6; n.vy *= 0.6;
      n.x += n.vx * alpha;
      n.y += n.vy * alpha;
    });

    draw();
    requestAnimationFrame(tick);
  }

  function draw() {
    ctx.save();
    ctx.clearRect(0, 0, W, H);
    ctx.translate(panX, panY);
    ctx.scale(scale, scale);

    // Edges
    ctx.lineWidth = 0.6 / scale;
    edges.forEach(function(e) {
      var highlight = focusNode && (e.source === focusNode || e.target === focusNode);
      var hov = hoverNode && (e.source === hoverNode || e.target === hoverNode);
      ctx.strokeStyle = highlight ? 'rgba(121,134,203,.7)' : (hov ? 'rgba(255,255,255,.35)' : 'rgba(255,255,255,.09)');
      ctx.beginPath();
      ctx.moveTo(e.source.x, e.source.y);
      ctx.lineTo(e.target.x, e.target.y);
      ctx.stroke();
    });

    // Nodes
    nodes.forEach(function(n) {
      var dim = focusNode && n !== focusNode && (ADJ[focusNode.slug] || []).indexOf(n.slug) < 0;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
      if (n === focusNode) {
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.lineWidth = 3 / scale;
        ctx.strokeStyle = n.color;
        ctx.stroke();
      } else {
        ctx.fillStyle = n.color + (dim ? '40' : 'dd');
        ctx.fill();
        if (n === hoverNode) {
          ctx.lineWidth = 2 / scale;
          ctx.strokeStyle = '#fff';
          ctx.stroke();
        }
      }
    });

    // Labels for important nodes
    if (opts.showLabels) {
      ctx.font = (11 / scale) + 'px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,.7)';
      ctx.textAlign = 'center';
      var threshold = opts.showLabels === 'all' ? 0 : 6;
      nodes.forEach(function(n) {
        if (n === focusNode || n === hoverNode || n.links >= threshold) {
          var lbl = n.title.length > 24 ? n.title.slice(0, 22) + '…' : n.title;
          ctx.fillText(lbl, n.x, n.y - n.radius - 4 / scale);
        }
      });
    } else if (hoverNode) {
      ctx.font = (12 / scale) + 'px Inter, sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(hoverNode.title, hoverNode.x, hoverNode.y - hoverNode.radius - 6 / scale);
    }

    ctx.restore();
  }

  if (opts.interactive) {
    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      var sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      if (isPanning) {
        panX += sx - lastPanX; panY += sy - lastPanY;
        lastPanX = sx; lastPanY = sy;
        draw();
        return;
      }
      if (dragging) {
        var w = screenToWorld(sx, sy);
        dragging.x = w.x; dragging.y = w.y;
        return;
      }
      var n = findNode(sx, sy);
      if (n !== hoverNode) {
        hoverNode = n;
        if (opts.tooltipEl) {
          if (n) {
            opts.tooltipEl.innerHTML = Lab.escHtml(n.title) + (n.type ? '<div class="tt-type">' + Lab.escHtml(n.type) + '</div>' : '');
            opts.tooltipEl.style.left = sx + 'px';
            opts.tooltipEl.style.top = sy + 'px';
            opts.tooltipEl.classList.add('show');
          } else {
            opts.tooltipEl.classList.remove('show');
          }
        }
        canvas.style.cursor = n ? 'pointer' : 'grab';
        draw();
      } else if (opts.tooltipEl && n) {
        opts.tooltipEl.style.left = sx + 'px';
        opts.tooltipEl.style.top = sy + 'px';
      }
    });

    canvas.addEventListener('mousedown', function(e) {
      var rect = canvas.getBoundingClientRect();
      var sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      var n = findNode(sx, sy);
      if (n) { dragging = n; alpha = Math.max(alpha, 0.4); }
      else { isPanning = true; lastPanX = sx; lastPanY = sy; canvas.classList.add('grabbing'); }
    });

    window.addEventListener('mouseup', function() {
      if (dragging) { dragging.vx = 0; dragging.vy = 0; dragging = null; alpha = Math.max(alpha, 0.2); }
      isPanning = false;
      canvas.classList.remove('grabbing');
    });

    canvas.addEventListener('click', function(e) {
      var rect = canvas.getBoundingClientRect();
      var n = findNode(e.clientX - rect.left, e.clientY - rect.top);
      if (n && opts.onClick) opts.onClick(n.slug);
    });

    canvas.addEventListener('wheel', function(e) {
      e.preventDefault();
      var rect = canvas.getBoundingClientRect();
      var sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      var factor = e.deltaY < 0 ? 1.12 : 0.89;
      var newScale = Math.max(0.2, Math.min(4, scale * factor));
      // Zoom around cursor
      panX = sx - (sx - panX) * (newScale / scale);
      panY = sy - (sy - panY) * (newScale / scale);
      scale = newScale;
      draw();
    }, { passive: false });
  }

  tick();
  return {
    stop: function() { stopped = true; window.removeEventListener('resize', onResize); },
    redraw: function() { alpha = Math.max(alpha, 0.4); if (stopped) { stopped = false; tick(); } },
  };
}

// ── Mini graph for selected doc ──
var miniGraph = null;

function showMiniGraph(slug) {
  if (miniGraph) { miniGraph.stop(); miniGraph = null; }
  var existing = document.getElementById('miniGraph');
  if (existing) existing.remove();

  var neighbors = ADJ[slug] || [];
  var container = document.createElement('div');
  container.className = 'wiki-mini-graph';
  container.id = 'miniGraph';

  if (!neighbors.length) {
    container.innerHTML =
      '<div class="mini-header"><span><span class="material-icons-outlined">hub</span> Connections</span></div>' +
      '<button class="mini-close" onclick="closeMiniGraph()"><span class="material-icons-outlined">close</span></button>' +
      '<div class="mini-empty">No wikilinks to or from this document yet.</div>';
    document.body.appendChild(container);
    return;
  }

  container.innerHTML =
    '<canvas id="miniGraphCanvas"></canvas>' +
    '<div class="mini-header"><span><span class="material-icons-outlined">hub</span> ' + neighbors.length + ' connection' + (neighbors.length === 1 ? '' : 's') + '</span></div>' +
    '<button class="mini-close" onclick="closeMiniGraph()"><span class="material-icons-outlined">close</span></button>';
  document.body.appendChild(container);

  // Build subgraph: focus + neighbors
  var includedSlugs = {};
  includedSlugs[slug] = true;
  neighbors.forEach(function(s) { includedSlugs[s] = true; });
  var subDocs = ALL_DOCS.filter(function(d) { return includedSlugs[d.path]; });
  var subEdges = EDGES.filter(function(e) { return includedSlugs[e.source] && includedSlugs[e.target]; });

  miniGraph = createForceGraph({
    canvas: document.getElementById('miniGraphCanvas'),
    docs: subDocs,
    edges: subEdges,
    onClick: function(s) { loadDoc(s); },
    interactive: true,
    focusSlug: slug,
    showLabels: 'all',
    dropOrphans: false,
  });
}

function closeMiniGraph() {
  if (miniGraph) { miniGraph.stop(); miniGraph = null; }
  var el = document.getElementById('miniGraph');
  if (el) el.remove();
}

// ── New document ──
function showWikiModal(opts) {
  return new Promise(function(resolve) {
    var backdrop = document.getElementById('wikiModalBackdrop');
    var modal = document.getElementById('wikiModal');
    var html = '<h3><span class="material-icons-outlined">' + (opts.icon || 'add') + '</span> ' + Lab.escHtml(opts.title) + '</h3>';
    opts.fields.forEach(function(f) {
      html += '<div class="field"><label>' + Lab.escHtml(f.label) + '</label>';
      if (f.type === 'select') {
        html += '<select id="wm_' + f.key + '">';
        f.options.forEach(function(o) {
          var sel = o.value === f.value ? ' selected' : '';
          html += '<option value="' + Lab.escHtml(o.value) + '"' + sel + '>' + Lab.escHtml(o.label) + '</option>';
        });
        html += '</select>';
      } else {
        html += '<input type="text" id="wm_' + f.key + '" value="' + Lab.escHtml(f.value || '') + '" placeholder="' + Lab.escHtml(f.placeholder || '') + '">';
      }
      if (f.hint) html += '<div class="hint">' + Lab.escHtml(f.hint) + '</div>';
      html += '</div>';
    });
    html += '<div class="wiki-modal-actions">' +
      '<button class="btn btn-outline btn-sm" id="wmCancel">Cancel</button>' +
      '<button class="btn btn-primary btn-sm" id="wmOk" style="background:#3f51b5">' + Lab.escHtml(opts.submitLabel || 'Create') + '</button>' +
      '</div>';
    modal.innerHTML = html;
    backdrop.classList.add('open');

    var firstInput = modal.querySelector('input,select');
    if (firstInput) { firstInput.focus(); if (firstInput.select) firstInput.select(); }

    function close(result) {
      backdrop.classList.remove('open');
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onKey(e) {
      if (e.key === 'Escape') close(null);
      if (e.key === 'Enter' && e.target.tagName !== 'SELECT') { e.preventDefault(); submit(); }
    }
    function submit() {
      var values = {};
      opts.fields.forEach(function(f) { values[f.key] = document.getElementById('wm_' + f.key).value; });
      close(values);
    }
    document.addEventListener('keydown', onKey);
    document.getElementById('wmCancel').onclick = function() { close(null); };
    document.getElementById('wmOk').onclick = submit;
    // Only close when both mousedown and mouseup land on the backdrop — prevents
    // accidental closes when dragging a text selection out of the modal.
    var _mdTarget = null;
    backdrop.addEventListener('mousedown', function(e) { _mdTarget = e.target; });
    backdrop.addEventListener('click', function(e) {
      if (e.target === backdrop && _mdTarget === backdrop) close(null);
      _mdTarget = null;
    });
  });
}

function createInFolder(dir) { createNewDoc({ presetFolder: dir }); }
function createSubfolder(parentDir) { createNewDoc({ presetNewFolder: parentDir + '/' }); }

async function createNewDoc(preset) {
  preset = preset || {};
  if (!loggedIn) { Lab.showToast('Sign in first', 'error'); return; }

  // Folder options: every directory we've seen + a "(new folder)" sentinel
  var dirSet = {};
  ALL_DOCS.forEach(function(d) {
    var parts = d.relPath.split('/');
    parts.pop();
    var acc = '';
    parts.forEach(function(p) { acc = acc ? acc + '/' + p : p; dirSet[acc] = true; });
  });
  var dirOpts = Object.keys(dirSet).sort().map(function(d) { return { value: d, label: d }; });
  dirOpts.unshift({ value: 'handbook', label: 'handbook' });
  dirOpts.push({ value: '__new__', label: '── new folder ──' });

  // Default: preset > current doc's folder > handbook
  var defaultDir = 'handbook';
  if (preset.presetFolder) {
    defaultDir = preset.presetFolder;
    if (!dirOpts.some(function(o) { return o.value === defaultDir; })) {
      dirOpts.unshift({ value: defaultDir, label: defaultDir });
    }
  } else if (preset.presetNewFolder) {
    defaultDir = '__new__';
  } else if (currentDoc) {
    var p = currentDoc.split('/'); p.pop();
    if (p.length) defaultDir = p.join('/');
  }
  if (!dirOpts.some(function(o) { return o.value === defaultDir; })) defaultDir = 'handbook';

  // Type options from Lab.types
  var typeOpts = [{ value: '', label: '(none — plain document)' }];
  if (Lab.types && Lab.types.TYPES) {
    Object.keys(Lab.types.TYPES).sort().forEach(function(k) {
      var t = Lab.types.TYPES[k];
      typeOpts.push({ value: k, label: (t.label || k) });
    });
  }

  var values = await showWikiModal({
    title: 'New Document',
    icon: 'note_add',
    submitLabel: 'Create & edit',
    fields: [
      { key: 'folder', label: 'Folder', type: 'select', value: defaultDir, options: dirOpts },
      { key: 'newFolder', label: 'New folder path (if selected above)', type: 'text', value: preset.presetNewFolder || '', placeholder: 'e.g. handbook/policies', hint: 'Only used when "── new folder ──" is selected. Use forward slashes for nesting.' },
      { key: 'title', label: 'Title', type: 'text', value: '', placeholder: 'How to get building keys' },
      { key: 'type', label: 'Type', type: 'select', value: '', options: typeOpts, hint: 'Optional. Adds a colored type badge and includes the doc in type-specific views.' },
    ],
  });
  if (!values || !values.title.trim()) return;

  var folder = values.folder === '__new__' ? values.newFolder.trim().replace(/^\/+|\/+$/g, '') : values.folder;
  if (!folder) { Lab.showToast('Folder required', 'error'); return; }
  var title = values.title.trim();
  var slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  if (!slug) { Lab.showToast('Title produced an empty filename', 'error'); return; }

  var relPath = folder + '/' + slug + '.md';
  var docPath = folder + '/' + slug;
  var filePath = 'docs/' + relPath;

  // Build content with optional frontmatter
  var content;
  if (values.type) {
    content = '---\ntype: ' + values.type + '\ntitle: ' + title.replace(/"/g, '\\"') + '\n---\n\n# ' + title + '\n\n';
  } else {
    content = '# ' + title + '\n\n';
  }

  // Check existing
  try {
    var existing = await Lab.gh.fetchFile(filePath);
    if (existing) {
      var openExisting = await Lab.modal.confirm({ title: 'Document Exists', message: 'A document already exists at ' + relPath + '.\nOpen it instead?', confirmText: 'Open' });
      if (!openExisting) return;
      loadDoc(docPath);
      return;
    }
  } catch(e) { /* doesn't exist, good */ }

  try {
    await Lab.gh.saveFile(filePath, content, null, 'New document: ' + relPath);
  } catch(e) {
    Lab.showToast('Create failed: ' + e.message, 'error');
    return;
  }

  // Inject into local state so it shows up immediately
  var newDoc = {
    path: docPath, relPath: relPath, dir: topDir(relPath),
    title: title, type: values.type || null, meta: {},
  };
  ALL_DOCS.push(newDoc);
  ALL_DOCS.sort(function(a, b) { return a.title.localeCompare(b.title); });
  DOC_BY_PATH[docPath] = newDoc;
  if (values.type) INDEX_MAP[relPath] = { path: relPath, type: values.type, title: title };
  buildTypeFilter();
  buildTree();
  renderSidebar();
  document.getElementById('docCount').textContent = ALL_DOCS.length + ' documents · ' + EDGES.length + ' links';

  Lab.showToast('Document created', 'success');
  loadDoc(docPath);
  setTimeout(startEdit, 200);
}

// ── Init ──
(async function init() {
  loggedIn = Lab.gh.isLoggedIn();
  if (loggedIn) document.getElementById('newDocBtn').style.display = '';
  await loadAll();

  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  if (doc) loadDoc(doc);
  else showWelcome();
})();
</script>
