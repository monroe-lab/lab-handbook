<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monroe Lab</title>
<link rel="stylesheet" href="css/base.css">
<style>
.dash { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Stats row */
.dash-stats {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.dash-stat {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-radius: var(--radius);
  background: #fff;
  box-shadow: var(--shadow);
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  flex: 1;
  min-width: 130px;
  transition: box-shadow .15s;
}
.dash-stat:hover { box-shadow: var(--shadow-md); }
.dash-stat .material-icons-outlined { font-size: 24px; }
.dash-stat-val { font-size: 22px; font-weight: 700; }
.dash-stat-label { font-size: 11px; color: var(--grey-500); text-transform: uppercase; letter-spacing: .5px; }

/* Grid layout */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* Panels */
.dash-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.dash-panel-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--grey-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.dash-panel-header h2 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dash-panel-header h2 .material-icons-outlined { font-size: 20px; color: var(--teal); }
.dash-panel-body { padding: 16px 20px; }

/* Alert items */
.alert-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  font-size: 14px;
  border-bottom: 1px solid var(--grey-100);
  cursor: pointer;
}
.alert-item:last-child { border-bottom: none; }
.alert-item:hover { color: var(--teal); }
.alert-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--amber);
  flex-shrink: 0;
}
.alert-item .qty { margin-left: auto; font-weight: 600; color: var(--amber); font-size: 13px; }

/* Activity items */
.activity-item {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  font-size: 14px;
  border-bottom: 1px solid var(--grey-100);
}
.activity-item:last-child { border-bottom: none; }
.activity-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--grey-200);
  flex-shrink: 0;
}
.activity-msg { flex: 1; color: var(--grey-700); }
.activity-msg strong { color: var(--grey-900); font-weight: 500; }
.activity-time { font-size: 12px; color: var(--grey-400); white-space: nowrap; }

/* Bulletin */
.bulletin-content { font-size: 15px; line-height: 1.7; }
.bulletin-content h1, .bulletin-content h2, .bulletin-content h3 { margin-top: 16px; margin-bottom: 8px; }
.bulletin-content ul, .bulletin-content ol { padding-left: 24px; }
.bulletin-content a { color: var(--teal-dark); }

@media (max-width: 768px) {
  .dash { padding: 16px; }
  .dash-grid { grid-template-columns: 1fr; }
  .dash-stats { flex-direction: column; }
}
</style>
</head>
<body>

<div class="dash">
  <!-- Stats -->
  <div class="dash-stats" id="dashStats">
    <div class="dash-stat"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div></div>
  </div>

  <!-- Grid -->
  <div class="dash-grid">
    <!-- Low stock alerts -->
    <div class="dash-panel">
      <div class="dash-panel-header">
        <h2><span class="material-icons-outlined">warning_amber</span> Need to Order</h2>
      </div>
      <div class="dash-panel-body" id="alertsPanel">
        <div class="loading-state" style="padding:20px"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Recent activity -->
    <div class="dash-panel">
      <div class="dash-panel-header">
        <h2><span class="material-icons-outlined">history</span> Recent Activity</h2>
      </div>
      <div class="dash-panel-body" id="activityPanel">
        <div class="loading-state" style="padding:20px"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Bulletin -->
    <div class="dash-panel">
      <div class="dash-panel-header">
        <h2><span class="material-icons-outlined">campaign</span> Bulletin Board</h2>
        <button class="btn btn-sm btn-outline" id="editBulletinBtn" style="display:none" onclick="editBulletin()">
          <span class="material-icons-outlined">edit</span> Edit
        </button>
      </div>
      <div class="dash-panel-body" id="bulletinPanel">
        <div class="loading-state" style="padding:20px"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- People -->
    <div class="dash-panel">
      <div class="dash-panel-header">
        <h2><span class="material-icons-outlined">person</span> People</h2>
      </div>
      <div class="dash-panel-body" id="peoplePanel">
        <div class="loading-state" style="padding:20px"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Projects -->
    <div class="dash-panel">
      <div class="dash-panel-header">
        <h2><span class="material-icons-outlined">folder_special</span> Projects</h2>
      </div>
      <div class="dash-panel-body" id="projectsPanel">
        <div class="loading-state" style="padding:20px"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</div>

<script src="js/lab.js"></script>
<script>
var BASE = Lab.BASE;

// ── Stats ──
async function loadStats() {
  var index = await Lab.gh.fetchObjectIndex();
  var counts = { protocol: 0, resource: 0, stock: 0, people: 0, project: 0, notebook: 0 };
  var resourceTypes = ['reagent','buffer','consumable','equipment','kit','chemical','enzyme','solution'];
  var stockTypes = ['seed','glycerol_stock','plasmid','agro_strain','dna_prep'];

  index.forEach(function(obj) {
    if (obj.type === 'protocol') counts.protocol++;
    else if (resourceTypes.indexOf(obj.type) !== -1) counts.resource++;
    else if (stockTypes.indexOf(obj.type) !== -1) counts.stock++;
    else if (obj.type === 'person') counts.people++;
    else if (obj.type === 'project') counts.project++;
    else if (obj.type === 'notebook' || obj.type === 'notebook_entry') counts.notebook++;
  });

  var stats = [
    { label: 'Protocols', count: counts.protocol, icon: 'menu_book', color: '#6a1b9a', href: BASE + 'app/protocols.html' },
    { label: 'Resources', count: counts.resource, icon: 'science', color: '#009688', href: BASE + 'app/inventory.html' },
    { label: 'Stocks', count: counts.stock, icon: 'eco', color: '#4caf50', href: BASE + 'app/inventory.html?type=stock' },
    { label: 'People', count: counts.people, icon: 'person', color: '#1565c0', href: '#peoplePanel' },
    { label: 'Projects', count: counts.project, icon: 'folder_special', color: '#e65100', href: '#projectsPanel' },
    { label: 'Notebooks', count: counts.notebook, icon: 'auto_stories', color: '#795548', href: BASE + 'app/notebooks.html' },
  ];

  document.getElementById('dashStats').innerHTML = stats.map(function(s) {
    return '<a href="' + s.href + '" class="dash-stat">' +
      '<span class="material-icons-outlined" style="color:' + s.color + '">' + s.icon + '</span>' +
      '<div><div class="dash-stat-val" style="color:' + s.color + '">' + s.count + '</div>' +
      '<div class="dash-stat-label">' + s.label + '</div></div></a>';
  }).join('');

  return index;
}

// ── Alerts ──
function loadAlerts(index) {
  var el = document.getElementById('alertsPanel');
  var needMore = index.filter(function(obj) {
    return obj.need_more;
  });

  if (!needMore.length) {
    el.innerHTML = '<div style="color:var(--green);display:flex;align-items:center;gap:6px"><span class="material-icons-outlined" style="font-size:18px">check_circle</span> All stock levels OK</div>';
    return;
  }

  el.innerHTML = needMore.slice(0, 10).map(function(obj) {
    var slug = obj.path.replace(/\.md$/, '').split('/').pop();
    return '<div class="alert-item" onclick="Lab.editorModal.open(\'docs/' + obj.path + '\')">' +
      '<span class="alert-dot"></span>' +
      '<span>' + Lab.escHtml(obj.title || slug) + '</span>' +
      '<span class="qty">' + (obj.quantity || 0) + (obj.unit ? ' ' + obj.unit : '') + '</span></div>';
  }).join('') +
  (needMore.length > 10 ? '<div style="text-align:center;padding:8px;font-size:13px;color:var(--grey-500)">+' + (needMore.length - 10) + ' more</div>' : '');
}

// ── Activity ──
async function loadActivity() {
  var el = document.getElementById('activityPanel');
  try {
    var commits = await Lab.gh.fetchRecentCommits('docs', 8);
    if (!commits.length) {
      el.innerHTML = '<div style="color:var(--grey-500);font-size:14px">No recent activity</div>';
      return;
    }
    el.innerHTML = commits.map(function(c) {
      var author = c.author || {};
      var avatar = author.avatar_url || '';
      var login = author.login || (c.commit.author ? c.commit.author.name : 'unknown');
      var msg = c.commit.message.split('\n')[0];
      var time = Lab.timeAgo(c.commit.author.date);
      return '<div class="activity-item">' +
        (avatar ? '<img class="activity-avatar" src="' + avatar + '">' : '<div class="activity-avatar"></div>') +
        '<div class="activity-msg"><strong>' + Lab.escHtml(login) + '</strong> ' + Lab.escHtml(msg) + '</div>' +
        '<span class="activity-time">' + time + '</span></div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div style="color:var(--grey-500);font-size:14px">Could not load activity</div>';
  }
}

// ── Bulletin ──
var bulletinSha = null;
async function loadBulletin() {
  var el = document.getElementById('bulletinPanel');
  try {
    var result = await Lab.gh.fetchFile('docs/bulletin.md');
    bulletinSha = result.sha;
    await Lab.editorModal.loadMarked();
    var body = result.content.replace(/^---\n[\s\S]*?\n---\n?/, '');
    var html = marked.parse(body);
    el.innerHTML = '<div class="bulletin-content">' + html + '</div>';
    if (Lab.gh.isLoggedIn()) document.getElementById('editBulletinBtn').style.display = '';
  } catch(e) {
    el.innerHTML = '<div style="color:var(--grey-500)">No bulletin posted</div>';
  }
}

function editBulletin() {
  Lab.editorModal.open('docs/bulletin.md');
}

// Refresh bulletin when saved
window.addEventListener('lab-file-saved', function(e) {
  if (e.detail && e.detail.path === 'docs/bulletin.md') loadBulletin();
});

// ── People ──
function loadPeople(index) {
  var el = document.getElementById('peoplePanel');
  var people = index.filter(function(obj) { return obj.type === 'person'; });
  if (!people.length) {
    el.innerHTML = '<div style="color:var(--grey-500);font-size:14px">No people in the vault</div>';
    return;
  }
  var types = Lab.types;
  el.innerHTML = people.map(function(obj) {
    var conf = types.get(obj.type);
    return '<div class="alert-item" onclick="Lab.editorModal.open(\'docs/' + obj.path + '\')" style="cursor:pointer">' +
      '<span style="font-size:18px">' + conf.icon + '</span>' +
      '<div style="flex:1"><div style="font-weight:500">' + Lab.escHtml(obj.title || '') + '</div>' +
      (obj.role ? '<div style="font-size:12px;color:var(--grey-500)">' + Lab.escHtml(obj.role) + '</div>' : '') +
      '</div>' +
      (obj.email ? '<span style="font-size:12px;color:var(--grey-400)">' + Lab.escHtml(obj.email) + '</span>' : '') +
      '</div>';
  }).join('');
}

// ── Projects ──
function loadProjects(index) {
  var el = document.getElementById('projectsPanel');
  var projects = index.filter(function(obj) { return obj.type === 'project'; });
  if (!projects.length) {
    el.innerHTML = '<div style="color:var(--grey-500);font-size:14px">No projects in the vault</div>';
    return;
  }
  var types = Lab.types;
  el.innerHTML = projects.map(function(obj) {
    var conf = types.get(obj.type);
    var statusColor = obj.status === 'active' ? 'var(--green)' : obj.status === 'paused' ? 'var(--amber)' : 'var(--grey-500)';
    return '<div class="alert-item" onclick="Lab.editorModal.open(\'docs/' + obj.path + '\')" style="cursor:pointer">' +
      '<span style="font-size:18px">' + conf.icon + '</span>' +
      '<div style="flex:1"><div style="font-weight:500">' + Lab.escHtml(obj.title || '') + '</div>' +
      (obj.pi ? '<div style="font-size:12px;color:var(--grey-500)">PI: ' + Lab.escHtml(obj.pi) + '</div>' : '') +
      '</div>' +
      (obj.status ? '<span style="font-size:12px;font-weight:600;color:' + statusColor + '">' + Lab.escHtml(obj.status) + '</span>' : '') +
      '</div>';
  }).join('');
}

// ── Init ──
async function init() {
  var index = await loadStats();
  loadAlerts(index);
  loadPeople(index);
  loadProjects(index);
  loadActivity();
  loadBulletin();
}
init();
</script>
</body>
</html>
