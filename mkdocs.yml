site_name: Monroe Lab Handbook
site_description: Protocols, guides, inventories, and resources for the Monroe Lab at UC Davis
site_url: https://monroe-lab.github.io/lab-handbook/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  custom_dir: overrides

repo_url: https://app.pagescms.org/monroe-lab/lab-handbook
repo_name: Edit Wiki

plugins:
  - search
  - roamlinks

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true

