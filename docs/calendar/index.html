<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Calendar - Monroe Lab</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #009688;
  --teal-dark: #00796b;
  --teal-light: #e0f2f1;
  --teal-50: #f0fdfb;
  --red: #e53935;
  --red-light: #ffebee;
  --amber: #ff8f00;
  --amber-light: #fff8e1;
  --grey-50: #fafafa;
  --grey-100: #f5f5f5;
  --grey-200: #eeeeee;
  --grey-300: #e0e0e0;
  --grey-500: #9e9e9e;
  --grey-700: #616161;
  --grey-900: #212121;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--grey-100);
  color: var(--grey-900);
  line-height: 1.5;
}

/* Header */
.header {
  background: var(--teal);
  color: #fff;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 .material-icons-outlined { font-size: 28px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-primary { background: #fff; color: var(--teal-dark); }
.btn-primary:hover { background: var(--teal-light); }
.btn-teal { background: var(--teal); color: #fff; }
.btn-teal:hover { background: var(--teal-dark); }
.btn-outline { background: transparent; color: var(--grey-700); border: 1px solid var(--grey-300); }
.btn-outline:hover { background: var(--grey-100); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #c62828; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn .material-icons-outlined { font-size: 18px; }

/* Connection status */
.conn-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: rgba(255,255,255,.8);
}
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #aaa;
}
.conn-dot.connected { background: #69f0ae; }

/* Week nav */
.week-nav {
  background: #fff;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--grey-200);
  box-shadow: var(--shadow);
}
.week-nav .btn-nav {
  background: none;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  cursor: pointer;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  color: var(--grey-700);
  transition: all .15s;
}
.week-nav .btn-nav:hover { background: var(--teal-light); color: var(--teal-dark); }
.week-label {
  font-size: 15px;
  font-weight: 600;
  color: var(--grey-900);
  min-width: 200px;
  text-align: center;
}

/* Filter bar */
.filter-bar {
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.filter-select {
  padding: 9px 12px;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  background: #fff;
  outline: none;
  cursor: pointer;
  min-width: 150px;
}
.filter-select:focus { border-color: var(--teal); }
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--grey-700);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Stats */
.stats {
  display: flex;
  gap: 16px;
  padding: 16px 24px;
  flex-wrap: wrap;
}
.stat-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 160px;
}
.stat-card .material-icons-outlined {
  font-size: 28px;
  color: var(--teal);
}
.stat-card.warning .material-icons-outlined { color: var(--amber); }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--grey-500); text-transform: uppercase; letter-spacing: .5px; }

/* Calendar grid */
.calendar-wrap {
  padding: 0 24px 24px;
}
.calendar-container {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow-x: auto;
}
.calendar-grid {
  display: grid;
  grid-template-columns: 60px repeat(5, 1fr);
  min-width: 700px;
}
.cal-header {
  background: var(--grey-50);
  padding: 12px 8px;
  text-align: center;
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--grey-700);
  border-bottom: 2px solid var(--grey-200);
}
.cal-header.time-col {
  font-size: 11px;
}
.cal-header .day-date {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--grey-500);
  margin-top: 2px;
}
.time-label {
  padding: 0 8px;
  font-size: 11px;
  color: var(--grey-500);
  text-align: right;
  border-right: 1px solid var(--grey-200);
  height: 60px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-top: 2px;
}
.day-column {
  position: relative;
  border-right: 1px solid var(--grey-200);
  height: 60px;
  border-bottom: 1px solid var(--grey-100);
}
.day-column:last-child { border-right: none; }

/* Block cards */
.block-card {
  position: absolute;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  line-height: 1.3;
  overflow: hidden;
  cursor: pointer;
  z-index: 1;
  transition: box-shadow .15s;
  border-left: 3px solid;
}
.block-card:hover {
  box-shadow: var(--shadow-lg);
  z-index: 2;
}
.block-card .block-member {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.block-card .block-time {
  font-size: 10px;
  opacity: .7;
}
.block-card .block-activity {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10px;
  margin-top: 1px;
}
.block-card.unassigned {
  border-style: dashed;
  border-width: 1px;
  border-left-width: 3px;
}
.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-left: 4px;
  vertical-align: middle;
}
.status-dot.scheduled { background: #4caf50; }
.status-dot.in-progress { background: #2196f3; }
.status-dot.completed { background: #9e9e9e; }
.status-dot.cancelled { background: #e53935; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all .2s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  background: #fff;
  border-radius: 12px;
  width: 90%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--grey-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 { font-size: 18px; }
.modal-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--grey-500);
  padding: 4px;
  border-radius: 4px;
}
.modal-close:hover { background: var(--grey-100); }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--grey-200);
  display: flex;
  justify-content: space-between;
  gap: 8px;
}
.modal-footer-right { display: flex; gap: 8px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--grey-700);
  margin-bottom: 5px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--teal);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-check {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.form-check input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--teal);
}
.form-check label {
  font-size: 13px;
  font-weight: 600;
  color: var(--grey-700);
  margin-bottom: 0;
}

/* Toast */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--grey-900);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: slideIn .3s ease;
}
.toast.error { background: var(--red); }
.toast.success { background: var(--teal-dark); }
@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 24px;
  color: var(--grey-500);
}
.spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid var(--grey-200);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px; }
  .week-nav { padding: 12px 16px; }
  .filter-bar { padding: 12px 16px; }
  .stats { padding: 12px 16px; }
  .calendar-wrap { padding: 0 16px 16px; }
}
</style>
</head>
<body>
<script>
// When embedded in an iframe, hide the app header and use parent's auth
if (window.self !== window.top) {
  document.documentElement.style.setProperty('--iframe-mode', '1');
  document.addEventListener('DOMContentLoaded', function() {
    var h = document.querySelector('.header');
    if (h) h.style.display = 'none';
    document.body.style.paddingTop = '0';
    // Use parent's auth token if available
    if (window.parent.ghAuth) window.ghAuth = window.parent.ghAuth;
  });
}
</script>

<!-- Header -->
<div class="header">
  <h1>
    <span class="material-icons-outlined">calendar_month</span>
    Lab Calendar
  </h1>
  <div class="header-actions">
    <div class="conn-status">
      <span class="conn-dot" id="connDot"></span>
      <span id="connLabel">Not connected</span>
    </div>
    <button class="btn btn-primary" id="btnConnect" onclick="window.ghAuth ? (window.ghAuth.isLoggedIn() ? window.ghAuth.logout() : window.ghAuth.login()) : alert('Auth not loaded')">
      <span class="material-icons-outlined">link</span>
      Sign in
    </button>
    <button class="btn btn-primary" onclick="openAddModal()">
      <span class="material-icons-outlined">add</span>
      Add Block
    </button>
  </div>
</div>

<!-- App nav -->
<nav style="background:#00796b;display:flex;align-items:center;gap:0;padding:0 16px;font-family:Inter,-apple-system,sans-serif;font-size:13px;overflow-x:auto">
  <a href="../" style="color:rgba(255,255,255,.7);text-decoration:none;padding:10px 14px;white-space:nowrap">Handbook</a>
  <a href="../inventory-app/" style="color:rgba(255,255,255,.7);text-decoration:none;padding:10px 14px;white-space:nowrap">Inventory</a>
  <a href="../sample-tracker/" style="color:rgba(255,255,255,.7);text-decoration:none;padding:10px 14px;white-space:nowrap">Sample Tracker</a>
  <a href="./" style="color:#fff;text-decoration:none;padding:10px 14px;white-space:nowrap;border-bottom:2px solid #fff;font-weight:600">Calendar</a>
</nav>

<!-- Week navigation -->
<div class="week-nav">
  <button class="btn-nav" onclick="changeWeek(-1)" title="Previous week">
    <svg style="width:20px;height:20px;max-width:20px;max-height:20px;fill:currentColor;display:inline-block" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="btn btn-outline btn-sm" onclick="goToday()">This Week</button>
  <button class="btn-nav" onclick="changeWeek(1)" title="Next week">
    <svg style="width:20px;height:20px;max-width:20px;max-height:20px;fill:currentColor;display:inline-block" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
  <span class="week-label" id="weekLabel"></span>
</div>

<!-- Filter bar + legend -->
<div class="filter-bar">
  <select class="filter-select" id="filterMember" onchange="renderCalendar()">
    <option value="">All Members</option>
  </select>
  <div class="legend" id="legend"></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat-card">
    <span class="material-icons-outlined">schedule</span>
    <div>
      <div class="stat-value" id="statHours">-</div>
      <div class="stat-label">Total Hours</div>
    </div>
  </div>
  <div class="stat-card">
    <span class="material-icons-outlined">group</span>
    <div>
      <div class="stat-value" id="statMembers">-</div>
      <div class="stat-label">Members Scheduled</div>
    </div>
  </div>
  <div class="stat-card">
    <span class="material-icons-outlined">task_alt</span>
    <div>
      <div class="stat-value" id="statAssigned">-</div>
      <div class="stat-label">Assigned Blocks</div>
    </div>
  </div>
  <div class="stat-card warning">
    <span class="material-icons-outlined">help_outline</span>
    <div>
      <div class="stat-value" id="statUnassigned">-</div>
      <div class="stat-label">Unassigned Blocks</div>
    </div>
  </div>
</div>

<!-- Calendar -->
<div class="calendar-wrap">
  <div class="calendar-container">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading schedule...</p>
    </div>
    <div class="calendar-grid" id="calendarGrid" style="display:none"></div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="blockModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Block</h2>
      <button class="modal-close" onclick="closeModal()">
        <span class="material-icons-outlined">close</span>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Member Name *</label>
        <input type="text" id="fMember" placeholder="e.g. Alex Chen">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="fRole">
            <option>Undergraduate</option>
            <option>Graduate Student</option>
            <option>Postdoc</option>
            <option>Staff</option>
            <option>PI</option>
            <option>Volunteer</option>
          </select>
        </div>
        <div class="form-group">
          <label>Mentor</label>
          <input type="text" id="fMentor" placeholder="e.g. Kehan Zhao">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Day *</label>
          <select id="fDay">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Time *</label>
          <select id="fStartTime"></select>
        </div>
        <div class="form-group">
          <label>End Time *</label>
          <select id="fEndTime"></select>
        </div>
      </div>
      <div class="form-group">
        <label>Activity</label>
        <input type="text" id="fActivity" placeholder="e.g. DNA extraction from leaf tissue">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option value="scheduled">Scheduled</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Optional notes..."></textarea>
      </div>
      <div class="form-check">
        <input type="checkbox" id="fRecurring" checked>
        <label for="fRecurring">Recurring (every week)</label>
      </div>
    </div>
    <div class="modal-footer">
      <div>
        <button class="btn btn-danger" id="btnDeleteBlock" onclick="deleteBlock()" style="display:none">
          <span class="material-icons-outlined">delete</span>
          Delete
        </button>
      </div>
      <div class="modal-footer-right">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-teal" id="btnSave" onclick="saveBlock()">Save Block</button>
      </div>
    </div>
  </div>
</div>

<!-- Auth provided by shared github-auth.js -->
<script src="../javascripts/github-auth.js"></script>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// --- Config ---
var REPO_API = 'https://api.github.com/repos/monroe-lab/lab-handbook/contents/docs/calendar/schedule.json';
var BRANCH = 'main';
var DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
var HOUR_START = 8;
var HOUR_END = 18;
var MEMBER_COLORS = [
  { bg: '#e8f5e9', border: '#4caf50', text: '#1b5e20', bgLight: '#f1f8e9', borderLight: '#a5d6a7' },
  { bg: '#e3f2fd', border: '#2196f3', text: '#0d47a1', bgLight: '#e8eaf6', borderLight: '#90caf9' },
  { bg: '#fce4ec', border: '#e91e63', text: '#880e4f', bgLight: '#fce4ec', borderLight: '#f48fb1' },
  { bg: '#fff3e0', border: '#ff9800', text: '#e65100', bgLight: '#fff8e1', borderLight: '#ffcc80' },
  { bg: '#f3e5f5', border: '#9c27b0', text: '#4a148c', bgLight: '#f3e5f5', borderLight: '#ce93d8' },
  { bg: '#e0f2f1', border: '#009688', text: '#004d40', bgLight: '#e0f7fa', borderLight: '#80cbc4' },
  { bg: '#fff9c4', border: '#fbc02d', text: '#f57f17', bgLight: '#fffde7', borderLight: '#fff176' },
  { bg: '#efebe9', border: '#795548', text: '#3e2723', bgLight: '#efebe9', borderLight: '#bcaaa4' },
  { bg: '#e8eaf6', border: '#3f51b5', text: '#1a237e', bgLight: '#e8eaf6', borderLight: '#9fa8da' },
  { bg: '#e0f7fa', border: '#00bcd4', text: '#006064', bgLight: '#e0f7fa', borderLight: '#80deea' }
];

// --- State ---
var schedule = [];
var fileSha = null;
var editingId = null;
var currentMonday = getMonday(new Date());
var memberColorMap = {};

// --- Auth ---
function getToken() { return (window.ghAuth && window.ghAuth.getToken()) || ''; }

function updateConnStatus() {
  var connected = !!getToken();
  var user = window.ghAuth && window.ghAuth.getUser();
  document.getElementById('connDot').className = 'conn-dot' + (connected ? ' connected' : '');
  document.getElementById('connLabel').textContent = connected ? ('Signed in' + (user ? ' as ' + user.login : '')) : 'Not signed in';
  document.getElementById('btnConnect').innerHTML = connected
    ? '<span class="material-icons-outlined">link_off</span> Sign out'
    : '<span class="material-icons-outlined">link</span> Sign in';
  document.getElementById('btnConnect').onclick = connected
    ? function() { window.ghAuth.logout(); }
    : function() { window.ghAuth.login(); };
}
if (window.ghAuth) { window.ghAuth.onLogin = function() { updateConnStatus(); loadSchedule(); }; }

// --- Utility ---
function getMonday(d) {
  var date = new Date(d);
  var day = date.getDay();
  var diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  date.setHours(0, 0, 0, 0);
  return date;
}

function formatDate(d) {
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function formatWeekLabel(monday) {
  var friday = new Date(monday);
  friday.setDate(friday.getDate() + 4);
  var year = monday.getFullYear();
  return formatDate(monday) + ' \u2013 ' + formatDate(friday) + ', ' + year;
}

function isoMonday(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function timeToMinutes(t) {
  var parts = t.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function formatTime12(t) {
  var parts = t.split(':');
  var h = parseInt(parts[0]);
  var m = parts[1];
  var ampm = h >= 12 ? 'pm' : 'am';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return h + ':' + m + ampm;
}

function esc(s) {
  var el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

// --- Week nav ---
function changeWeek(dir) {
  currentMonday.setDate(currentMonday.getDate() + dir * 7);
  renderCalendar();
}

function goToday() {
  currentMonday = getMonday(new Date());
  renderCalendar();
}

function updateWeekLabel() {
  document.getElementById('weekLabel').textContent = formatWeekLabel(currentMonday);
}

// --- Populate time selects ---
function populateTimeSelects() {
  var startSel = document.getElementById('fStartTime');
  var endSel = document.getElementById('fEndTime');
  startSel.innerHTML = '';
  endSel.innerHTML = '';
  for (var h = HOUR_START; h <= HOUR_END; h++) {
    for (var m = 0; m < 60; m += 30) {
      if (h === HOUR_END && m > 0) break;
      var val = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
      var opt1 = document.createElement('option');
      opt1.value = val;
      opt1.textContent = formatTime12(val);
      startSel.appendChild(opt1);
      var opt2 = document.createElement('option');
      opt2.value = val;
      opt2.textContent = formatTime12(val);
      endSel.appendChild(opt2);
    }
  }
  endSel.value = '12:00';
}

// --- Data loading ---
async function loadSchedule() {
  try {
    var headers = {};
    var token = getToken();
    if (token) headers['Authorization'] = 'token ' + token;
    headers['Accept'] = 'application/vnd.github.v3+json';

    var resp = await fetch(REPO_API + '?ref=' + BRANCH, { headers: headers });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    var data = await resp.json();
    fileSha = data.sha;
    var content = atob(data.content.replace(/\n/g, ''));
    schedule = JSON.parse(content);
  } catch (e) {
    console.warn('GitHub API failed, trying direct file load:', e);
    try {
      var resp2 = await fetch('schedule.json?_=' + Date.now());
      if (!resp2.ok) throw new Error('HTTP ' + resp2.status);
      schedule = await resp2.json();
      fileSha = null;
    } catch (e2) {
      toast('Failed to load schedule: ' + e2.message, 'error');
      schedule = [];
    }
  }

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('calendarGrid').style.display = '';
  buildMemberColors();
  populateMemberFilter();
  renderCalendar();
}

// --- GitHub write ---
async function commitSchedule(message) {
  var token = getToken();
  if (!token) {
    toast('Connect to GitHub first to save changes', 'error');
    return false;
  }

  // Re-fetch SHA to avoid conflicts
  try {
    var headers = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' };
    var getResp = await fetch(REPO_API + '?ref=' + BRANCH, { headers: headers });
    if (getResp.ok) {
      var getData = await getResp.json();
      fileSha = getData.sha;
    }
  } catch (e) { /* proceed with existing sha */ }

  var content = JSON.stringify(schedule, null, 2) + '\n';
  var encoded = btoa(unescape(encodeURIComponent(content)));

  var body = {
    message: message,
    content: encoded,
    branch: BRANCH
  };
  if (fileSha) body.sha = fileSha;

  try {
    var resp = await fetch(REPO_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      var err = await resp.json().catch(function() { return {}; });
      throw new Error(err.message || 'HTTP ' + resp.status);
    }

    var result = await resp.json();
    fileSha = result.content.sha;
    return true;
  } catch (e) {
    toast('Save failed: ' + e.message, 'error');
    return false;
  }
}

// --- Member colors ---
function buildMemberColors() {
  var members = [];
  schedule.forEach(function(b) {
    if (members.indexOf(b.member) === -1) members.push(b.member);
  });
  members.sort();
  memberColorMap = {};
  members.forEach(function(m, i) {
    memberColorMap[m] = MEMBER_COLORS[i % MEMBER_COLORS.length];
  });
}

function populateMemberFilter() {
  var sel = document.getElementById('filterMember');
  var current = sel.value;
  sel.innerHTML = '<option value="">All Members</option>';
  var members = Object.keys(memberColorMap).sort();
  members.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });
  sel.value = current;

  // Legend
  var legend = document.getElementById('legend');
  legend.innerHTML = '';
  members.forEach(function(m) {
    var c = memberColorMap[m];
    var item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = '<span class="legend-dot" style="background:' + c.border + '"></span>' + esc(m);
    legend.appendChild(item);
  });
}

// --- Filter blocks for current week ---
function getVisibleBlocks() {
  var mondayStr = isoMonday(currentMonday);
  var memberFilter = document.getElementById('filterMember').value;

  return schedule.filter(function(b) {
    if (memberFilter && b.member !== memberFilter) return false;
    if (b.recurring) return true;
    if (b.weekOf === mondayStr) return true;
    return false;
  });
}

// --- Rendering ---
function renderCalendar() {
  updateWeekLabel();
  var grid = document.getElementById('calendarGrid');
  var blocks = getVisibleBlocks();

  // Stats
  var totalHours = 0;
  var membersSet = {};
  var assigned = 0;
  var unassigned = 0;
  blocks.forEach(function(b) {
    var mins = timeToMinutes(b.endTime) - timeToMinutes(b.startTime);
    totalHours += mins / 60;
    membersSet[b.member] = true;
    if (b.activity && b.activity.trim()) assigned++;
    else unassigned++;
  });
  document.getElementById('statHours').textContent = Math.round(totalHours * 10) / 10;
  document.getElementById('statMembers').textContent = Object.keys(membersSet).length;
  document.getElementById('statAssigned').textContent = assigned;
  document.getElementById('statUnassigned').textContent = unassigned;

  // Build grid HTML
  var html = '';

  // Header row
  html += '<div class="cal-header time-col">Time</div>';
  DAYS.forEach(function(day, di) {
    var date = new Date(currentMonday);
    date.setDate(date.getDate() + di);
    html += '<div class="cal-header">' + day.substring(0, 3) + '<span class="day-date">' + formatDate(date) + '</span></div>';
  });

  // Hour rows
  for (var h = HOUR_START; h < HOUR_END; h++) {
    var timeStr = formatTime12(String(h).padStart(2, '0') + ':00');
    html += '<div class="time-label">' + timeStr + '</div>';
    DAYS.forEach(function(day) {
      html += '<div class="day-column" data-day="' + day + '" data-hour="' + h + '"></div>';
    });
  }

  grid.innerHTML = html;

  // Place blocks into day columns
  DAYS.forEach(function(day) {
    var dayBlocks = blocks.filter(function(b) { return b.day === day; });
    var placed = layoutBlocks(dayBlocks);

    placed.forEach(function(item) {
      var b = item.block;
      var startMin = timeToMinutes(b.startTime);
      var endMin = timeToMinutes(b.endTime);

      // Calculate position relative to the first cell this block starts in
      var startHour = Math.floor(startMin / 60);
      if (startHour < HOUR_START) startHour = HOUR_START;
      var cellTopMin = startHour * 60;
      var topOffset = (startMin - cellTopMin) / 60 * 60;
      var height = (endMin - startMin) / 60 * 60;

      var color = memberColorMap[b.member] || MEMBER_COLORS[0];
      var isUnassigned = !b.activity || !b.activity.trim();

      var widthPct = 100 / item.totalCols;
      var leftPct = widthPct * item.col;

      var cardBg = isUnassigned ? color.bgLight : color.bg;
      var cardBorder = isUnassigned ? color.borderLight : color.border;
      var cardText = color.text;

      var statusClass = (b.status || 'scheduled').replace(' ', '-');

      var card = document.createElement('div');
      card.className = 'block-card' + (isUnassigned ? ' unassigned' : '');
      card.style.cssText = 'top:' + topOffset + 'px;height:' + height + 'px;left:' + leftPct + '%;width:calc(' + widthPct + '% - 4px);background:' + cardBg + ';border-left-color:' + cardBorder + ';color:' + cardText + ';';
      card.onclick = (function(block) { return function() { openEditModal(block.id); }; })(b);

      var innerHtml = '<div class="block-member">' + esc(b.member);
      if (!isUnassigned) {
        innerHtml += '<span class="status-dot ' + statusClass + '"></span>';
      }
      innerHtml += '</div>';
      innerHtml += '<div class="block-time">' + formatTime12(b.startTime) + ' \u2013 ' + formatTime12(b.endTime) + '</div>';
      if (!isUnassigned) {
        innerHtml += '<div class="block-activity">' + esc(b.activity) + '</div>';
      }
      card.innerHTML = innerHtml;

      var cols = grid.querySelectorAll('.day-column[data-day="' + day + '"][data-hour="' + startHour + '"]');
      if (cols.length > 0) {
        cols[0].appendChild(card);
      }
    });
  });
}

// Layout overlapping blocks into columns
function layoutBlocks(dayBlocks) {
  if (dayBlocks.length === 0) return [];

  dayBlocks.sort(function(a, b) {
    var diff = timeToMinutes(a.startTime) - timeToMinutes(b.startTime);
    if (diff !== 0) return diff;
    return timeToMinutes(a.endTime) - timeToMinutes(b.endTime);
  });

  var groups = [];

  dayBlocks.forEach(function(block) {
    var startMin = timeToMinutes(block.startTime);
    var endMin = timeToMinutes(block.endTime);
    var placed = false;

    for (var g = 0; g < groups.length; g++) {
      var group = groups[g];
      var overlaps = false;
      for (var i = 0; i < group.length; i++) {
        var existing = group[i];
        var eStart = timeToMinutes(existing.startTime);
        var eEnd = timeToMinutes(existing.endTime);
        if (startMin < eEnd && endMin > eStart) {
          overlaps = true;
          break;
        }
      }
      if (!overlaps) {
        group.push(block);
        placed = true;
        break;
      }
    }

    if (!placed) {
      groups.push([block]);
    }
  });

  var totalCols = groups.length;
  var result = [];

  groups.forEach(function(group, col) {
    group.forEach(function(block) {
      result.push({ block: block, col: col, totalCols: totalCols });
    });
  });

  return result;
}

// --- Add / Edit ---
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Block';
  document.getElementById('fMember').value = '';
  document.getElementById('fRole').value = 'Undergraduate';
  document.getElementById('fMentor').value = '';
  document.getElementById('fDay').value = 'Monday';
  document.getElementById('fStartTime').value = '09:00';
  document.getElementById('fEndTime').value = '12:00';
  document.getElementById('fActivity').value = '';
  document.getElementById('fStatus').value = 'scheduled';
  document.getElementById('fNotes').value = '';
  document.getElementById('fRecurring').checked = true;
  document.getElementById('btnDeleteBlock').style.display = 'none';
  document.getElementById('blockModal').classList.add('open');
  document.getElementById('fMember').focus();
}

function openEditModal(id) {
  var item = schedule.find(function(b) { return b.id === id; });
  if (!item) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Block';
  document.getElementById('fMember').value = item.member;
  document.getElementById('fRole').value = item.role || 'Undergraduate';
  document.getElementById('fMentor').value = item.mentor || '';
  document.getElementById('fDay').value = item.day;
  document.getElementById('fStartTime').value = item.startTime;
  document.getElementById('fEndTime').value = item.endTime;
  document.getElementById('fActivity').value = item.activity || '';
  document.getElementById('fStatus').value = item.status || 'scheduled';
  document.getElementById('fNotes').value = item.notes || '';
  document.getElementById('fRecurring').checked = !!item.recurring;
  document.getElementById('btnDeleteBlock').style.display = '';
  document.getElementById('blockModal').classList.add('open');
  document.getElementById('fActivity').focus();
}

function closeModal() {
  document.getElementById('blockModal').classList.remove('open');
}

async function saveBlock() {
  var member = document.getElementById('fMember').value.trim();
  var role = document.getElementById('fRole').value;
  var mentor = document.getElementById('fMentor').value.trim();
  var day = document.getElementById('fDay').value;
  var startTime = document.getElementById('fStartTime').value;
  var endTime = document.getElementById('fEndTime').value;
  var activity = document.getElementById('fActivity').value.trim();
  var status = document.getElementById('fStatus').value;
  var notes = document.getElementById('fNotes').value.trim();
  var recurring = document.getElementById('fRecurring').checked;

  if (!member) { toast('Member name is required', 'error'); return; }
  if (timeToMinutes(endTime) <= timeToMinutes(startTime)) {
    toast('End time must be after start time', 'error');
    return;
  }

  var btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  var weekOf = recurring ? '' : isoMonday(currentMonday);

  if (editingId !== null) {
    var item = schedule.find(function(b) { return b.id === editingId; });
    if (item) {
      Object.assign(item, { member: member, role: role, mentor: mentor, day: day, startTime: startTime, endTime: endTime, activity: activity, status: status, notes: notes, recurring: recurring, weekOf: weekOf });
    }
    var ok = await commitSchedule('Update schedule: ' + member + ' ' + day);
    if (ok) {
      toast('Block updated', 'success');
      closeModal();
    }
  } else {
    var maxId = schedule.reduce(function(m, b) { return Math.max(m, b.id); }, 0);
    var newBlock = { id: maxId + 1, member: member, role: role, mentor: mentor, day: day, startTime: startTime, endTime: endTime, recurring: recurring, weekOf: weekOf, activity: activity, status: status, notes: notes };
    schedule.push(newBlock);
    var ok2 = await commitSchedule('Add schedule block: ' + member + ' ' + day);
    if (ok2) {
      toast('Block added', 'success');
      closeModal();
    } else {
      schedule.pop();
    }
  }

  btn.disabled = false;
  btn.textContent = 'Save Block';
  buildMemberColors();
  populateMemberFilter();
  renderCalendar();
}

async function deleteBlock() {
  if (editingId === null) return;
  var item = schedule.find(function(b) { return b.id === editingId; });
  if (!item) return;

  if (!confirm('Delete this block for ' + item.member + ' on ' + item.day + '?')) return;

  var idx = schedule.indexOf(item);
  schedule.splice(idx, 1);

  var ok = await commitSchedule('Remove schedule block: ' + item.member + ' ' + item.day);
  if (ok) {
    toast('Block deleted', 'success');
  } else {
    schedule.splice(idx, 0, item);
  }

  closeModal();
  buildMemberColors();
  populateMemberFilter();
  renderCalendar();
}

// --- Toast ---
function toast(msg, type) {
  var container = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  var icon = type === 'error' ? 'error' : type === 'success' ? 'check_circle' : 'info';
  el.innerHTML = '<span class="material-icons-outlined" style="font-size:18px">' + icon + '</span> ' + esc(msg);
  container.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 4000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// Close modals on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(function(m) { m.classList.remove('open'); });
  }
});

populateTimeSelects();
updateConnStatus();
loadSchedule();
