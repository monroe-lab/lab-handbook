<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Calendar - Monroe Lab</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #009688;
  --teal-dark: #00796b;
  --teal-light: #e0f2f1;
  --teal-50: #f0fdfb;
  --red: #e53935;
  --red-light: #ffebee;
  --amber: #ff8f00;
  --amber-light: #fff8e1;
  --grey-50: #fafafa;
  --grey-100: #f5f5f5;
  --grey-200: #eeeeee;
  --grey-300: #e0e0e0;
  --grey-500: #9e9e9e;
  --grey-700: #616161;
  --grey-900: #212121;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--grey-100);
  color: var(--grey-900);
  line-height: 1.5;
}

/* Header */
.header {
  background: var(--teal);
  color: #fff;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 .material-icons-outlined { font-size: 28px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-primary { background: #fff; color: var(--teal-dark); }
.btn-primary:hover { background: var(--teal-light); }
.btn-teal { background: var(--teal); color: #fff; }
.btn-teal:hover { background: var(--teal-dark); }
.btn-outline { background: transparent; color: var(--grey-700); border: 1px solid var(--grey-300); }
.btn-outline:hover { background: var(--grey-100); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #c62828; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn .material-icons-outlined { font-size: 18px; }

/* Connection status */
.conn-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: rgba(255,255,255,.8);
}
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #aaa;
}
.conn-dot.connected { background: #69f0ae; }

/* Week nav */
.week-nav {
  background: #fff;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--grey-200);
  box-shadow: var(--shadow);
}
.week-nav .btn-nav {
  background: none;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  cursor: pointer;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  color: var(--grey-700);
  transition: all .15s;
}
.week-nav .btn-nav:hover { background: var(--teal-light); color: var(--teal-dark); }
.week-label {
  font-size: 15px;
  font-weight: 600;
  color: var(--grey-900);
  min-width: 200px;
  text-align: center;
}

/* Filter bar */
.filter-bar {
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.filter-select {
  padding: 9px 12px;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  background: #fff;
  outline: none;
  cursor: pointer;
  min-width: 150px;
}
.filter-select:focus { border-color: var(--teal); }
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--grey-700);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Stats */
.stats {
  display: flex;
  gap: 16px;
  padding: 16px 24px;
  flex-wrap: wrap;
}
.stat-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 160px;
}
.stat-card .material-icons-outlined {
  font-size: 28px;
  color: var(--teal);
}
.stat-card.warning .material-icons-outlined { color: var(--amber); }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--grey-500); text-transform: uppercase; letter-spacing: .5px; }

/* Calendar grid */
.calendar-wrap {
  padding: 0 24px 24px;
}
.calendar-container {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow-x: auto;
}
.calendar-grid {
  display: grid;
  grid-template-columns: 60px repeat(5, 1fr);
  min-width: 700px;
}
.cal-header {
  background: var(--grey-50);
  padding: 12px 8px;
  text-align: center;
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--grey-700);
  border-bottom: 2px solid var(--grey-200);
}
.cal-header.time-col {
  font-size: 11px;
}
.cal-header .day-date {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--grey-500);
  margin-top: 2px;
}
.time-label {
  padding: 0 8px;
  font-size: 11px;
  color: var(--grey-500);
  text-align: right;
  border-right: 1px solid var(--grey-200);
  height: 60px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-top: 2px;
}
.day-column {
  position: relative;
  border-right: 1px solid var(--grey-200);
  height: 60px;
  border-bottom: 1px solid var(--grey-100);
  /* R13 #40: clickable to create. Subtle hover highlight makes it
     discoverable without being noisy on every cell. */
  cursor: cell;
  transition: background-color .1s;
}
.day-column:hover { background-color: var(--teal-50, #f0fdfb); }
.day-column:last-child { border-right: none; }

/* Block cards */
.block-card {
  position: absolute;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  line-height: 1.3;
  overflow: hidden;
  cursor: pointer;
  z-index: 1;
  transition: box-shadow .15s;
  border-left: 3px solid;
}
.block-card:hover {
  box-shadow: var(--shadow-lg);
  z-index: 2;
}
.block-card .block-member {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.block-card .block-time {
  font-size: 10px;
  opacity: .7;
}
.block-card .block-activity {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10px;
  margin-top: 1px;
}
.block-card.unassigned {
  border-style: dashed;
  border-width: 1px;
  border-left-width: 3px;
}
.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-left: 4px;
  vertical-align: middle;
}
.status-dot.scheduled { background: #4caf50; }
.status-dot.in-progress { background: #2196f3; }
.status-dot.completed { background: #9e9e9e; }
.status-dot.cancelled { background: #e53935; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all .2s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  background: #fff;
  border-radius: 12px;
  width: 90%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--grey-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 { font-size: 18px; }
.modal-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--grey-500);
  padding: 4px;
  border-radius: 4px;
}
.modal-close:hover { background: var(--grey-100); }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--grey-200);
  display: flex;
  justify-content: space-between;
  gap: 8px;
}
.modal-footer-right { display: flex; gap: 8px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--grey-700);
  margin-bottom: 5px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--grey-300);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--teal);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-check {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.form-check input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--teal);
}
.form-check label {
  font-size: 13px;
  font-weight: 600;
  color: var(--grey-700);
  margin-bottom: 0;
}

/* Toast */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--grey-900);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: slideIn .3s ease;
}
.toast.error { background: var(--red); }
.toast.success { background: var(--teal-dark); }
@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 24px;
  color: var(--grey-500);
}
.spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid var(--grey-200);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Day tabs (mobile only) */
.day-tabs {
  display: none;
}

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px; }
  .header-actions { flex-wrap: wrap; }
  .week-nav { padding: 10px 16px; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .week-label { min-width: auto; font-size: 14px; }
  .filter-bar { padding: 12px 16px; }
  .stats { padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { min-width: 0; }
  .calendar-wrap { padding: 0 16px 16px; }
  .calendar-container { overflow-x: hidden; }
  .calendar-grid {
    grid-template-columns: 60px 1fr !important;
    min-width: 0 !important;
  }
  .cal-header.mobile-hide, .day-column.mobile-hide {
    display: none !important;
  }
  .day-tabs {
    display: flex;
    gap: 0;
    padding: 0 16px;
    background: #fff;
    border-bottom: 1px solid var(--grey-200);
    overflow-x: auto;
  }
  .day-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--grey-500);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: all .15s;
  }
  .day-tab.active {
    color: var(--teal);
    border-bottom-color: var(--teal);
  }
  .day-tab:hover { color: var(--teal-dark); }
  .legend { display: none; }
  .modal { width: 95vw; max-width: 95vw; }
}
</style>
</head>

<script>
// When embedded in an iframe, hide the app header and use parent's auth
if (window.self !== window.top) {
  document.documentElement.style.setProperty('--iframe-mode', '1');
  document.addEventListener('DOMContentLoaded', function() {
    var h = document.querySelector('.header');
    if (h) h.style.display = 'none';
    document.body.style.paddingTop = '0';
    // Use parent's auth token if available
    // Legacy iframe compat
    if (window.parent.ghAuth) window.ghAuth = window.parent.ghAuth;
  });
}
</script>

<!-- Header — R17: removed duplicate sign-out/sign-in buttons (#49).
     Auth is handled by the shared nav bar injected by nav.js below.
     Only the Add Block button stays in the header. -->
<div class="header">
  <h1>
    <span class="material-icons-outlined">calendar_month</span>
    Lab Calendar
  </h1>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAddModal()">
      <span class="material-icons-outlined">add</span>
      Add Block
    </button>
  </div>
</div>

<!-- App nav -->
<!-- Nav injected by shared nav.js -->

<!-- Week navigation -->
<div class="week-nav">
  <button class="btn-nav" onclick="changeWeek(-1)" title="Previous week">
    <svg style="width:20px;height:20px;max-width:20px;max-height:20px;fill:currentColor;display:inline-block" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="btn btn-outline btn-sm" onclick="goToday()">This Week</button>
  <button class="btn-nav" onclick="changeWeek(1)" title="Next week">
    <svg style="width:20px;height:20px;max-width:20px;max-height:20px;fill:currentColor;display:inline-block" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
  <span class="week-label" id="weekLabel"></span>
</div>

<!-- Filter bar + legend -->
<div class="filter-bar">
  <select class="filter-select" id="filterMember" onchange="renderCalendar()">
    <option value="">All Members</option>
  </select>
  <div class="legend" id="legend"></div>
</div>

<!-- Day tabs (mobile) -->
<div class="day-tabs" id="dayTabs">
  <button class="day-tab" data-day="Monday" onclick="selectDayTab('Monday')">Mon</button>
  <button class="day-tab" data-day="Tuesday" onclick="selectDayTab('Tuesday')">Tue</button>
  <button class="day-tab" data-day="Wednesday" onclick="selectDayTab('Wednesday')">Wed</button>
  <button class="day-tab" data-day="Thursday" onclick="selectDayTab('Thursday')">Thu</button>
  <button class="day-tab" data-day="Friday" onclick="selectDayTab('Friday')">Fri</button>
</div>


<!-- Calendar -->
<div class="calendar-wrap">
  <div class="calendar-container">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading schedule...</p>
    </div>
    <div class="calendar-grid" id="calendarGrid" style="display:none"></div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="blockModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Block</h2>
      <button class="modal-close" onclick="closeModal()">
        <span class="material-icons-outlined">close</span>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>User(s) *</label>
        <input type="text" id="fMember" placeholder="[[Alex Chen]] or [[Alex]], [[Sam]] or &quot;all&quot; — type [[ to autocomplete">
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="Optional — e.g. DNA extraction, Lab meeting">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Time *</label>
          <select id="fStartTime"></select>
        </div>
        <div class="form-group">
          <label>End Time *</label>
          <select id="fEndTime"></select>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="fNotes" rows="4" placeholder="Optional — type [[ to link protocols, reagents, etc." style="resize:vertical;min-height:80px"></textarea>
      </div>
      <div class="form-row" id="repeatRow">
        <div class="form-group">
          <label>Repeat</label>
          <select id="fRepeat" onchange="document.getElementById('repeatUntilWrap').style.display = this.value === 'none' ? 'none' : '';">
            <option value="none">Does not repeat</option>
            <option value="daily">Daily (Mon–Fri)</option>
            <option value="weekly">Weekly</option>
          </select>
        </div>
        <div class="form-group" id="repeatUntilWrap" style="display:none">
          <label>Until</label>
          <input type="date" id="fRepeatUntil">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div>
        <button class="btn btn-danger" id="btnDeleteBlock" onclick="deleteBlock()" style="display:none">
          <span class="material-icons-outlined">delete</span>
          Delete
        </button>
      </div>
      <div class="modal-footer-right">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-teal" id="btnSave" onclick="saveBlock()">Save Block</button>
      </div>
    </div>
  </div>
</div>

<script src="../app/js/shared.js"></script>
<script src="../app/js/types.js"></script>
<script src="../app/js/github-api.js"></script>
<script src="../app/js/nav.js"></script>
<script src="../app/js/rich-input.js"></script>
<!-- R13 #40: the calendar page was missing the global issue-reporter FAB
     and was drifting away from the rest of the site chrome. Include the
     shared module so the red floating button appears here like on every
     other page. -->
<script src="../app/js/issue-reporter.js"></script>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// --- Config ---
// R17: events are now markdown files under docs/events/ in the object-index.
// No more schedule.json — each event is a first-class typed markdown object
// with frontmatter (type:event, date, start_time, end_time, member) and a
// markdown body for notes/wikilinks.
var DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
var HOUR_START = 8;
var HOUR_END = 18;
var MEMBER_COLORS = [
  { bg: '#e8f5e9', border: '#4caf50', text: '#1b5e20', bgLight: '#f1f8e9', borderLight: '#a5d6a7' },
  { bg: '#e3f2fd', border: '#2196f3', text: '#0d47a1', bgLight: '#e8eaf6', borderLight: '#90caf9' },
  { bg: '#fce4ec', border: '#e91e63', text: '#880e4f', bgLight: '#fce4ec', borderLight: '#f48fb1' },
  { bg: '#fff3e0', border: '#ff9800', text: '#e65100', bgLight: '#fff8e1', borderLight: '#ffcc80' },
  { bg: '#f3e5f5', border: '#9c27b0', text: '#4a148c', bgLight: '#f3e5f5', borderLight: '#ce93d8' },
  { bg: '#e0f2f1', border: '#009688', text: '#004d40', bgLight: '#e0f7fa', borderLight: '#80cbc4' },
  { bg: '#fff9c4', border: '#fbc02d', text: '#f57f17', bgLight: '#fffde7', borderLight: '#fff176' },
  { bg: '#efebe9', border: '#795548', text: '#3e2723', bgLight: '#efebe9', borderLight: '#bcaaa4' },
  { bg: '#e8eaf6', border: '#3f51b5', text: '#1a237e', bgLight: '#e8eaf6', borderLight: '#9fa8da' },
  { bg: '#e0f7fa', border: '#00bcd4', text: '#006064', bgLight: '#e0f7fa', borderLight: '#80deea' }
];

// --- State ---
var schedule = [];   // array of {title, member, date, startTime, endTime, notes, path}
var editingPath = null;  // path of the event being edited (null = creating new)
var currentMonday = getMonday(new Date());
var memberColorMap = {};

// --- Auth (shared via Lab.gh) ---
function getToken() { return (window.Lab && window.Lab.gh) ? window.Lab.gh.getToken() : ''; }

// --- Utility ---
function getMonday(d) {
  var date = new Date(d);
  var day = date.getDay();
  var diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  date.setHours(0, 0, 0, 0);
  return date;
}

function formatDate(d) {
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function formatWeekLabel(monday) {
  var friday = new Date(monday);
  friday.setDate(friday.getDate() + 4);
  var year = monday.getFullYear();
  return formatDate(monday) + ' \u2013 ' + formatDate(friday) + ', ' + year;
}

function isoMonday(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function timeToMinutes(t) {
  var parts = t.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function formatTime12(t) {
  var parts = t.split(':');
  var h = parseInt(parts[0]);
  var m = parts[1];
  var ampm = h >= 12 ? 'pm' : 'am';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return h + ':' + m + ampm;
}

function esc(s) {
  var el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

// --- Week nav ---
function changeWeek(dir) {
  currentMonday.setDate(currentMonday.getDate() + dir * 7);
  renderCalendar();
}

function goToday() {
  currentMonday = getMonday(new Date());
  renderCalendar();
}

function updateWeekLabel() {
  document.getElementById('weekLabel').textContent = formatWeekLabel(currentMonday);
}

// --- Populate time selects ---
function populateTimeSelects() {
  var startSel = document.getElementById('fStartTime');
  var endSel = document.getElementById('fEndTime');
  startSel.innerHTML = '';
  endSel.innerHTML = '';
  for (var h = HOUR_START; h <= HOUR_END; h++) {
    for (var m = 0; m < 60; m += 30) {
      if (h === HOUR_END && m > 0) break;
      var val = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
      var opt1 = document.createElement('option');
      opt1.value = val;
      opt1.textContent = formatTime12(val);
      startSel.appendChild(opt1);
      var opt2 = document.createElement('option');
      opt2.value = val;
      opt2.textContent = formatTime12(val);
      endSel.appendChild(opt2);
    }
  }
  endSel.value = '12:00';
}

// --- Data loading (R17: reads from object-index, not schedule.json) ---
async function loadSchedule() {
  try {
    var idx;
    if (window.Lab && window.Lab.gh && window.Lab.gh.fetchObjectIndex) {
      idx = await window.Lab.gh.fetchObjectIndex();
    } else {
      // Fallback: fetch the static file directly
      var BASE = (window.Lab && window.Lab.BASE) || '/lab-handbook/';
      var resp = await fetch(BASE + 'object-index.json?' + Date.now());
      idx = await resp.json();
    }
    // Filter to event-type entries and map to the shape renderCalendar expects
    schedule = idx
      .filter(function(e) { return e.type === 'event'; })
      .map(function(e) {
        return {
          title: e.title || '',
          member: e.member || '',
          date: e.date || '',
          startTime: e.start_time || '09:00',
          endTime: e.end_time || '10:00',
          notes: '', // notes are in the markdown body; loaded on edit
          path: 'docs/' + e.path,
        };
      });
  } catch(e) {
    toast('Failed to load events: ' + e.message, 'error');
    schedule = [];
  }

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('calendarGrid').style.display = '';
  buildMemberColors();
  populateMemberFilter();
  renderCalendar();
}

// --- GitHub write ---
// R17: commitSchedule removed — each event is saved individually as a
// markdown file via Lab.gh.saveFile. No more patching a single JSON blob.

// Build a markdown file string from event form fields.
function buildEventMarkdown(title, member, date, startTime, endTime, notes) {
  var user = (window.Lab && window.Lab.gh && window.Lab.gh.getUser()) || {};
  var fm = [
    '---',
    'type: event',
    'title: "' + (title || 'Untitled').replace(/"/g, '\\"') + '"',
    'date: "' + date + '"',
    'start_time: "' + startTime + '"',
    'end_time: "' + endTime + '"',
  ];
  if (member) fm.push('member: "' + member.replace(/"/g, '\\"') + '"');
  fm.push('created_by: ' + (user.login || 'unknown'));
  fm.push('---');
  var body = '\n# ' + (title || 'Untitled') + '\n';
  if (notes && notes.trim()) body += '\n' + notes.trim() + '\n';
  return fm.join('\n') + body;
}

// Generate a slug for a new event file: YYYY-MM-DD-<title-slug>.md
function eventSlug(title, date) {
  var slug = (title || 'event').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 50);
  return date + '-' + slug;
}

// --- Member colors ---
function extractMembers(s) {
  if (!s) return [];
  var out = [];
  var re = /\[\[([^\]]+)\]\]/g;
  var m;
  while ((m = re.exec(s)) !== null) {
    var name = m[1].split('|')[0].trim();
    if (name && out.indexOf(name) === -1) out.push(name);
  }
  return out;
}

function buildMemberColors() {
  var members = [];
  schedule.forEach(function(b) {
    extractMembers(b.member).forEach(function(u) {
      if (members.indexOf(u) === -1) members.push(u);
    });
  });
  members.sort();
  memberColorMap = {};
  members.forEach(function(m, i) {
    memberColorMap[m] = MEMBER_COLORS[i % MEMBER_COLORS.length];
  });
}

function populateMemberFilter() {
  var sel = document.getElementById('filterMember');
  var current = sel.value;
  sel.innerHTML = '<option value="">All Members</option>';
  var members = Object.keys(memberColorMap).sort();
  members.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });
  sel.value = current;

  // Legend
  var legend = document.getElementById('legend');
  legend.innerHTML = '';
  members.forEach(function(m) {
    var c = memberColorMap[m];
    var item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = '<span class="legend-dot" style="background:' + c.border + '"></span>' + esc(m);
    legend.appendChild(item);
  });
}

// --- Filter blocks for current week ---
function getVisibleBlocks() {
  var mondayStr = isoMonday(currentMonday);
  var memberFilter = document.getElementById('filterMember').value;

  return schedule.filter(function(b) {
    if (memberFilter && extractMembers(b.member).indexOf(memberFilter) === -1) return false;
    if (!b.date) return false;
    var d = new Date(b.date + 'T00:00:00');
    var dow = d.getDay();
    if (dow < 1 || dow > 5) return false;
    return isoMonday(getMonday(d)) === mondayStr;
  });
}

function dateToDayIndex(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  return (d.getDay() + 6) % 7; // Mon=0..Sun=6
}

// --- Rendering ---
function renderCalendar() {
  updateWeekLabel();
  var grid = document.getElementById('calendarGrid');
  var blocks = getVisibleBlocks();

  // Build grid HTML
  var html = '';

  // Header row
  html += '<div class="cal-header time-col">Time</div>';
  DAYS.forEach(function(day, di) {
    var date = new Date(currentMonday);
    date.setDate(date.getDate() + di);
    html += '<div class="cal-header">' + day.substring(0, 3) + '<span class="day-date">' + formatDate(date) + '</span></div>';
  });

  // Hour rows
  // R13 #40: each hour cell is now click-to-create. Clicking an empty
  // part of a cell opens the Add Block modal pre-filled with that day's
  // date and the hour's start time. Clicks on existing block-cards still
  // open the edit modal because they stopPropagation inside cellClick.
  for (var h = HOUR_START; h < HOUR_END; h++) {
    var timeStr = formatTime12(String(h).padStart(2, '0') + ':00');
    html += '<div class="time-label">' + timeStr + '</div>';
    DAYS.forEach(function(day) {
      html += '<div class="day-column" data-day="' + day + '" data-hour="' + h + '" onclick="cellClick(event, this)" title="Click to add a block at this time"></div>';
    });
  }

  grid.innerHTML = html;

  // Place blocks into day columns
  var SHARED_COLOR = { bg: '#f5f5f5', border: '#9e9e9e', text: '#424242' };
  DAYS.forEach(function(day, dayIdx) {
    var dayBlocks = blocks.filter(function(b) { return dateToDayIndex(b.date) === dayIdx; });
    var placed = layoutBlocks(dayBlocks);

    placed.forEach(function(item) {
      var b = item.block;
      var startMin = timeToMinutes(b.startTime);
      var endMin = timeToMinutes(b.endTime);

      var startHour = Math.floor(startMin / 60);
      if (startHour < HOUR_START) startHour = HOUR_START;
      var cellTopMin = startHour * 60;
      var topOffset = (startMin - cellTopMin) / 60 * 60;
      var height = (endMin - startMin) / 60 * 60;

      var users = extractMembers(b.member);
      var color = users.length ? (memberColorMap[users[0]] || MEMBER_COLORS[0]) : SHARED_COLOR;

      var widthPct = 100 / item.totalCols;
      var leftPct = widthPct * item.col;

      var card = document.createElement('div');
      card.className = 'block-card';
      card.style.cssText = 'top:' + topOffset + 'px;height:' + height + 'px;left:' + leftPct + '%;width:calc(' + widthPct + '% - 4px);background:' + color.bg + ';border-left-color:' + color.border + ';color:' + color.text + ';';
      // R17: pass the markdown file path instead of a JSON id
      card.onclick = (function(block) { return function() { openEditModal(block.path); }; })(b);
      card.title = (b.title || '') + (b.member ? ' • ' + b.member : '');

      var innerHtml = '';
      if (b.title) innerHtml += '<div class="block-member">' + esc(b.title) + '</div>';
      innerHtml += '<div class="block-time">' + formatTime12(b.startTime) + ' \u2013 ' + formatTime12(b.endTime) + '</div>';
      if (b.member) {
        var rendered = (window.Lab && window.Lab.richInput) ? window.Lab.richInput.renderText(b.member) : esc(b.member);
        innerHtml += '<div class="block-activity">' + rendered + '</div>';
      }
      card.innerHTML = innerHtml;

      var cols = grid.querySelectorAll('.day-column[data-day="' + day + '"][data-hour="' + startHour + '"]');
      if (cols.length > 0) {
        cols[0].appendChild(card);
      }
    });
  });
}

// Layout overlapping blocks into columns
function layoutBlocks(dayBlocks) {
  if (dayBlocks.length === 0) return [];

  dayBlocks.sort(function(a, b) {
    var diff = timeToMinutes(a.startTime) - timeToMinutes(b.startTime);
    if (diff !== 0) return diff;
    return timeToMinutes(a.endTime) - timeToMinutes(b.endTime);
  });

  var groups = [];

  dayBlocks.forEach(function(block) {
    var startMin = timeToMinutes(block.startTime);
    var endMin = timeToMinutes(block.endTime);
    var placed = false;

    for (var g = 0; g < groups.length; g++) {
      var group = groups[g];
      var overlaps = false;
      for (var i = 0; i < group.length; i++) {
        var existing = group[i];
        var eStart = timeToMinutes(existing.startTime);
        var eEnd = timeToMinutes(existing.endTime);
        if (startMin < eEnd && endMin > eStart) {
          overlaps = true;
          break;
        }
      }
      if (!overlaps) {
        group.push(block);
        placed = true;
        break;
      }
    }

    if (!placed) {
      groups.push([block]);
    }
  });

  var totalCols = groups.length;
  var result = [];

  groups.forEach(function(group, col) {
    group.forEach(function(block) {
      result.push({ block: block, col: col, totalCols: totalCols });
    });
  });

  return result;
}

// --- Add / Edit ---
function openAddModal(prefill) {
  editingId = null;
  prefill = prefill || {};
  document.getElementById('modalTitle').textContent = 'Add Block';
  document.getElementById('fTitle').value = '';
  document.getElementById('fMember').value = '';
  // R13 #40: default date is "a weekday close to today"; `prefill.date`
  // overrides for click-to-create on a specific calendar cell.
  var dateStr;
  if (prefill.date) {
    dateStr = prefill.date;
  } else {
    var today = new Date();
    if (today.getDay() === 0) today.setDate(today.getDate() + 1);
    if (today.getDay() === 6) today.setDate(today.getDate() + 2);
    dateStr = isoMonday(today);
  }
  document.getElementById('fDate').value = dateStr;
  document.getElementById('fStartTime').value = prefill.startTime || '09:00';
  document.getElementById('fEndTime').value = prefill.endTime ||
    (prefill.startTime ? addHour(prefill.startTime) : '10:00');
  document.getElementById('fNotes').value = '';
  document.getElementById('fRepeat').value = 'none';
  var dateForRepeat = new Date(dateStr + 'T00:00:00');
  var defaultEnd = new Date(dateForRepeat); defaultEnd.setDate(defaultEnd.getDate() + 7 * 13);
  document.getElementById('fRepeatUntil').value = isoMonday(defaultEnd);
  document.getElementById('repeatUntilWrap').style.display = 'none';
  document.getElementById('repeatRow').style.display = '';
  document.getElementById('btnDeleteBlock').style.display = 'none';
  document.getElementById('blockModal').classList.add('open');
  // When prefilled from a click, jump straight to the title field so the
  // user can start typing what they're doing.
  var focusTarget = prefill.date ? 'fTitle' : 'fMember';
  document.getElementById(focusTarget).focus();
}

// R13 #40: click-to-create from a calendar grid cell. Extracts the day
// + hour from the clicked element's data attributes, resolves the full
// date relative to currentMonday, and opens the Add Block modal with the
// date and start time pre-filled. Ignores clicks that bubble from an
// existing block-card (those open the edit modal instead).
function cellClick(evt, cellEl) {
  if (evt && evt.target && evt.target.closest('.block-card')) return;
  if (!cellEl) return;
  var day = cellEl.getAttribute('data-day');
  var hour = parseInt(cellEl.getAttribute('data-hour'), 10);
  if (!day || isNaN(hour)) return;
  var dayIdx = DAYS.indexOf(day);
  if (dayIdx < 0) return;
  var date = new Date(currentMonday);
  date.setDate(date.getDate() + dayIdx);
  var startTime = String(hour).padStart(2, '0') + ':00';
  openAddModal({
    date: isoMonday(date),
    startTime: startTime,
  });
}

// Helper for openAddModal: given "HH:00" return the next hour as "HH:00".
function addHour(timeStr) {
  var parts = timeStr.split(':');
  var h = parseInt(parts[0], 10) + 1;
  if (h >= 24) h = 23;
  return String(h).padStart(2, '0') + ':' + (parts[1] || '00');
}

// R17: openEditModal now loads the event's markdown body for the notes field
async function openEditModal(path) {
  var item = schedule.find(function(b) { return b.path === path; });
  if (!item) return;
  editingPath = path;
  document.getElementById('modalTitle').textContent = 'Edit Block';
  document.getElementById('fTitle').value = item.title || '';
  document.getElementById('fMember').value = item.member || '';
  document.getElementById('fDate').value = item.date;
  document.getElementById('fStartTime').value = item.startTime;
  document.getElementById('fEndTime').value = item.endTime;
  // Load notes from the markdown body
  var notes = '';
  try {
    var file = await Lab.gh.fetchFile(path);
    var parsed = Lab.parseFrontmatter(file.content);
    notes = (parsed.body || '').replace(/^#[^\n]*\n?/, '').trim();
  } catch(e) { /* leave notes empty */ }
  document.getElementById('fNotes').value = notes;
  document.getElementById('repeatRow').style.display = 'none';
  document.getElementById('btnDeleteBlock').style.display = '';
  document.getElementById('blockModal').classList.add('open');
  document.getElementById('fTitle').focus();
}

function closeModal() {
  document.getElementById('blockModal').classList.remove('open');
  editingPath = null;
}

// R17: saveBlock creates/updates markdown files instead of patching JSON
async function saveBlock() {
  var title = document.getElementById('fTitle').value.trim();
  var member = document.getElementById('fMember').value.trim();
  var date = document.getElementById('fDate').value;
  var startTime = document.getElementById('fStartTime').value;
  var endTime = document.getElementById('fEndTime').value;
  var notes = document.getElementById('fNotes').value.trim();
  var repeat = document.getElementById('fRepeat').value;

  if (!title && !member) { toast('Add a title or at least one user', 'error'); return; }
  if (!date) { toast('Date is required', 'error'); return; }
  if (timeToMinutes(endTime) <= timeToMinutes(startTime)) {
    toast('End time must be after start time', 'error');
    return;
  }

  var btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    if (editingPath) {
      // Update existing event markdown file
      var file = await Lab.gh.fetchFile(editingPath);
      var content = buildEventMarkdown(title, member, date, startTime, endTime, notes);
      await Lab.gh.saveFile(editingPath, content, file.sha, 'Update event: ' + title);
      // Update in-memory schedule
      var item = schedule.find(function(b) { return b.path === editingPath; });
      if (item) Object.assign(item, { title: title, member: member, date: date, startTime: startTime, endTime: endTime, notes: notes });
      toast('Event updated', 'success');
      closeModal();
    } else {
      // Create new event(s) as markdown files
      var dates = [date];
      if (repeat !== 'none') {
        var untilStr = document.getElementById('fRepeatUntil').value;
        if (!untilStr) { toast('Pick an end date for the repeat', 'error'); btn.disabled = false; btn.textContent = 'Save Block'; return; }
        var until = new Date(untilStr + 'T00:00:00');
        var step = repeat === 'daily' ? 1 : 7;
        var cursor = new Date(date + 'T00:00:00'); cursor.setDate(cursor.getDate() + step);
        while (cursor <= until) {
          if (repeat === 'daily') {
            var dow = cursor.getDay();
            if (dow >= 1 && dow <= 5) dates.push(isoMonday(cursor));
          } else {
            dates.push(isoMonday(cursor));
          }
          cursor.setDate(cursor.getDate() + step);
        }
      }

      btn.textContent = 'Saving ' + dates.length + ' event(s)...';
      for (var i = 0; i < dates.length; i++) {
        var dt = dates[i];
        var slug = eventSlug(title || member, dt);
        var path = 'docs/events/' + slug + '.md';
        var content = buildEventMarkdown(title, member, dt, startTime, endTime, notes);
        await Lab.gh.saveFile(path, content, null, 'Add event: ' + (title || member) + ' on ' + dt);
        schedule.push({ title: title, member: member, date: dt, startTime: startTime, endTime: endTime, notes: notes, path: path });
      }
      toast(dates.length > 1 ? ('Added ' + dates.length + ' events') : 'Event added', 'success');
      closeModal();
    }
  } catch(e) {
    toast('Save failed: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Save Block';
  Lab.gh.clearObjectIndexCache();
  buildMemberColors();
  populateMemberFilter();
  renderCalendar();
}

// R17: deleteBlock deletes the markdown file
async function deleteBlock() {
  if (!editingPath) return;
  var item = schedule.find(function(b) { return b.path === editingPath; });
  if (!item) return;
  var confirmed = await Lab.modal.confirm({ title: 'Delete Event', message: 'Delete "' + (item.title || 'this event') + '"?\nThis cannot be undone.', confirmText: 'Delete', danger: true });
  if (!confirmed) return;
  try {
    await Lab.gh.deleteFile(editingPath);
    schedule = schedule.filter(function(b) { return b.path !== editingPath; });
    toast('Event deleted', 'success');
  } catch(e) {
    toast('Delete failed: ' + e.message, 'error');
  }
  closeModal();
  Lab.gh.clearObjectIndexCache();
  buildMemberColors();
  populateMemberFilter();
  renderCalendar();
}

// --- Toast ---
function toast(msg, type) {
  var container = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  var icon = type === 'error' ? 'error' : type === 'success' ? 'check_circle' : 'info';
  el.innerHTML = '<span class="material-icons-outlined" style="font-size:18px">' + icon + '</span> ' + esc(msg);
  container.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 4000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// Close modals on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(function(m) { m.classList.remove('open'); });
  }
});

// --- Mobile day tabs ---
var activeDayTab = null;

function isMobile() {
  return window.innerWidth <= 768;
}

function getTodayDay() {
  var dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  var today = dayNames[new Date().getDay()];
  if (DAYS.indexOf(today) === -1) today = 'Monday';
  return today;
}

function selectDayTab(day) {
  activeDayTab = day;
  // Update tab active state
  document.querySelectorAll('.day-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.getAttribute('data-day') === day);
  });
  // Show/hide columns
  applyMobileDayFilter();
}

function applyMobileDayFilter() {
  if (!isMobile() || !activeDayTab) return;
  var grid = document.getElementById('calendarGrid');
  if (!grid) return;
  // Headers: index 0 = time col, 1-5 = Mon-Fri
  var headers = grid.querySelectorAll('.cal-header');
  headers.forEach(function(h, i) {
    if (i === 0) return; // time col always visible
    var dayIndex = i - 1;
    if (DAYS[dayIndex] === activeDayTab) {
      h.classList.remove('mobile-hide');
    } else {
      h.classList.add('mobile-hide');
    }
  });
  // Day columns
  var cols = grid.querySelectorAll('.day-column');
  cols.forEach(function(col) {
    if (col.getAttribute('data-day') === activeDayTab) {
      col.classList.remove('mobile-hide');
    } else {
      col.classList.add('mobile-hide');
    }
  });
  // Time labels always visible
}

// Re-apply filter after each render
var _origRenderCalendar = renderCalendar;
renderCalendar = function() {
  _origRenderCalendar();
  if (isMobile()) {
    if (!activeDayTab) selectDayTab(getTodayDay());
    else applyMobileDayFilter();
  }
};

// On resize, toggle mobile behavior
window.addEventListener('resize', function() {
  if (isMobile()) {
    if (!activeDayTab) selectDayTab(getTodayDay());
    else applyMobileDayFilter();
  } else {
    // Remove all mobile-hide on desktop
    var grid = document.getElementById('calendarGrid');
    if (grid) {
      grid.querySelectorAll('.mobile-hide').forEach(function(el) {
        el.classList.remove('mobile-hide');
      });
    }
  }
});

// --- Init ---
populateTimeSelects();
// R17: updateConnStatus() removed — auth handled by shared nav.js
loadSchedule();

// Enhance member and notes fields with [[ autocomplete
if (window.Lab && window.Lab.richInput) {
  Lab.richInput.enhance(document.getElementById('fMember'));
  Lab.richInput.enhance(document.getElementById('fNotes'));
}
