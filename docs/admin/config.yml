backend:
  name: github
  repo: monroe-lab/lab-handbook
  branch: main

media_folder: "docs/images"
public_folder: "/images"

collections:
  - name: "wet-lab"
    label: "Wet Lab Protocols"
    folder: "docs/wet-lab"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "bioinformatics"
    label: "Bioinformatics Guides"
    folder: "docs/bioinformatics"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "lab-safety"
    label: "Safety & Chemicals"
    folder: "docs/lab-safety"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Body", name: "body", widget: "markdown" }
