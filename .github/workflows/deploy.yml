name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install pyyaml

      - name: Build object index
        run: python scripts/build-object-index.py

      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy
          # Copy all docs content (markdown, JSON data, existing apps)
          cp -r docs/* _deploy/
          # Copy the new app shell
          cp -r app/ _deploy/app/
          # Cache-bust JS includes so browsers pick up new code
          HASH=$(git rev-parse --short HEAD)
          find _deploy/app -name '*.html' -exec sed -i "s|\.js\"|.js?v=$HASH\"|g" {} +
          find _deploy/app -name '*.html' -exec sed -i "s|\.css\"|.css?v=$HASH\"|g" {} +
          # Root redirect to dashboard
          echo '<meta http-equiv="refresh" content="0;url=app/">' > _deploy/index.html
          # 404 page that redirects old MkDocs URLs to new app
          cat > _deploy/404.html << 'HEREDOC'
          <!DOCTYPE html><html><head>
          <meta charset="UTF-8">
          <title>Monroe Lab</title>
          <script>
          (function() {
            var path = location.pathname.replace('/lab-handbook/', '').replace(/\/$/, '');
            if (path && !path.startsWith('app/') && !path.includes('.')) {
              location.href = '/lab-handbook/app/protocols.html?doc=' + encodeURIComponent(path);
            } else {
              location.href = '/lab-handbook/app/';
            }
          })();
          </script>
          </head><body><p>Redirecting...</p></body></html>
          HEREDOC

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
